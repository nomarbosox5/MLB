<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Statcast Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --field-green: #1a331a; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }
        
        /* Video Top 40% - 25% Side Crop */
        #v-frame { width: 100%; height: 40vh; overflow: hidden; position: relative; background: #000; border-bottom: 1px solid #333; }
        video { width: 150%; height: 100%; object-fit: cover; margin-left: -25%; pointer-events: none; }

        #deck { 
            height: 60vh; display: grid; grid-template-columns: 1fr 1fr; 
            background: var(--bg); padding: 10px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Left Side: Field & Stats */
        .left-panel { display: flex; flex-direction: column; gap: 8px; position: relative; }
        
        /* Compact Pro Field */
        #field-container { 
            flex-grow: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .field-svg { width: 95%; height: 95%; transform: scale(1.1); }

        .broadcast-data { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; border-left: 3px solid var(--gold); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; font-weight: 800; font-size: 12px; }
        .dots { display: flex; gap: 3px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); } .s-on { background: var(--gold); } .o-on { background: #ff4757; }

        /* Proper Diamond Formation */
        .diamond-formation { 
            position: absolute; bottom: 80px; right: 10px; width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .base-pip { position: absolute; width: 10px; height: 10px; background: #222; transform: rotate(45deg); border: 1px solid #444; transition: 0.3s; }
        #pip-2 { top: 0; left: 20px; } /* Second Base */
        #pip-3 { top: 20px; left: 0; }  /* Third Base */
        #pip-1 { top: 20px; right: 0; } /* First Base */
        .occupied { background: var(--gold) !important; box-shadow: 0 0 10px var(--gold); border-color: #fff; }

        /* Right Side: Strike Zone */
        .zone-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
        #sz { 
            width: 160px; height: 210px; border: 2px solid rgba(255,255,255,0.3); 
            position: relative; background: rgba(255,255,255,0.02); touch-action: none;
        }
        .grid { position: absolute; background: rgba(255,255,255,0.08); pointer-events: none; }
        .ball-sprite { position: absolute; width: 24px; height: 24px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); border: 2px solid #ccc; box-shadow: 0 0 10px #fff; z-index: 10; font-size: 10px; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .preview-ball { position: absolute; width: 18px; height: 18px; background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="broadcast-data">
            <div class="row">RUNS <span id="r-val" style="color:var(--gold)">0</span></div>
            <div class="row">B <div class="dots" id="b-dots"></div> S <div class="dots" id="s-dots"></div> O <div class="dots" id="o-dots"></div></div>
        </div>
        
        <div id="field-container">
            <div class="diamond-formation">
                <div id="pip-2" class="base-pip"></div>
                <div id="pip-3" class="base-pip"></div>
                <div id="pip-1" class="base-pip"></div>
            </div>
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <path d="M50 95 L15 45 Q50 5 85 45 Z" fill="#142614" />
                <line x1="50" y1="95" x2="10" y2="40" stroke="white" stroke-width="0.5" />
                <line x1="50" y1="95" x2="90" y2="40" stroke="white" stroke-width="0.5" />
                <circle cx="50" cy="95" r="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-dasharray="2,2" /> <circle cx="50" cy="95" r="50" fill="none" stroke="rgba(255,255,255,0.1)" stroke-dasharray="2,2" /> <circle cx="50" cy="95" r="70" fill="none" stroke="rgba(255,255,255,0.2)" /> <text x="50" y="22" font-size="3" fill="#444" text-anchor="middle">HR FENCE</text>
            </svg>
        </div>
    </div>

    <div class="zone-panel">
        <div id="sz">
            <div class="grid" style="width:1px; height:100%; left:33.3%"></div>
            <div class="grid" style="width:1px; height:100%; left:66.6%"></div>
            <div class="grid" style="height:1px; width:100%; top:33.3%"></div>
            <div class="grid" style="height:1px; width:100%; top:66.6%"></div>
        </div>
        <div style="font-size: 9px; color: #444; letter-spacing: 1px; font-weight: 700;">STRIKE ZONE SIMULATOR</div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');
    const field = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let game = { r:0, b:0, s:0, o:0, bases:[false,false,false], locked: false };

    function drawHit(ft, angle) {
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        // Scale distance to fit SVG (max ft ~450 -> radius ~80)
        const radius = (ft / 450) * 80;
        const x2 = 50 + (angle * 0.8);
        const y2 = 95 - radius;
        
        line.setAttribute("x1", "50"); line.setAttribute("y1", "95");
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("stroke", "var(--orange)");
        line.setAttribute("stroke-width", "1.5");
        line.setAttribute("class", "hit-line");
        field.appendChild(line);
    }

    function updateUI() {
        document.getElementById('r-val').innerText = game.r;
        const render = (id, count, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<count?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', game.b, 3, 'b-on');
        render('s-dots', game.s, 2, 's-on');
        render('o-dots', game.o, 2, 'o-on');
        
        document.getElementById('pip-1').className = `base-pip ${game.bases[0]?'occupied':''}`;
        document.getElementById('pip-2').className = `base-pip ${game.bases[1]?'occupied':''}`;
        document.getElementById('pip-3').className = `base-pip ${game.bases[2]?'occupied':''}`;
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(game.locked) return;
        const r = sz.getBoundingClientRect();
        const t = e.touches[0];
        const tx = t.clientX - r.left; const ty = t.clientY - r.top;
        
        game.locked = true;
        const time = v.currentTime;
        const p = pitches.find(p => Math.abs(time - p.t) < 0.6);

        sz.querySelectorAll('.ball-sprite').forEach(b => b.remove());

        if(p) {
            const px = ((p.x + 0.75) / 1.5) * 160;
            const py = ((1.0 - p.y) / 2.0) * 210;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            
            const ball = document.createElement('div'); ball.className = 'ball-sprite'; ball.innerText = '1';
            ball.style.left = px+'px'; ball.style.top = py+'px'; sz.appendChild(ball);

            if(dist < 40) {
                let ft = Math.floor(420 - (dist * 4));
                drawHit(ft, tx-px);
                handleHitLogic(ft);
            } else { game.s++; }
        } else { game.s++; }
        
        if(game.s >= 3) { game.s = 0; game.o++; }
        updateUI();
    });

    function handleHitLogic(ft) {
        let m = 0;
        if(ft >= 400) m = 4; else if(ft >= 300) m = 2; else if(ft >= 200) m = 1;
        if(m > 0) {
            game.s = 0; game.b = 0;
            for(let i=0; i<m; i++) {
                if(game.bases[2]) game.r++;
                game.bases[2] = game.bases[1]; game.bases[1] = game.bases[0];
                game.bases[0] = (i === 0 && m < 4);
            }
        } else { game.o++; }
    }

    setInterval(() => {
        const now = v.currentTime;
        // Baseball preview 0.4s before
        const up = pitches.find(p => p.t > now && p.t - now < 0.4);
        sz.querySelectorAll('.preview-ball').forEach(pb => pb.remove());
        if(up) {
            const ux = ((up.x + 0.75) / 1.5) * 160;
            const uy = ((1.0 - up.y) / 2.0) * 210;
            const pb = document.createElement('div'); pb.className = 'preview-ball';
            pb.style.left = ux+'px'; pb.style.top = uy+'px'; sz.appendChild(pb);
        }

        if (now < 0.3) {
            game.locked = false;
            field.querySelectorAll('.hit-line').forEach(l => l.remove());
            sz.innerHTML = '<div class="grid" style="width:1px; height:100%; left:33.3%"></div><div class="grid" style="width:1px; height:100%; left:66.6%"></div><div class="grid" style="height:1px; width:100%; top:33.3%"></div><div class="grid" style="height:1px; width:100%; top:66.6%"></div>';
        } else if (pitches.some(p => p.t > now && p.t - now < 0.4)) {
            game.locked = false;
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
