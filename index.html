<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #1a331a; --tan: #c4a484; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        #header { height: 4vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); border-bottom: 1px solid #333; z-index: 10; }
        
        #v-frame { width: 100%; height: 45vh; overflow: hidden; position: relative; background: #000; }
        video { height: 100%; width: 100%; object-fit: cover; position: absolute; top: 0; left: 0; pointer-events: none; }

        #deck { 
            height: 51vh; display: grid; grid-template-columns: 1fr 1fr; 
            background: var(--bg); padding: 8px; gap: 8px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .left-panel { display: flex; flex-direction: column; gap: 5px; }
        .score-box { background: rgba(255,255,255,0.05); padding: 6px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-weight: 800; border-left: 3px solid var(--gold); }
        .dots { display: flex; gap: 3px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); } .s-on { background: var(--gold); } .o-on { background: #e74c3c; }

        #field-container { 
            height: 180px; background: #080808; border: 1px solid #222; border-radius: 4px; 
            position: relative; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
        }
        .field-svg { width: 100%; height: 115%; transform: translateY(10%); }

        /* Permanent Bases */
        .base-diamond { position: absolute; bottom: 12%; left: 50%; width: 36px; height: 36px; transform: translateX(-50%); pointer-events: none; z-index: 5; }
        .base { position: absolute; width: 6px; height: 6px; background: #333; transform: rotate(45deg); border: 1px solid #555; transition: 0.2s; }
        #base-home { bottom: -10px; left: 15px; } /* Mock Home Plate */
        #base-2 { top: 0; left: 15px; } #base-3 { top: 15px; left: 0; } #base-1 { top: 15px; right: 0; } 
        .runner { background: #fff !important; box-shadow: 0 0 8px #fff; }

        .right-panel { display: flex; flex-direction: column; gap: 4px; align-items: center; justify-content: center; }
        #feedback-area { width: 100%; text-align: center; padding-bottom: 5px; min-height: 55px; }
        #res-main { color: var(--gold); font-size: 16px; font-weight: 900; text-transform: uppercase; }
        #res-sub { color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase; margin-top: 1px; }

        /* Very Light Strike Zone */
        #strike-zone { 
            width: 135px; height: 170px; border: 1px solid rgba(255,255,255,0.08); 
            background: rgba(255,255,255,0.01); position: relative; touch-action: none; border-radius: 2px;
            margin-right: 15px; margin-bottom: 30px; 
        }
        
        /* Ball with Red Seams */
        .ball-hit { 
            position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; 
            transform: translate(-50%, -50%); z-index: 5; border: 1px solid #ccc;
            background-image: radial-gradient(circle at 30% 30%, transparent 60%, rgba(255,0,0,0.2) 65%, transparent 70%),
                              radial-gradient(circle at 70% 70%, transparent 60%, rgba(255,0,0,0.2) 65%, transparent 70%);
        }
        
        /* Large Light Brown Tap Point */
        .tap-point { position: absolute; width: 22px; height: 22px; background: var(--tan); border-radius: 50%; transform: translate(-50%, -50%); z-index: 6; opacity: 0.8; border: 1px solid #8d735b; }

        /* Blue Dotted Direction Line */
        .dir-line { position: absolute; height: 2px; border-top: 2px dotted var(--blue); transform-origin: 0 0; z-index: 4; pointer-events: none; }
    </style>
</head>
<body>

<div id="header">CRONIN BASEBALL</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="score-box">
            <span>R: <span id="r-val" style="color:var(--gold)">0</span></span>
            <div class="dots" id="b-dots"></div><div class="dots" id="s-dots"></div><div class="dots" id="o-dots"></div>
        </div>
        <div id="field-container">
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <path d="M50 98 L15 50 Q50 15 85 50 Z" fill="var(--grass)" />
                <text x="50" y="85" font-size="2.5" fill="#fff" font-weight="bold" text-anchor="middle">S</text>
                <text x="50" y="65" font-size="2.5" fill="#fff" font-weight="bold" text-anchor="middle">D</text>
                <text x="50" y="45" font-size="2.5" fill="#fff" font-weight="bold" text-anchor="middle">T</text>
                <text x="50" y="25" font-size="3" fill="#fff" font-weight="900" text-anchor="middle">HR</text>
                <line x1="50" y1="98" x2="12" y2="45" stroke="#444" stroke-width="0.5" />
                <line x1="50" y1="98" x2="88" y2="45" stroke="#444" stroke-width="0.5" />
            </svg>
            <div class="base-diamond">
                <div id="base-2" class="base"></div><div id="base-3" class="base"></div><div id="base-1" class="base"></div>
                <div id="base-home" class="base"></div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="feedback-area">
            <div id="res-main"></div>
            <div id="res-sub"></div>
        </div>
        <div id="strike-zone"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const field = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(g.processed) return; 
        
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.8);
        g.processed = true; 

        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const tap = document.createElement('div'); tap.className='tap-point';
        tap.style.left=tx+'px'; tap.style.top=ty+'px'; sz.appendChild(tap);

        if(pIdx !== -1) {
            const p = pitches[pIdx];
            const px = ((p.x + 1) / 2) * sz.offsetWidth;
            const py = ((1 - p.y) / 2) * sz.offsetHeight;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            const tDiff = Math.abs(now - p.t);

            const ball = document.createElement('div'); ball.className='ball-hit';
            ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);

            // Draw Blue Dotted Line
            const line = document.createElement('div'); line.className='dir-line';
            const angleDeg = Math.atan2(py - ty, px - tx) * 180 / Math.PI;
            line.style.width = dist + 'px';
            line.style.left = tx + 'px'; line.style.top = ty + 'px';
            line.style.transform = `rotate(${angleDeg}deg)`;
            sz.appendChild(line);

            if(dist < 50) {
                let timing = tDiff < 0.1 ? "ON TIME" : (now < p.t ? "EARLY" : "LATE");
                let contact = dist < 12 ? "BARREL" : (dist < 28 ? "SOLID" : "WEAK");
                let ft = Math.floor(450 - (dist * 5) - (tDiff * 400));
                handleHit(ft, tx-px, timing, contact);
            } else { addStrike("WHIFF"); }
        } else { addStrike("MISSED WINDOW"); }
        updateUI();
    });

    function handleHit(ft, angle, timing, contact) {
        let res = "OUT"; let move = 0;
        if(Math.abs(angle) > 55) { addStrike(`FOUL (${timing})`); return; }
        if(ft >= 380) { res = "HOME RUN"; move = 4; }
        else if(ft >= 310) { res = "TRIPLE"; move = 3; }
        else if(ft >= 230) { res = "DOUBLE"; move = 2; }
        else if(ft >= 130) { res = "SINGLE"; move = 1; }
        
        showMsg(res, `${timing} • ${contact} • ${ft}FT`);
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "50"); line.setAttribute("y1", "98");
        line.setAttribute("x2", 50 + (angle * 0.7)); line.setAttribute("y2", 98 - (ft/5.2));
        line.setAttribute("stroke", move > 0 ? "var(--orange)" : "#555");
        line.setAttribute("stroke-width", "2.5"); line.setAttribute("class", "hit-l");
        field.appendChild(line);

        if(move > 0) { g.b = 0; g.s = 0; advanceRunners(move); } 
        else { g.o++; g.b = 0; g.s = 0; checkState(); }
    }

    function advanceRunners(bases) {
        for(let i=0; i<bases; i++) {
            if(g.bases[2]) g.r++;
            g.bases[2] = g.bases[1]; g.bases[1] = g.bases[0];
            g.bases[0] = (i === 0 && bases < 4); 
        }
    }

    function addStrike(reason) {
        if (reason.includes("FOUL") && g.s === 2) { showMsg("FOUL", "COUNT REMAINS"); } 
        else {
            g.s++; showMsg("STRIKE", reason);
            if(g.s >= 3) { g.s = 0; g.b = 0; g.o++; showMsg("OUT", "STRIKEOUT"); checkState(); }
        }
    }

    function addBall(reason) {
        g.b++; showMsg("BALL", reason);
        if(g.b >= 4) {
            g.b = 0; g.s = 0; showMsg("WALK", "");
            if (g.bases[0] && g.bases[1] && g.bases[2]) g.r++;
            if (g.bases[0] && g.bases[1]) g.bases[2] = true;
            if (g.bases[0]) g.bases[1] = true;
            g.bases[0] = true;
        }
    }

    function checkState() {
        if(g.o >= 3) { g.o = 0; g.bases = [false,false,false]; showMsg("3 OUTS", "BASES CLEARED"); }
    }

    function showMsg(m, s) { 
        document.getElementById('res-main').innerText = m; 
        document.getElementById('res-sub').innerText = s; 
    }

    function updateUI() {
        document.getElementById('r-val').innerText = g.r;
        const render = (id, cur, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<cur?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', g.b, 3, 'b-on'); render('s-dots', g.s, 2, 's-on'); render('o-dots', g.o, 2, 'o-on');
        document.getElementById('base-1').className = `base ${g.bases[0]?'runner':''}`;
        document.getElementById('base-2').className = `base ${g.bases[1]?'runner':''}`;
        document.getElementById('base-3').className = `base ${g.bases[2]?'runner':''}`;
    }

    setInterval(() => {
        const now = v.currentTime;
        
        // Clear screen 2 seconds before arrival of next pitch
        const nextP = pitches.find(p => p.t > now);
        if(nextP && (nextP.t - now < 2.0) && (nextP.t - now > 1.9)) {
            showMsg("", "");
            sz.querySelectorAll('.ball-hit, .tap-point, .dir-line').forEach(el => el.remove());
            g.processed = false; 
        }

        const autoIdx = pitches.findIndex(p => now > p.t + 0.5 && g.lastIdx < pitches.indexOf(p));
        if(autoIdx !== -1) {
            g.lastIdx = autoIdx; g.processed = true;
            if(pitches[autoIdx].strike) { addStrike("TAKEN"); } else { addBall("OUTSIDE"); }
            updateUI();
        }

        if (now < 0.2) {
            g.processed = false; g.lastIdx = -1;
            field.querySelectorAll('.hit-l').forEach(l => l.remove());
            sz.querySelectorAll('.ball-hit, .tap-point, .dir-line').forEach(el => el.remove());
            showMsg("", ""); updateUI();
        }
    }, 50);
    updateUI();
</script>
</body>
</html>
