<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Statcast Interface</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        /* Grid Layout matching your screenshot */
        #main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 60vh 40vh;
            width: 100vw; height: 100vh;
        }

        /* Top Section: Full Width Video */
        #video-section {
            grid-column: 1 / span 2;
            position: relative;
            border-bottom: 2px solid #333;
            background: #111;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Left: Score and Feedback */
        #feedback-section {
            background: #050505;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            border-right: 1px solid #333;
        }

        /* Bottom Right: Strike Zone Interaction */
        #interaction-section {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* UI Elements */
        .scoreboard { background: #1a1a1a; padding: 10px; width: fit-content; border: 1px solid #444; }
        .dots { display: flex; gap: 5px; margin: 5px 0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; border: 1px solid #555; }
        .active-s { background: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
        .active-b { background: #3498db; }
        .active-o { background: #e74c3c; }

        .swing-card { background: #222; border-left: 4px solid #f1c40f; padding: 10px; width: 220px; }
        .label { font-size: 10px; color: #aaa; letter-spacing: 1px; }
        .value { font-size: 18px; font-weight: bold; margin-bottom: 5px; }

        /* Strike Zone Styling */
        #strike-zone {
            width: 180px; height: 240px;
            border: 2px solid rgba(255,255,255,0.4);
            position: relative;
            background: rgba(255,255,255,0.05);
        }
        .grid-v { position: absolute; width: 33.33%; height: 100%; border-right: 1px solid rgba(255,255,255,0.2); pointer-events: none; }
        .grid-h { position: absolute; height: 33.33%; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.2); pointer-events: none; }

        .ball-marker { position: absolute; width: 15px; height: 15px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .bat-marker { position: absolute; width: 8px; height: 40px; background: #8d6e63; transform: translate(-50%, -50%) rotate(45deg); z-index: 6; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="video-section">
        <video id="v" autoplay muted loop playsinline>
            <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="feedback-section">
        <div class="scoreboard">
            <div>B <div class="dots" id="b-row"></div></div>
            <div>S <div class="dots" id="s-row"></div></div>
            <div>O <div class="dots" id="o-row"></div></div>
        </div>
        
        <div class="swing-card" id="card" style="opacity: 0;">
            <div class="label">SWING TIMING</div>
            <div id="v-timing" class="value">GOOD</div>
            <div class="label">CONTACT RESULT</div>
            <div id="v-contact" class="value">SQUARED UP</div>
            <div class="label">HIT SPEED</div>
            <div id="v-speed" class="value" style="color:#f1c40f">103 MPH</div>
        </div>
    </div>

    <div id="interaction-section">
        <div id="strike-zone">
            <div class="grid-v" style="left:0"></div><div class="grid-v" style="left:33%"></div>
            <div class="grid-h" style="top:0"></div><div class="grid-h" style="top:33%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const zone = document.getElementById('strike-zone');
    const card = document.getElementById('card');
    
    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let state = { b:0, s:0, o:0 };

    function renderDots() {
        const make = (id, count, max, cls) => {
            const el = document.getElementById(id); el.innerHTML = '';
            for(let i=0; i<max; i++) el.innerHTML += `<div class="dot ${i<count?cls:''}"></div>`;
        }
        make('b-row', state.b, 3, 'active-b');
        make('s-row', state.s, 2, 'active-s');
        make('o-row', state.o, 2, 'active-o');
    }

    zone.addEventListener('click', (e) => {
        const r = zone.getBoundingClientRect();
        const tx = e.clientX - r.left;
        const ty = e.clientY - r.top;
        
        const now = v.currentTime;
        const p = pitches.find(p => Math.abs(now - p.t) < 0.7);

        // Visual bat
        const b = document.createElement('div'); b.className = 'bat-marker';
        b.style.left = tx+'px'; b.style.top = ty+'px'; zone.appendChild(b);

        if(p) {
            // Map p.x (-0.75 to 0.75) to 0 to 180px
            const px = ((p.x + 0.75) / 1.5) * 180;
            const py = ((1.0 - p.y) / 2.0) * 240;

            const ball = document.createElement('div'); ball.className = 'ball-marker';
            ball.style.left = px+'px'; ball.style.top = py+'px'; zone.appendChild(ball);

            const d = Math.sqrt((tx-px)**2 + (ty-py)**2);
            const speed = Math.max(0, 75 + 30 - (d/2));
            
            card.style.opacity = 1;
            document.getElementById('v-speed').innerText = Math.floor(speed) + " MPH";
            document.getElementById('v-contact').innerText = d < 30 ? "SQUARED UP" : "WEAK";
            
            if(speed < 90) { state.s++; } else { state.s = 0; state.b = 0; }
        } else {
            state.s++;
            card.style.opacity = 1;
            document.getElementById('v-contact').innerText = "WHIFF";
            document.getElementById('v-speed').innerText = "0 MPH";
        }

        if(state.s >= 3) { state.s=0; state.o++; }
        renderDots();
    });

    // Auto-clear logic: 1 second before next pitch
    setInterval(() => {
        const next = pitches.find(p => p.t > v.currentTime && p.t - v.currentTime < 1.0);
        if(next) {
            zone.querySelectorAll('.ball-marker, .bat-marker').forEach(m => m.remove());
            card.style.opacity = 0;
        }
    }, 100);

    renderDots();
</script>
</body>
</html>
