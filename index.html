<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro-Level Statcast Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap');
        
        :root { 
            --gold: #fcc419; 
            --red: #ff3b30; 
            --glass: rgba(0, 0, 0, 0.85);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-right: env(safe-area-inset-right);
        }

        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; margin: 0; background: #000; }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }

        /* FULL SCREEN BROADCAST VIEW */
        #video-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* BOTTOM-RIGHT HUD ANCHOR */
        #hud {
            position: absolute;
            bottom: calc(30px + var(--safe-bottom));
            right: calc(20px + var(--safe-right));
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
            z-index: 100;
        }

        /* BROADCAST STATS CARD */
        #stats-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-left: 5px solid var(--gold);
            padding: 15px 20px;
            width: 200px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .label { font-family: 'Inter'; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 2px; font-weight: 400; }
        .val { font-family: 'Orbitron'; font-size: 16px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #res { font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--gold); }

        /* INTERACTIVE ZONE (180x240) */
        #grid-universe {
            width: 180px;
            height: 240px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* THE STRIKE ZONE BOX */
        #strike-zone {
            position: absolute;
            left: 54px; top: 60px; /* Based on 0.30-0.70 X and 0.35-0.75 Y */
            width: 72px; height: 96px;
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.02);
            pointer-events: none;
        }

        /* DYNAMIC MARKERS */
        .marker { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; transition: opacity 0.15s ease; }
        #pitch-dot { width: 12px; height: 12px; background: var(--red); box-shadow: 0 0 15px var(--red); z-index: 10; }
        #swing-dot { width: 32px; height: 32px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.15); z-index: 11; }
        
    </style>
</head>
<body>

<div id="video-container">
    <video id="v" playsinline autoplay muted loop>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>

    <div id="hud">
        <div id="stats-card">
            <div class="stat-row"><div class="label">EV</div><div id="ev" class="val">---</div></div>
            <div class="stat-row"><div class="label">Time</div><div id="timing" class="val">---</div></div>
            <div class="stat-row" style="margin-top:10px;"><div id="res" class="val">LIVE</div></div>
        </div>

        <div id="grid-universe" onpointerdown="triggerSwing(event)">
            <div id="strike-zone"></div>
            <div id="pitch-dot" class="marker"></div>
            <div id="swing-dot" class="marker"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    
    // NEW BIBLE: 0-1 Normalized (0,0 = Bottom-Left)
    const PITCHES = [
        { t: 0.92,  x: 0.20, y: 0.55 }, { t: 6.40,  x: 0.25, y: 0.62 }, 
        { t: 10.86, x: 0.42, y: 0.52 }, { t: 16.08, x: 0.42, y: 0.50 },
        { t: 21.50, x: 0.48, y: 0.48 }, { t: 28.03, x: 0.18, y: 0.55 },
        { t: 36.17, x: 0.22, y: 0.52 }, { t: 41.84, x: 0.20, y: 0.50 }
    ];

    let currentIdx = -1;
    let swung = false;

    // Coordinate Translation
    const toX = (val) => val * 180;
    const toY = (val) => (1 - val) * 240; // Flip for screen coordinates

    v.ontimeupdate = () => {
        const time = v.currentTime;
        let foundIdx = -1;

        for (let i = 0; i < PITCHES.length; i++) {
            const p = PITCHES[i];
            const next = PITCHES[i+1];
            // MIDPOINT RESET
            const reset = next ? p.t + (next.t - p.t)/2 : p.t + 1.5;

            if (time >= p.t - 0.2 && time < reset) {
                foundIdx = i;
                updateOverlay(p);
            }
        }

        if (foundIdx === -1) clearHUD();
        if (foundIdx !== currentIdx) {
            currentIdx = foundIdx;
            swung = false;
        }
    };

    function updateOverlay(p) {
        const dot = document.getElementById('pitch-dot');
        dot.style.left = toX(p.x) + 'px';
        dot.style.top = toY(p.y) + 'px';
        dot.style.opacity = 1;

        // Auto Strike Call
        const isStrike = (p.x >= 0.3 && p.x <= 0.7 && p.y >= 0.35 && p.y <= 0.75);
        const resEl = document.getElementById('res');
        resEl.innerText = isStrike ? "STRIKE" : "BALL";
        resEl.style.color = isStrike ? "var(--gold)" : "#fff";
    }

    function clearHUD() {
        document.getElementById('pitch-dot').style.opacity = 0;
        document.getElementById('swing-dot').style.opacity = 0;
        document.getElementById('res').innerText = "LIVE";
        document.getElementById('res').style.color = "var(--gold)";
        document.getElementById('ev').innerText = "---";
        document.getElementById('timing').innerText = "---";
    }

    function triggerSwing(e) {
        if (currentIdx === -1 || swung) return;

        const box = document.getElementById('grid-universe').getBoundingClientRect();
        const sx = e.clientX - box.left;
        const sy = e.clientY - box.top;

        const sDot = document.getElementById('swing-dot');
        sDot.style.left = sx + 'px'; sDot.style.top = sy + 'px'; sDot.style.opacity = 1;

        const p = PITCHES[currentIdx];
        const distance = Math.sqrt(Math.pow(sx - toX(p.x), 2) + Math.pow(sy - toY(p.y), 2));

        // Interaction Logic
        if (distance < 50) {
            const evVal = (115 - (distance * 1.8)).toFixed(1);
            const tDiff = v.currentTime - p.t;
            document.getElementById('ev').innerText = evVal + " MPH";
            document.getElementById('timing').innerText = Math.abs(tDiff) < 0.1 ? "PERFECT" : (tDiff < 0 ? "EARLY" : "LATE");
        } else {
            document.getElementById('ev').innerText = "0.0 MPH";
            document.getElementById('timing').innerText = "WHIFF";
        }

        swung = true;
    }
</script>
</body>
</html>
