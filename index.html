<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Statcast Physics Pro</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --glass: rgba(255, 255, 255, 0.15); }
        body { 
            margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top);
        }
        
        /* 20% Side Crop to Zoom Video */
        #v-container { 
            width: 100%; aspect-ratio: 16 / 9; background: #000; overflow: hidden; position: relative; flex-shrink: 0; 
        }
        video { 
            width: 140%; /* Zooms in */
            height: 100%; 
            object-fit: cover; 
            margin-left: -20%; /* Crops 20% off left/right */
        }

        #ui-main { 
            flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; 
            background: #080808; padding: 12px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #left-col { display: flex; flex-direction: column; gap: 8px; }
        
        /* Compact Field */
        #field { 
            height: 120px; background: #1a331a; border-radius: 8px; border: 1px solid #333;
            position: relative; overflow: hidden;
            background-image: radial-gradient(circle at 50% 90%, #2e7d32 0%, #1b5e20 100%);
        }
        #p-line {
            position: absolute; bottom: 10%; left: 50%; width: 4px;
            background: linear-gradient(to top, var(--gold), transparent);
            transform-origin: bottom center; opacity: 0; z-index: 2;
        }

        /* Stats Cards */
        .card { background: var(--glass); padding: 8px; border-radius: 4px; border-left: 3px solid var(--gold); }
        .label { font-size: 10px; color: #aaa; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: 900; }

        .dots { display: flex; gap: 4px; margin-top: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .s-on { background: var(--gold); box-shadow: 0 0 5px var(--gold); }
        .b-on { background: var(--blue); }

        /* Interaction Zone */
        #right-col { display: flex; justify-content: center; align-items: center; }
        #sz { 
            width: 140px; height: 190px; border: 2px solid rgba(255,255,255,0.4); 
            position: relative; background: rgba(255,255,255,0.02); touch-action: none;
        }
        .grid-l { position: absolute; background: rgba(255,255,255,0.1); pointer-events: none; }

        /* Physics Objects */
        .ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 30; box-shadow: 0 0 15px #fff; }
        .bat { position: absolute; width: 45px; height: 45px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }
    </style>
</head>
<body>

<div id="v-container">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="ui-main">
    <div id="left-col">
        <div class="card">
            <div style="display:flex; justify-content:space-between">
                <div><div class="label">Runs</div><div id="runs" class="val">0</div></div>
                <div><div class="label">S</div><div id="s-dots" class="dots"></div></div>
                <div><div class="label">B</div><div id="b-dots" class="dots"></div></div>
            </div>
        </div>
        
        <div id="field"><div id="p-line"></div></div>

        <div class="card" id="fb" style="opacity:0">
            <div class="label" id="timing-txt">TIMING</div>
            <div class="val" id="contact-txt">SQUARED UP</div>
            <div class="val" id="velo-txt" style="color:var(--gold)">0 MPH</div>
        </div>
    </div>

    <div id="right-col">
        <div id="sz">
            <div class="grid-l" style="width:1px; height:100%; left:33%"></div>
            <div class="grid-l" style="width:1px; height:100%; left:66%"></div>
            <div class="grid-l" style="height:1px; width:100%; top:33%"></div>
            <div class="grid-l" style="height:1px; width:100%; top:66%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');
    const pLine = document.getElementById('p-line');
    const fb = document.getElementById('fb');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let state = { s:0, b:0, runs:0 };
    let swingLocked = false;
    let lastProcessedIdx = -1;

    function updateUI() {
        const render = (id, cur, max, cls) => {
            const el = document.getElementById(id); el.innerHTML = '';
            for(let i=0; i<max; i++) el.innerHTML += `<div class="dot ${i<cur?cls:''}"></div>`;
        };
        render('s-dots', state.s, 2, 's-on');
        render('b-dots', state.b, 3, 'b-on');
        document.getElementById('runs').innerText = state.runs;
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(swingLocked) return;
        const r = sz.getBoundingClientRect();
        const t = e.touches[0];
        processSwing(t.clientX - r.left, t.clientY - r.top);
    });

    function processSwing(tx, ty) {
        swingLocked = true;
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.7);
        const p = pitches[pIdx];

        sz.querySelectorAll('.ball, .bat').forEach(e => e.remove());
        const bat = document.createElement('div'); bat.className = 'bat';
        bat.style.left = tx+'px'; bat.style.top = ty+'px'; sz.appendChild(bat);

        if(p) {
            lastProcessedIdx = pIdx;
            const px = ((p.x + 0.75) / 1.5) * 140;
            const py = ((1.0 - p.y) / 2.0) * 190;
            const ball = document.createElement('div'); ball.className = 'ball';
            ball.style.left = px+'px'; ball.style.top = py+'px'; sz.appendChild(ball);

            const dx = tx - px; 
            const dy = ty - py;
            const d = Math.sqrt(dx*dx + dy*dy);

            fb.style.opacity = 1;
            if(d < 30) {
                const velo = Math.floor(118 - (d * 1.8));
                const dist = Math.floor(velo * 3.6);
                const timing = Math.abs(now - p.t) < 0.15 ? "PERFECT" : "GOOD";
                
                document.getElementById('timing-txt').innerText = timing;
                document.getElementById('contact-txt').innerText = "SQUARED UP";
                document.getElementById('velo-txt').innerText = velo + " MPH / " + dist + " FT";
                
                pLine.style.opacity = 1;
                pLine.style.height = (dist/4) + 'px';
                pLine.style.transform = `translateX(-50%) rotate(${dx*2}deg)`;

                if(velo > 98) state.runs++;
                state.s = 0; state.b = 0;
            } else {
                document.getElementById('timing-txt').innerText = "TOO LATE";
                document.getElementById('contact-txt').innerText = "WHIFF";
                document.getElementById('velo-txt').innerText = "0 MPH";
                state.s++;
            }
        } else {
            state.s++;
            fb.style.opacity = 0;
        }
        updateUI();
    }

    // High-frequency Loop
    setInterval(() => {
        const now = v.currentTime;
        
        // Reset swing lock between pitches
        const next = pitches.find(p => p.t > now && p.t - now < 1.0);
        if(next || now < 0.5) {
            if(now < 0.2 || (next && next.t - now < 0.3)) {
                swingLocked = false;
                pLine.style.opacity = 0;
                fb.style.opacity = 0;
                sz.querySelectorAll('.ball, .bat').forEach(e => e.remove());
            }
        }

        // Auto-Umpire
        pitches.forEach((p, i) => {
            if(now > p.t + 0.8 && lastProcessedIdx < i) {
                if(!swingLocked) {
                    if(Math.abs(p.x) <= 0.75 && Math.abs(p.y) <= 1.0) state.s++;
                    else state.b++;
                    updateUI();
                }
                lastProcessedIdx = i;
            }
        });

        // Loop Reset
        if(now < 0.5 && lastProcessedIdx > 0) {
            lastProcessedIdx = -1;
            state.s = 0; state.b = 0;
            updateUI();
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
