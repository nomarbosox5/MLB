<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Statcast Elite MVP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap');
        :root { --gold: #fcc419; --bg: #000; --red: #ff3e3e; --gray: #121212; --border: #222; }
        
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* VIDEO FEED SECTION */
        #v-area { height: 45vh; position: relative; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .start-btn { border: 1px solid #fff; color: #fff; padding: 12px 24px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        /* ANALYTICS & INTERACTION DASHBOARD */
        #dashboard { flex-grow: 1; display: flex; width: 100%; }

        /* Left Panel: Detailed Analytics */
        #stats-panel { width: 50%; padding: 20px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; }
        .data-row { border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .val { font-family: 'JetBrains Mono'; font-size: 18px; color: #fff; line-height: 1.2; }
        .val.highlight { color: var(--gold); font-size: 24px; }
        
        /* Right Panel: Scorebug & Touch Grid */
        #action-panel { width: 50%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 15px; background: #050505; }
        
        /* Integrated Scorebug */
        #scorebug { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--gray); padding: 10px; border-radius: 4px; width: 90%; margin-bottom: 20px;
            border: 1px solid #1a1a1a;
        }
        .count-stack { display: flex; flex-direction: column; gap: 4px; }
        .c-row { display: flex; align-items: center; font-size: 9px; color: #444; font-weight: 900; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #000; margin-left: 4px; border: 1px solid #222; }
        .dot.active { background: var(--gold); border: none; box-shadow: 0 0 5px var(--gold); }
        .dot.active-o { background: var(--red); border: none; box-shadow: 0 0 5px var(--red); }
        
        .diamond-wrap { position: relative; width: 32px; height: 32px; transform: rotate(45deg); margin-left: 5px; }
        .base { position: absolute; width: 10px; height: 10px; background: #222; border: 1px solid #333; }
        #b1 { top: 0; right: 0; } #b2 { top: 0; left: 0; } #b3 { bottom: 0; left: 0; }

        /* Interaction Grid */
        #grid { width: 160px; height: 160px; background: #080808; border: 1px solid #222; position: relative; }
        #strike-zone { position: absolute; left: 25%; top: 25%; width: 50%; height: 50%; border: 1px solid rgba(255,255,255,0.08); }

        /* Ball & Bat Visuals */
        .marker { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; }
        #ball { width: 12px; height: 12px; background: #fff; box-shadow: 0 0 12px #fff; z-index: 10; transition: opacity 0.1s; }
        #bat { width: 36px; height: 36px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.1); z-index: 11; }
    </style>
</head>
<body>

<div id="v-area">
    <div id="overlay" onclick="startApp()"><div class="start-btn">Connect Live Feed</div></div>
    <video id="v" playsinline muted loop>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="dashboard">
    <div id="stats-panel">
        <div class="data-row">
            <div class="label">Exit Velo</div>
            <div id="ev" class="val highlight">0.0 MPH</div>
        </div>
        <div class="data-row">
            <div class="label">Swing Timing</div>
            <div id="timing" class="val">---</div>
        </div>
        <div class="data-row">
            <div class="label">Contact Result</div>
            <div id="result" class="val">---</div>
        </div>
    </div>

    <div id="action-panel">
        <div id="scorebug">
            <div class="count-stack">
                <div class="c-row">B <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="c-row">S <div class="dot" id="s1"></div><div class="dot" id="s2"></div><div class="dot" id="s3"></div></div>
                <div class="c-row">O <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
            <div class="diamond-wrap">
                <div class="base" id="b2"></div><div class="base" id="b1"></div><div class="base" id="b3"></div>
            </div>
        </div>

        <div id="grid" onpointerdown="handleTap(event)">
            <div id="strike-zone"></div>
            <div id="ball" class="marker"></div>
            <div id="bat" class="marker"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const PITCHES = [
        { t: 0.92,  x: -0.75, y: 3.25 }, { t: 6.40,  x: -0.40, y: 3.50 }, 
        { t: 10.86, x: -0.25, y: 2.75 }, { t: 16.08, x: 0.15,  y: 2.60 },
        { t: 21.50, x: -0.95, y: 1.75 }, { t: 28.03, x: 0.20,  y: 2.75 }, 
        { t: 36.17, x: -0.95, y: 2.50 }, { t: 41.84, x: -0.80, y: 2.75 }
    ];

    let state = { idx: -1, strikes: 0 };
    const getX = (val) => 80 + (val * 35);
    const getY = (val) => 80 - (val * 35);

    function startApp() { document.getElementById('overlay').style.display = 'none'; v.play(); }

    v.ontimeupdate = () => {
        let match = PITCHES.findIndex(p => v.currentTime >= p.t - 0.4 && v.currentTime < p.t + 0.4);
        const b = document.getElementById('ball');
        if (match !== -1) {
            if (match !== state.idx) {
                state.idx = match;
                b.style.left = getX(PITCHES[match].x) + 'px';
                b.style.top = getY(PITCHES[match].y) + 'px';
            }
            b.style.opacity = (v.currentTime >= PITCHES[match].t - 0.1) ? 1 : 0.3;
        } else {
            b.style.opacity = 0;
            state.idx = -1;
        }
    };

    function handleTap(e) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        const bat = document.getElementById('bat');
        bat.style.left = sx + 'px'; bat.style.top = sy + 'px'; bat.style.opacity = 1;

        if (state.idx !== -1) {
            const p = PITCHES[state.idx];
            const dist = Math.sqrt(Math.pow(sx - getX(p.x), 2) + Math.pow(sy - getY(p.y), 2));
            const dt = v.currentTime - p.t;

            if (dist < 40) {
                const evVal = Math.max(0, 114 - (dist * 1.6)).toFixed(1);
                document.getElementById('ev').innerText = evVal + " MPH";
                document.getElementById('timing').innerText = Math.abs(dt) < 0.1 ? "GOOD" : (dt < 0 ? "EARLY" : "LATE");
                document.getElementById('result').innerText = dist < 12 ? "SQUARED UP" : "SOLID";
                state.strikes = 0;
            } else {
                state.strikes = Math.min(3, state.strikes + 1);
                document.getElementById('ev').innerText = "0.0 MPH";
                document.getElementById('timing').innerText = "STRIKE";
                document.getElementById('result').innerText = "WHIFF";
            }
            updateStrikes();
        }
    }

    function updateStrikes() {
        for(let i=1; i<=3; i++) document.getElementById('s'+i).className = i <= state.strikes ? 'dot active' : 'dot';
        if(state.strikes >= 3) setTimeout(() => { state.strikes = 0; updateStrikes(); }, 1000);
    }
</script>
</body>
</html>
