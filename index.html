<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #2d5a27; --grass-light: #3a6d32; --dirt: #b38b59; --track: #8c6d45; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        #header { height: 3vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; letter-spacing: 2px; color: var(--gold); }
        
        #v-frame { width: 100%; height: 60vh; overflow: hidden; position: relative; background: #000; }
        video { height: 100%; width: auto; object-fit: contain; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

        #deck { 
            height: 37vh; display: grid; grid-template-columns: 1.1fr 0.9fr; 
            background: var(--bg); padding: 5px 10px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .left-panel { display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: flex-end; }
        .score-box { width: 100%; background: #111; padding: 6px; border-radius: 4px; display: flex; justify-content: space-around; font-size: 11px; font-weight: 900; border: 1px solid #333; }
        
        #field-container { 
            width: 100%; max-width: 210px; aspect-ratio: 1/1; 
            position: relative; overflow: visible;
        }
        .field-svg { width: 100%; height: 100%; }

        .base-diamond { position: absolute; bottom: 10%; left: 50%; width: 34px; height: 34px; transform: translateX(-50%); pointer-events: none; z-index: 5; }
        .base { position: absolute; width: 5px; height: 5px; background: #888; transform: rotate(45deg); border: 1px solid #aaa; }
        #base-home { bottom: 0; left: 14.5px; width: 6px; height: 6px; clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 50%); transform: none; background: #fff; }
        #base-1 { bottom: 14.5px; right: 0; } #base-2 { top: 0; left: 14.5px; } #base-3 { bottom: 14.5px; left: 0; }
        .runner { background: var(--gold) !important; box-shadow: 0 0 12px var(--gold); }

        .right-panel { display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: flex-end; }
        #feedback-area { width: 100%; text-align: center; height: 35px; }
        #res-main { color: var(--gold); font-size: 13px; font-weight: 900; margin: 0; }
        #res-sub { color: #888; font-size: 8px; font-weight: 700; margin: 0; }

        #strike-zone { 
            width: 120px; height: 150px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.03); position: relative; touch-action: none; 
            border-radius: 4px; margin-bottom: 5px;
        }
        
        .ball-asset { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 1px solid #999; }
        .bat-asset { position: absolute; width: 18px; height: 18px; background: #5d4037; border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; border: 1px solid #3e2723; }
        
        .hit-line { stroke-linecap: round; filter: drop-shadow(0 0 2px rgba(255,255,255,0.3)); }
    </style>
</head>
<body>

<div id="header">CRONIN BASEBALL PRO</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="score-box">
            <div style="color:var(--blue)">B: <span id="b-val">0</span></div>
            <div style="color:var(--gold)">S: <span id="s-val">0</span></div>
            <div style="color:#e74c3c">O: <span id="o-val">0</span></div>
            <div style="color:#fff">R: <span id="r-val">0</span></div>
        </div>
        <div id="field-container">
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <defs>
                    <pattern id="grassStripes" x="0" y="0" width="10" height="100" patternUnits="userSpaceOnUse">
                        <rect width="5" height="100" fill="var(--grass)" />
                        <rect x="5" width="5" height="100" fill="var(--grass-light)" />
                    </pattern>
                </defs>
                
                <path d="M50 95 L0 45 A 70 70 0 0 1 100 45 L50 95" fill="url(#grassStripes)" />
                
                <path d="M50 95 L0 45 A 70 70 0 0 1 100 45 L95 48 A 65 65 0 0 0 5 48 Z" fill="var(--track)" opacity="0.8" />
                
                <path d="M50 95 L25 70 L50 45 L75 70 Z" fill="var(--dirt)" />
                
                <text x="50" y="52" font-size="4" font-weight="900" fill="rgba(255,255,255,0.6)" text-anchor="middle">400</text>
                <text x="22" y="55" font-size="3.5" font-weight="900" fill="rgba(255,255,255,0.4)" text-anchor="middle" transform="rotate(-40, 22, 55)">375</text>
                <text x="78" y="55" font-size="3.5" font-weight="900" fill="rgba(255,255,255,0.4)" text-anchor="middle" transform="rotate(40, 78, 55)">375</text>
                <text x="8" y="65" font-size="3" font-weight="900" fill="rgba(255,255,255,0.3)" text-anchor="middle">330</text>
                <text x="92" y="65" font-size="3" font-weight="900" fill="rgba(255,255,255,0.3)" text-anchor="middle">330</text>

                <path d="M50 88 L38 76 L50 64 L62 76 Z" fill="var(--grass)" />
                
                <line x1="50" y1="95" x2="0" y2="45" stroke="#fff" stroke-width="0.5" />
                <line x1="50" y1="95" x2="100" y2="45" stroke="#fff" stroke-width="0.5" />
            </svg>
            <div class="base-diamond">
                <div id="base-2" class="base"></div><div id="base-3" class="base"></div><div id="base-1" class="base"></div><div id="base-home" class="base"></div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="feedback-area">
            <p id="res-main">READY</p>
            <p id="res-sub">WAITING FOR PITCH</p>
        </div>
        <div id="strike-zone">
            <div style="position:absolute; width:100%; height:1px; top:33.3%; background:rgba(255,255,255,0.1);"></div>
            <div style="position:absolute; width:100%; height:1px; top:66.6%; background:rgba(255,255,255,0.1);"></div>
            <div style="position:absolute; height:100%; width:1px; left:33.3%; background:rgba(255,255,255,0.1);"></div>
            <div style="position:absolute; height:100%; width:1px; left:66.6%; background:rgba(255,255,255,0.1);"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const fSvg = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.9);
        if(g.processed || pIdx === -1) return; 
        
        g.processed = true; g.lastIdx = pIdx;
        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const p = pitches[pIdx];
        const px = ((p.x + 1) / 2) * sz.offsetWidth;
        const py = ((1 - p.y) / 2) * sz.offsetHeight;
        const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
        const tDiff = now - p.t;

        const bat = document.createElement('div'); bat.className='bat-asset';
        bat.style.left=tx+'px'; bat.style.top=ty+'px'; sz.appendChild(bat);
        const ball = document.createElement('div'); ball.className='ball-asset';
        ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);

        if(dist < 55) {
            const launchAngle = ((ty - py) / 20) * 45; 
            const hitAngle = ((tx - px) * 1.6) + (tDiff * 140); 
            const exitVel = 110 - (dist * 1.2) - (Math.abs(tDiff) * 300);
            let ft = (exitVel * 4.3) * (Math.cos(launchAngle * Math.PI / 180));
            if (launchAngle < -5) ft = Math.min(ft, 100); 
            if (launchAngle > 40) ft = Math.min(ft, 260); 
            handleHit(ft, hitAngle, launchAngle, exitVel);
        } else { addStrike("WHIFF"); }
        updateUI();
    });

    function handleHit(ft, angle, la, ev) {
        let res = "OUT"; let move = 0;
        let absAngle = Math.abs(angle);
        if(absAngle > 54) { addStrike("FOUL"); return; }

        if (ft < 110) res = la < 0 ? "GROUND OUT" : "POP OUT";
        else if (ft < 225) { res = "SINGLE"; move = 1; }
        else if (ft < 325) { res = "DOUBLE"; move = 2; }
        else {
            let fence = (absAngle > 35) ? 335 : 402;
            if (ft >= fence) { res = "HOME RUN"; move = 4; }
            else { res = "TRIPLE"; move = 3; }
        }
        
        showMsg(res, `${Math.floor(ev)} MPH • ${Math.floor(ft)} FT`);
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "50"); line.setAttribute("y1", "95");
        line.setAttribute("x2", 50 + (angle * 0.8)); line.setAttribute("y2", 95 - (Math.min(ft, 420)/4.3));
        line.setAttribute("stroke", move > 0 ? "var(--gold)" : "#666");
        line.setAttribute("stroke-width", "2"); line.setAttribute("class", "hit-line");
        fSvg.appendChild(line);

        if(move > 0) { g.b = 0; g.s = 0; advanceRunners(move); } 
        else { g.o++; g.b = 0; g.s = 0; checkState(); }
    }

    function advanceRunners(bases) {
        for(let i=0; i<bases; i++) {
            if(g.bases[2]) g.r++;
            g.bases[2] = g.bases[1]; g.bases[1] = g.bases[0];
            g.bases[0] = (i === 0 && bases < 4); 
            if(bases === 4 && i === 3) g.r++;
        }
    }

    function addStrike(reason) {
        if (reason.includes("FOUL") && g.s === 2) showMsg("FOUL", "COUNT HELD");
        else {
            g.s++; showMsg("STRIKE", reason);
            if(g.s >= 3) { g.s = 0; g.b = 0; g.o++; showMsg("OUT", "STRIKEOUT"); checkState(); }
        }
    }

    function addBall(reason) {
        g.b++; showMsg("BALL", reason);
        if(g.b >= 4) {
            g.b = 0; g.s = 0; showMsg("WALK", "");
            if (g.bases[0] && g.bases[1] && g.bases[2]) g.r++;
            else if (g.bases[0] && g.bases[1]) g.bases[2] = true;
            else if (g.bases[0]) g.bases[1] = true;
            g.bases[0] = true;
        }
    }

    function checkState() {
        if(g.o >= 3) { g.o = 0; g.bases = [false,false,false]; showMsg("3 OUTS", "SIDE RETIRED"); }
    }

    function showMsg(m, s) { document.getElementById('res-main').innerText = m; document.getElementById('res-sub').innerText = s; }

    function updateUI() {
        document.getElementById('r-val').innerText = g.r;
        document.getElementById('b-val').innerText = g.b;
        document.getElementById('s-val').innerText = g.s;
        document.getElementById('o-val').innerText = g.o;
        document.getElementById('base-1').className = `base ${g.bases[0]?'runner':''}`;
        document.getElementById('base-2').className = `base ${g.bases[1]?'runner':''}`;
        document.getElementById('base-3').className = `base ${g.bases[2]?'runner':''}`;
    }

    setInterval(() => {
        const now = v.currentTime;
        const autoIdx = pitches.findIndex(p => now > p.t + 0.8 && g.lastIdx < pitches.indexOf(p));
        if(autoIdx !== -1) {
            g.lastIdx = autoIdx; g.processed = true;
            if(pitches[autoIdx].strike) addStrike("TAKEN"); else addBall("OUTSIDE");
            updateUI();
        }

        if (now < 0.2) {
            if (g.lastIdx !== -1) {
                g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };
                document.querySelectorAll('.hit-line').forEach(el => el.remove());
                sz.querySelectorAll('.ball-asset, .bat-asset').forEach(el => el.remove());
                showMsg("READY", "WAITING FOR PITCH"); 
                updateUI();
            }
        } else {
            if(g.processed && !pitches.some(p => Math.abs(now - p.t) < 0.9)) g.processed = false;
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
