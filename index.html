<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Statcast Pro Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;900&display=swap');
        
        :root { 
            --gold: #fcc419; --red: #ff3b30; --glass: rgba(0, 0, 0, 0.7);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-right: env(safe-area-inset-right);
        }

        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; margin: 0; background: #000; }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }

        /* FULL SCREEN VIDEO */
        #video-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* PROFESSIONAL OVERLAY HUD */
        #hud {
            position: absolute;
            bottom: calc(20px + var(--safe-bottom));
            right: calc(20px + var(--safe-right));
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            z-index: 100;
        }

        /* ANALYTICS BOX */
        #stats-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--gold);
            padding: 12px 20px;
            width: 180px;
            border-radius: 4px;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .label { font-family: 'Inter'; font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-family: 'Orbitron'; font-size: 14px; color: #fff; }
        #res { font-size: 18px; font-weight: 900; }

        /* THE STRIKE ZONE GRID (180x240 Normalized) */
        #grid-container {
            width: 180px;
            height: 240px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        /* THE STRINGS (Strike Zone: 0.30-0.70 X | 0.35-0.75 Y) */
        #strike-zone {
            position: absolute;
            left: 54px; top: 60px; /* 30% and 25% from top */
            width: 72px; height: 96px; /* 40% width and 40% height */
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1);
        }

        /* VISUAL MARKERS */
        .marker { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        #pitch-dot { width: 14px; height: 14px; background: var(--red); box-shadow: 0 0 15px var(--red); z-index: 5; }
        #swing-dot { width: 30px; height: 30px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.2); z-index: 6; }
        
    </style>
</head>
<body>

<div id="video-container">
    <video id="v" playsinline autoplay muted loop>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>

    <div id="hud">
        <div id="stats-card">
            <div class="stat-row"><div class="label">Exit Velo</div><div id="ev" class="val">--</div></div>
            <div class="stat-row"><div class="label">Timing</div><div id="timing" class="val">--</div></div>
            <div class="stat-row" style="margin-top:8px;"><div id="res" class="val">WAITING...</div></div>
        </div>

        <div id="grid-container" onpointerdown="processSwing(event)">
            <div id="strike-zone"></div>
            <div id="pitch-dot" class="marker"></div>
            <div id="swing-dot" class="marker"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    
    // THE BIBLE: Normalized 0-1 (0,0 is Bottom-Left)
    const PITCHES = [
        { t: 0.92,  x: 0.20, y: 0.55 }, { t: 6.40,  x: 0.25, y: 0.62 }, 
        { t: 10.86, x: 0.42, y: 0.52 }, { t: 16.08, x: 0.42, y: 0.50 },
        { t: 21.50, x: 0.48, y: 0.48 }, { t: 28.03, x: 0.18, y: 0.55 },
        { t: 36.17, x: 0.22, y: 0.52 }, { t: 41.84, x: 0.20, y: 0.50 }
    ];

    let currentPitchIdx = -1;
    let hasSwungAtCurrent = false;

    // Translation to 180x240 Grid
    const getX = (val) => val * 180;
    const getY = (val) => (1 - val) * 240; // Inverting Y for browser top-down logic

    v.ontimeupdate = () => {
        const now = v.currentTime;
        let active = -1;

        for (let i = 0; i < PITCHES.length; i++) {
            const p = PITCHES[i];
            const next = PITCHES[i+1];
            // MIDPOINT RESET LOGIC
            const reset = next ? p.t + (next.t - p.t)/2 : p.t + 2;

            if (now >= p.t - 0.3 && now < reset) {
                active = i;
                showPitch(p);
            }
        }

        if (active === -1) resetUI();
        if (active !== currentPitchIdx) {
            currentPitchIdx = active;
            hasSwungAtCurrent = false;
        }
    };

    function showPitch(p) {
        const dot = document.getElementById('pitch-dot');
        dot.style.left = getX(p.x) + 'px';
        dot.style.top = getY(p.y) + 'px';
        dot.style.opacity = 1;

        // Passive Strike Call
        const isStrike = (p.x >= 0.3 && p.x <= 0.7 && p.y >= 0.35 && p.y <= 0.75);
        const resLabel = document.getElementById('res');
        resLabel.innerText = isStrike ? "STRIKE" : "BALL";
        resLabel.style.color = isStrike ? "var(--gold)" : "#fff";
    }

    function resetUI() {
        document.getElementById('pitch-dot').style.opacity = 0;
        document.getElementById('swing-dot').style.opacity = 0;
        document.getElementById('res').innerText = "TRACKING...";
        document.getElementById('res').style.color = "#555";
        document.getElementById('ev').innerText = "--";
        document.getElementById('timing').innerText = "--";
    }

    function processSwing(e) {
        if (currentPitchIdx === -1 || hasSwungAtCurrent) return;

        const rect = document.getElementById('grid-container').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;

        const sDot = document.getElementById('swing-dot');
        sDot.style.left = sx + 'px'; sDot.style.top = sy + 'px'; sDot.style.opacity = 1;

        const p = PITCHES[currentPitchIdx];
        const dist = Math.sqrt(Math.pow(sx - getX(p.x), 2) + Math.pow(sy - getY(p.y), 2));

        // Physics: Within 45px is a "Hit"
        if (dist < 45) {
            const velo = (110 - (dist * 1.5)).toFixed(1);
            const offset = v.currentTime - p.t;
            document.getElementById('ev').innerText = velo + " MPH";
            document.getElementById('timing').innerText = Math.abs(offset) < 0.1 ? "PERFECT" : (offset < 0 ? "EARLY" : "LATE");
        } else {
            document.getElementById('ev').innerText = "0.0 MPH";
            document.getElementById('timing').innerText = "WHIFF";
        }

        hasSwungAtCurrent = true;
    }
</script>
</body>
</html>
