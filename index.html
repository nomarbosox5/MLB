<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB Challenge - 8 Pitch Sync</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-section { width: 100%; background: #000; flex-shrink: 0; border-bottom: 2px solid #333; }
        video { width: 100%; max-height: 45vh; display: block; }

        #dashboard { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px; }
        #results { width: 160px; }
        #outcome { font-size: 2.2rem; font-weight: 900; color: #00ffcc; text-transform: uppercase; margin: 0; line-height: 1; }
        #timing-fb { font-size: 0.9rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        /* Nestico Box */
        #statcast-box { width: 140px; height: 195px; border: 4px solid #fff; position: relative; background: rgba(255,255,255,0.05); }
        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #pitch-dot { width: 22px; height: 22px; background: white; opacity: 0; box-shadow: 0 0 15px #fff; z-index: 5; }
        #swing-dot { width: 32px; height: 32px; background: #ff4d4d; border: 2px solid #fff; display: none; z-index: 6; }
        #tap-zone { position: absolute; top: -60px; left: -60px; right: -60px; bottom: -60px; z-index: 10; }
    </style>
</head>
<body>

    <div id="video-section">
        <video id="v" autoplay muted loop playsinline>
            <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="dashboard">
        <div id="results">
            <h1 id="outcome">READY</h1>
            <div id="timing-fb">WATCH THE ZONE</div>
        </div>

        <div id="statcast-box">
            <div id="tap-zone"></div>
            <div id="pitch-dot" class="dot"></div>
            <div id="swing-dot" class="dot"></div>
        </div>
    </div>

<script>
    const video = document.getElementById('v');
    const outcome = document.getElementById('outcome');
    const timingFb = document.getElementById('timing-fb');
    const pDot = document.getElementById('pitch-dot');
    const sDot = document.getElementById('swing-dot');

    // --- FULL 8-PITCH HARDCODED ARRAY ---
    // t = seconds, x = 0-140, y = 0-195
    const PITCH_DATA = [
        { t: 0.92,  x: 20,  y: 175, res: "HOME RUN" },
        { t: 6.40,  x: 110, y: 35,  res: "FLY OUT"  },
        { t: 10.86, x: 75,  y: 95,  res: "SINGLE"   },
        { t: 16.08, x: 100, y: 80,  res: "POP UP"   },
        { t: 21.50, x: 105, y: 105, res: "GROUNDER" },
        { t: 28.03, x: 10,  y: 150, res: "BALL"     },
        { t: 33.00, x: 25,  y: 110, res: "DOUBLE"   },
        { t: 36.17, x: 10,  y: 130, res: "BALL"     }
    ];

    let currentPitch = null;

    video.addEventListener('timeupdate', () => {
        const now = video.currentTime;
        
        // Match current time to pitch time (with 0.3s window)
        const active = PITCH_DATA.find(p => Math.abs(now - p.t) < 0.3);

        if (active) {
            currentPitch = active;
            pDot.style.left = active.x + 'px';
            pDot.style.top = active.y + 'px';
            pDot.style.opacity = "1";
        } else {
            pDot.style.opacity = "0";
            currentPitch = null;
            // Clear swing on loop
            if (now < 0.2) {
                sDot.style.display = "none";
                outcome.innerText = "READY";
                outcome.style.color = "#00ffcc";
            }
        }
    });

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = document.getElementById('statcast-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;

        sDot.style.left = ux + 'px';
        sDot.style.top = uy + 'px';
        sDot.style.display = 'block';

        if (currentPitch) {
            const diff = Math.abs(video.currentTime - currentPitch.t);
            // Hit logic: 0.25s timing window
            if (diff < 0.25) {
                outcome.innerText = currentPitch.res;
                outcome.style.color = "#00ffcc";
                timingFb.innerText = "PERFECT TIMING";
            } else {
                outcome.innerText = "WHIFF";
                outcome.style.color = "#ff4d4d";
                timingFb.innerText = video.currentTime < currentPitch.t ? "TOO EARLY" : "TOO LATE";
            }
        } else {
            outcome.innerText = "MISS";
            outcome.style.color = "#ff4d4d";
            timingFb.innerText = "OUT OF SEQUENCE";
        }
    });
</script>
</body>
</html>
