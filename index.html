<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Pro</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --grass: #1e3d1a; --board: #111; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        #header { height: 3vh; background: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #444; }
        
        #v-frame { width: 100%; height: 58vh; overflow: hidden; position: relative; }
        video { height: 100%; width: auto; object-fit: contain; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

        /* OLD SCHOOL STRIP BOARD */
        #scoreboard-strip {
            height: 6vh; background: var(--board); border-top: 2px solid #333; border-bottom: 2px solid #333;
            display: flex; align-items: center; justify-content: space-around; padding: 0 10px;
        }
        .stat-unit { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 8px; color: #888; font-weight: 900; }
        .stat-val { font-size: 16px; font-weight: 900; color: #fff; }
        
        /* INTEGRATED DIAMOND IN BOARD */
        #mini-diamond { width: 30px; height: 30px; position: relative; transform: rotate(45deg); margin-top: 4px; }
        .m-base { position: absolute; width: 6px; height: 6px; border: 1px solid #444; background: #222; }
        #mb-1 { top: 0; right: 0; } #mb-2 { top: 0; left: 0; } #mb-3 { bottom: 0; left: 0; }
        .m-on { background: var(--gold); border-color: #fff; box-shadow: 0 0 5px var(--gold); }

        #result-strip { height: 3vh; background: #000; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--gold); }

        #deck { 
            height: 30vh; display: grid; grid-template-columns: 1.2fr 0.8fr; 
            background: var(--grass); position: relative;
        }

        /* FOREST FIELD SPRAY CHART */
        #field-chart { width: 100%; height: 100%; position: relative; overflow: hidden; }
        .hit-marker { 
            position: absolute; width: 18px; height: 18px; background: rgba(0,0,0,0.7); 
            border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 7px; font-weight: 900; color: #fff; transform: translate(-50%, -50%);
        }

        #strike-zone { 
            width: 120px; height: 160px; border: 2px solid rgba(255,255,255,0.3); 
            background: rgba(0,0,0,0.2); position: relative; touch-action: none; 
            border-radius: 4px; align-self: center; justify-self: center; margin-right: 15px;
        }
        
        .ball-asset { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .bat-asset { position: absolute; width: 16px; height: 16px; background: #5d4037; border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; }
    </style>
</head>
<body>

<div id="header">LIVE STREAMING BROADCAST</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="scoreboard-strip">
    <div class="stat-unit"><span class="stat-label">BALLS</span><span class="stat-val" id="b-val" style="color:var(--blue)">0</span></div>
    <div class="stat-unit"><span class="stat-label">STRIKES</span><span class="stat-val" id="s-val" style="color:var(--gold)">0</span></div>
    <div class="stat-unit"><span class="stat-label">OUTS</span><span class="stat-val" id="o-val" style="color:#e74c3c">0</span></div>
    <div id="mini-diamond">
        <div id="mb-2" class="m-base"></div><div id="mb-1" class="m-base"></div><div id="mb-3" class="m-base"></div>
    </div>
    <div class="stat-unit"><span class="stat-label">RUNS</span><span class="stat-val" id="r-val">0</span></div>
</div>

<div id="result-strip" id="res-box">WAITING FOR PITCH...</div>

<div id="deck">
    <div id="field-chart"></div>
    <div id="strike-zone">
        <div style="position:absolute; width:100%; height:1px; top:33%; background:rgba(255,255,255,0.15);"></div>
        <div style="position:absolute; width:100%; height:1px; top:66%; background:rgba(255,255,255,0.15);"></div>
        <div style="position:absolute; height:100%; width:1px; left:33%; background:rgba(255,255,255,0.15);"></div>
        <div style="position:absolute; height:100%; width:1px; left:66%; background:rgba(255,255,255,0.15);"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const chart = document.getElementById('field-chart');
    const resBox = document.getElementById('result-strip');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.9);
        if(g.processed || pIdx === -1) return; 
        
        g.processed = true; g.lastIdx = pIdx;
        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const p = pitches[pIdx];
        const px = ((p.x + 1) / 2) * sz.offsetWidth;
        const py = ((1 - p.y) / 2) * sz.offsetHeight;
        const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
        const tDiff = now - p.t;

        const bat = document.createElement('div'); bat.className='bat-asset';
        bat.style.left=tx+'px'; bat.style.top=ty+'px'; sz.appendChild(bat);
        const ball = document.createElement('div'); ball.className='ball-asset';
        ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);

        if(dist < 55) {
            const la = ((ty - py) / 20) * 45; 
            const ang = ((tx - px) * 1.6) + (tDiff * 140); 
            const ev = 108 - (dist * 1.2) - (Math.abs(tDiff) * 300);
            let ft = (ev * 4.3) * (Math.cos(la * Math.PI / 180));
            if (la < -5) ft = Math.min(ft, 100); 
            if (la > 40) ft = Math.min(ft, 260); 
            handleHit(ft, ang, la, ev);
        } else { addStrike("WHIFF"); }
        updateUI();
    });

    function handleHit(ft, angle, la, ev) {
        let res = "OUT"; let move = 0; let tag = "OUT";
        if(Math.abs(angle) > 55) { addStrike("FOUL"); return; }

        if (ft < 110) { res = la < 0 ? "GROUND OUT" : "POP OUT"; tag = "OUT"; }
        else if (ft < 225) { res = "SINGLE"; move = 1; tag = "1B"; }
        else if (ft < 325) { res = "DOUBLE"; move = 2; tag = "2B"; }
        else {
            let fence = (Math.abs(angle) > 35) ? 335 : 402;
            if (ft >= fence) { res = "HOME RUN"; move = 4; tag = "HR"; }
            else { res = "TRIPLE"; move = 3; tag = "3B"; }
        }
        
        resBox.innerText = `${res} • ${Math.floor(ev)} MPH • ${Math.floor(ft)} FT`;
        
        // Add dot to spray chart
        const dot = document.createElement('div');
        dot.className = 'hit-marker';
        dot.innerText = tag;
        // Position logic for the green deck
        dot.style.left = (50 + (angle * 0.8)) + "%";
        dot.style.top = (90 - (Math.min(ft, 420)/4.6)) + "%";
        chart.appendChild(dot);

        if(move > 0) { g.b = 0; g.s = 0; advanceRunners(move); } 
        else { g.o++; g.b = 0; g.s = 0; checkState(); }
    }

    function advanceRunners(bases) {
        for(let i=0; i<bases; i++) {
            if(g.bases[2]) g.r++;
            g.bases[2] = g.bases[1]; g.bases[1] = g.bases[0];
            g.bases[0] = (i === 0 && bases < 4); 
            if(bases === 4 && i === 3) g.r++;
        }
    }

    function addStrike(reason) {
        // FOUL logic: Always a strike unless 2 strikes already exist
        if (reason === "FOUL") {
            if (g.s < 2) g.s++;
            resBox.innerText = "FOUL BALL";
        } else {
            g.s++;
            resBox.innerText = "STRIKE";
            if(g.s >= 3) { g.s = 0; g.b = 0; g.o++; resBox.innerText = "STRIKEOUT"; checkState(); }
        }
    }

    function addBall(reason) {
        g.b++; resBox.innerText = "BALL";
        if(g.b >= 4) {
            g.b = 0; g.s = 0; resBox.innerText = "WALK";
            if (g.bases[0] && g.bases[1] && g.bases[2]) g.r++;
            else if (g.bases[0] && g.bases[1]) g.bases[2] = true;
            else if (g.bases[0]) g.bases[1] = true;
            g.bases[0] = true;
        }
    }

    function checkState() {
        if(g.o >= 3) { g.o = 0; g.bases = [false,false,false]; resBox.innerText = "3 OUTS - SIDE RETIRED"; }
    }

    function updateUI() {
        document.getElementById('r-val').innerText = g.r;
        document.getElementById('b-val').innerText = g.b;
        document.getElementById('s-val').innerText = g.s;
        document.getElementById('o-val').innerText = g.o;
        document.getElementById('mb-1').className = `m-base ${g.bases[0]?'m-on':''}`;
        document.getElementById('mb-2').className = `m-base ${g.bases[1]?'m-on':''}`;
        document.getElementById('mb-3').className = `m-base ${g.bases[2]?'m-on':''}`;
    }

    setInterval(() => {
        const now = v.currentTime;
        const autoIdx = pitches.findIndex(p => now > p.t + 0.8 && g.lastIdx < pitches.indexOf(p));
        if(autoIdx !== -1) {
            g.lastIdx = autoIdx; g.processed = true;
            if(pitches[autoIdx].strike) addStrike("TAKEN"); else addBall("OUTSIDE");
            updateUI();
        }

        if (now < 0.2) {
            if (g.lastIdx !== -1) {
                // TOTAL RESET
                g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };
                chart.innerHTML = '';
                sz.querySelectorAll('.ball-asset, .bat-asset').forEach(el => el.remove());
                resBox.innerText = "NEW INNING - READY"; 
                updateUI();
            }
        } else {
            if(g.processed && !pitches.some(p => Math.abs(now - p.t) < 0.9)) g.processed = false;
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
