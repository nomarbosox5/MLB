<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB Home Run Challenge - Pro</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Video Container */
        #video-container { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; position: relative;}
        video { width: 100%; height: auto; max-height: 48vh; display: block; }

        /* Situation Overlay */
        #situation-bar { position: absolute; top: 10px; left: 10px; font-size: 0.8rem; color: #00ffcc; letter-spacing: 1px; }

        /* UI Dashboard */
        #ui-layer { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 30px; padding: 20px; box-sizing: border-box; }
        #results-area { width: 180px; display: flex; flex-direction: column; }
        #outcome { font-size: 2rem; font-weight: 900; text-transform: uppercase; line-height: 1; margin: 0; color: #00ffcc; }
        #details { font-size: 0.9rem; color: #888; margin-top: 5px; font-weight: bold; }
        #timing { font-size: 0.8rem; color: #555; text-transform: uppercase; margin-top: 5px; }

        /* The Box (Nestico Scale) */
        #statcast-box { 
            width: 140px; height: 195px; border: 3px solid #fff; 
            position: relative; background: rgba(255,255,255,0.05);
        }

        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #actual-pitch { width: 18px; height: 18px; background: white; z-index: 5; opacity: 0; box-shadow: 0 0 15px #fff; }
        #user-swing { width: 28px; height: 28px; background: #ff4d4d; border: 2px solid #fff; z-index: 6; display: none; }
        
        #tap-surface { position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px; z-index: 10; }
    </style>
</head>
<body>

<div id="app">
    <div id="video-container">
        <div id="situation-bar">COUNT: <span id="count">0-0</span> | OUTS: <span id="outs">0</span></div>
        <video id="v" autoplay muted loop playsinline>
            <source src="https://github.com/nomarbosox5/MLB/raw/refs/heads/main/ScreenRecording_04-17-2026%2000-42-49_1.mov" type="video/quicktime">
        </video>
    </div>

    <div id="ui-layer">
        <div id="results-area">
            <span id="outcome">READY</span>
            <span id="details">Bases Empty</span>
            <span id="timing">Watch the Pitch</span>
        </div>
        
        <div id="statcast-box">
            <div id="tap-surface"></div>
            <div id="actual-pitch" class="dot"></div>
            <div id="user-swing" class="dot"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('v');
    const outcome = document.getElementById('outcome');
    const details = document.getElementById('details');
    const timing = document.getElementById('timing');
    const pitchDot = document.getElementById('actual-pitch');
    const swingDot = document.getElementById('user-swing');

    // GAME STATE
    let s = 0, b = 0, o = 0;

    // THE SEQUENCE: Add your new coordinates and times here
    const pitchSequence = [
        { t: 1.25, x: 15,  y: 180, res: "HOME RUN",  dist: "425 FT",  vel: "108 MPH" },
        { t: 6.80, x: 120, y: 40,  res: "FLY OUT",   dist: "360 FT",  vel: "94 MPH"  },
        { t: 12.40, x: 70,  y: 100, res: "SINGLE",    dist: "240 FT",  vel: "102 MPH" },
        { t: 18.10, x: 30,  y: 150, res: "DOUBLE",    dist: "310 FT",  vel: "98 MPH"  }
    ];

    video.addEventListener('timeupdate', () => {
        const time = video.currentTime;
        const current = pitchSequence.find(p => Math.abs(time - p.t) < 0.2);

        if (current) {
            pitchDot.style.left = current.x + 'px';
            pitchDot.style.top = current.y + 'px';
            pitchDot.style.opacity = "1";
        } else {
            pitchDot.style.opacity = "0";
            if (time < 0.2) swingDot.style.display = "none";
        }
    });

    document.getElementById('tap-surface').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = document.getElementById('statcast-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;

        swingDot.style.left = ux + 'px';
        swingDot.style.top = uy + 'px';
        swingDot.style.display = 'block';

        const time = video.currentTime;
        const target = pitchSequence.find(p => Math.abs(time - p.t) < 0.5);

        if (!target) {
            outcome.innerText = "WHIFF";
            details.innerText = "Out of Timing";
            timing.innerText = "TOO EARLY/LATE";
            s++;
        } else {
            const dist = Math.sqrt((ux - target.x)**2 + (uy - target.y)**2);
            const timeDiff = Math.abs(time - target.t);

            if (dist > 50) {
                outcome.innerText = "MISS";
                details.innerText = "Chased it";
                s++;
            } else {
                // CONTACT PHYSICS
                if (uy < target.y - 5) {
                    outcome.innerText = "GROUND OUT";
                    details.innerText = "To Shortstop";
                    o++;
                } else if (timeDiff < 0.12 && uy >= target.y) {
                    outcome.innerText = target.res;
                    details.innerText = `${target.dist} | ${target.vel}`;
                    s = 0; b = 0; // Reset count on hit
                } else {
                    outcome.innerText = "FOUL";
                    details.innerText = "Just Missed";
                    s++;
                }
            }
            timing.innerText = timeDiff < 0.08 ? "PERFECT" : (time < target.t ? "EARLY" : "LATE");
        }
        
        // Update Scoreboard Logic
        if (s >= 3) { o++; s = 0; b = 0; }
        document.getElementById('count').innerText = `${b}-${s}`;
        document.getElementById('outs').innerText = o;
    });
</script>
</body>
</html>
