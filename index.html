<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #1a331a; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        #header { height: 4vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--gold); border-bottom: 1px solid #333; z-index: 10; }
        
        #v-frame { width: 100%; height: 56vh; overflow: hidden; position: relative; background: #000; }
        video { height: 100%; width: auto; object-fit: contain; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

        #deck { 
            height: 40vh; display: grid; grid-template-columns: 1.2fr 0.8fr; 
            background: var(--bg); padding: 8px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .left-panel { display: flex; flex-direction: column; gap: 6px; align-items: center; }
        .score-box { width: 100%; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-weight: 800; border-left: 2px solid var(--gold); box-sizing: border-box; }
        .dots { display: flex; gap: 3px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); } .s-on { background: var(--gold); } .o-on { background: #e74c3c; }

        /* NORMAlIZED SQUARE FIELD */
        #field-container { 
            width: 100%; max-width: 180px; aspect-ratio: 1/1; 
            background: #080808; border: 1px solid #222; border-radius: 8px; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .field-svg { width: 90%; height: 90%; transform: translateY(5%); }

        .base-diamond { position: absolute; bottom: 15%; left: 50%; width: 44px; height: 44px; transform: translateX(-50%); pointer-events: none; z-index: 5; }
        .base { position: absolute; width: 6px; height: 6px; background: #333; transform: rotate(45deg); border: 1px solid #444; }
        #base-home { bottom: 0; left: 19px; width: 7px; height: 7px; clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 50% 100%, 0% 50%); transform: none; background: #444; }
        #base-1 { bottom: 19px; right: 0; }
        #base-2 { top: 0; left: 19px; }
        #base-3 { bottom: 19px; left: 0; }
        .runner { background: #fff !important; box-shadow: 0 0 8px #fff; }

        .right-panel { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
        #feedback-area { width: 100%; text-align: center; min-height: 45px; }
        #res-main { color: var(--gold); font-size: 13px; font-weight: 900; line-height: 1.2; }
        #res-sub { color: #fff; font-size: 8px; font-weight: 700; opacity: 0.7; }

        #strike-zone { 
            width: 110px; height: 150px; border: 1.5px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.01); position: relative; touch-action: none; 
        }
        
        .ball-asset { position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 1px solid #ccc; }
        .bat-asset { position: absolute; width: 20px; height: 20px; background: #5d4037; border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; border: 1px solid #3e2723; }
    </style>
</head>
<body>

<div id="header">CRONIN BASEBALL</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="score-box">
            <span>R: <span id="r-val">0</span></span>
            <div class="dots" id="b-dots"></div><div class="dots" id="s-dots"></div><div class="dots" id="o-dots"></div>
        </div>
        <div id="field-container">
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <path d="M50 95 L15 60 A 50 50 0 0 1 85 60 L50 95 Z" fill="var(--grass)" />
                
                <path d="M40 85 A 15 15 0 0 1 60 85" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" />
                <text x="50" y="80" font-size="2.2" fill="rgba(255,255,255,0.3)" text-anchor="middle">100'</text>
                <text x="50" y="60" font-size="2.2" fill="rgba(255,255,255,0.3)" text-anchor="middle">200'</text>
                <text x="50" y="40" font-size="2.2" fill="rgba(255,255,255,0.3)" text-anchor="middle">300'</text>
                <text x="50" y="20" font-size="2.5" fill="var(--gold)" text-anchor="middle">HR</text>

                <line x1="50" y1="95" x2="15" y2="60" stroke="#444" stroke-width="0.5" />
                <line x1="50" y1="95" x2="85" y2="60" stroke="#444" stroke-width="0.5" />
            </svg>
            <div class="base-diamond">
                <div id="base-2" class="base"></div><div id="base-3" class="base"></div><div id="base-1" class="base"></div><div id="base-home" class="base"></div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="feedback-area">
            <div id="res-main">READY</div>
            <div id="res-sub">WAITING FOR PITCH</div>
        </div>
        <div id="strike-zone">
            <div style="position:absolute; width:100%; height:1px; top:33%; background:rgba(255,255,255,0.05);"></div>
            <div style="position:absolute; width:100%; height:1px; top:66%; background:rgba(255,255,255,0.05);"></div>
            <div style="position:absolute; height:100%; width:1px; left:33%; background:rgba(255,255,255,0.05);"></div>
            <div style="position:absolute; height:100%; width:1px; left:66%; background:rgba(255,255,255,0.05);"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const field = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.85);
        if(g.processed || pIdx === -1) return; 
        
        g.processed = true; 
        g.lastIdx = pIdx;

        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const bat = document.createElement('div'); bat.className='bat-asset';
        bat.style.left=tx+'px'; bat.style.top=ty+'px'; sz.appendChild(bat);

        const p = pitches[pIdx];
        const px = ((p.x + 1) / 2) * sz.offsetWidth;
        const py = ((1 - p.y) / 2) * sz.offsetHeight;
        const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
        const tDiff = now - p.t;

        const ball = document.createElement('div'); ball.className='ball-asset';
        ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);

        if(dist < 55) {
            const yOffset = ty - py; 
            const xOffset = tx - px; 
            let hitAngle = (xOffset * 1.5) + (tDiff * 150); 
            let timing = Math.abs(tDiff) < 0.08 ? "ON TIME" : (tDiff < 0 ? "EARLY" : "LATE");
            let ft = 430 - (dist * 4) - (Math.abs(tDiff) * 600);
            if (yOffset < -3) { ft = Math.min(ft, 85); } 
            handleHit(ft, hitAngle, timing, yOffset < -3 ? "TOPPED" : "LAUNCHED");
        } else { addStrike(tDiff < 0 ? "EARLY" : "LATE"); }
        updateUI();
    });

    function handleHit(ft, angle, timing, contactType) {
        let res = "OUT"; let move = 0;
        let absAngle = Math.abs(angle);
        if(absAngle > 56) { addStrike(`FOUL (${timing})`); return; }

        if (ft < 100) { res = contactType === "TOPPED" ? "GROUND OUT" : "POP OUT"; move = 0; }
        else if (ft < 200) { res = "SINGLE"; move = 1; }
        else if (ft < 300) { res = "DOUBLE"; move = 2; }
        else {
            let fence = (absAngle > 40) ? 335 : 395;
            if (ft >= fence) { res = "HOME RUN"; move = 4; }
            else { res = "TRIPLE"; move = 3; }
        }
        
        showMsg(res, `${timing} • ${contactType} • ${ft}FT`);
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "50"); line.setAttribute("y1", "95");
        line.setAttribute("x2", 50 + (angle * 0.7)); line.setAttribute("y2", 95 - (Math.min(ft, 420)/4.8));
        line.setAttribute("stroke", move > 0 ? "var(--orange)" : "#444");
        line.setAttribute("stroke-width", "2"); line.setAttribute("class", "hit-l");
        field.appendChild(line);

        if(move > 0) { g.b = 0; g.s = 0; advanceRunners(move); } 
        else { g.o++; g.b = 0; g.s = 0; checkState(); }
    }

    function advanceRunners(bases) {
        for(let i=0; i<bases; i++) {
            if(g.bases[2]) g.r++;
            g.bases[2] = g.bases[1]; g.bases[1] = g.bases[0];
            g.bases[0] = (i === 0 && bases < 4); 
            if(bases === 4 && i === 3) g.r++;
        }
    }

    function addStrike(reason) {
        if (reason.includes("FOUL") && g.s === 2) { showMsg("FOUL", "COUNT HELD"); } 
        else {
            g.s++; showMsg("STRIKE", reason);
            if(g.s >= 3) { g.s = 0; g.b = 0; g.o++; showMsg("OUT", "STRIKEOUT"); checkState(); }
        }
    }

    function addBall(reason) {
        g.b++; showMsg("BALL", reason);
        if(g.b >= 4) {
            g.b = 0; g.s = 0; showMsg("WALK", "");
            if (g.bases[0] && g.bases[1] && g.bases[2]) g.r++;
            else if (g.bases[0] && g.bases[1]) g.bases[2] = true;
            else if (g.bases[0]) g.bases[1] = true;
            g.bases[0] = true;
        }
    }

    function checkState() {
        if(g.o >= 3) { g.o = 0; g.bases = [false,false,false]; showMsg("3 OUTS", "BASES CLEARED"); }
    }

    function showMsg(m, s) { document.getElementById('res-main').innerText = m; document.getElementById('res-sub').innerText = s; }

    function updateUI() {
        document.getElementById('r-val').innerText = g.r;
        const render = (id, cur, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<cur?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', g.b, 3, 'b-on'); render('s-dots', g.s, 2, 's-on'); render('o-dots', g.o, 2, 'o-on');
        document.getElementById('base-1').className = `base ${g.bases[0]?'runner':''}`;
        document.getElementById('base-2').className = `base ${g.bases[1]?'runner':''}`;
        document.getElementById('base-3').className = `base ${g.bases[2]?'runner':''}`;
    }

    setInterval(() => {
        const now = v.currentTime;
        const autoIdx = pitches.findIndex(p => now > p.t + 0.65 && g.lastIdx < pitches.indexOf(p));
        if(autoIdx !== -1) {
            g.lastIdx = autoIdx; g.processed = true;
            if(pitches[autoIdx].strike) { addStrike("TAKEN"); } else { addBall("OUTSIDE"); }
            updateUI();
        }
        if (now < 0.15) {
            g.processed = false; g.lastIdx = -1;
            field.querySelectorAll('.hit-l').forEach(l => l.remove());
            sz.querySelectorAll('.ball-asset, .bat-asset').forEach(el => el.remove());
            showMsg("READY", "WAITING FOR PITCH"); 
            updateUI();
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
