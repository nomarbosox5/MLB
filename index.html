<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #1a331a; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        #header { height: 4vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); border-bottom: 1px solid #333; z-index: 10; }
        
        /* Video Frame - Expanded for better view */
        #v-frame { width: 100%; height: 48vh; overflow: hidden; position: relative; background: #000; }
        video { height: 100%; width: 100%; object-fit: cover; position: absolute; top: 0; left: 0; pointer-events: none; }

        #deck { 
            height: 48vh; display: grid; grid-template-columns: 1.2fr 0.8fr; 
            background: var(--bg); padding: 8px; gap: 12px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .left-panel { display: flex; flex-direction: column; gap: 5px; }
        .score-box { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; border-left: 3px solid var(--gold); }
        .dots { display: flex; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); box-shadow: 0 0 5px var(--blue); } 
        .s-on { background: var(--gold); box-shadow: 0 0 5px var(--gold); } 
        .o-on { background: #e74c3c; box-shadow: 0 0 5px #e74c3c; }

        /* Widen and Lower Field Area */
        #field-container { 
            flex-grow: 1; background: #080808; border: 1px solid #222; border-radius: 4px; 
            position: relative; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
        }
        .field-svg { width: 110%; height: 120%; transform: translateY(15%); }

        .base-diamond { position: absolute; bottom: 10%; left: 50%; width: 44px; height: 44px; transform: translateX(-50%); pointer-events: none; z-index: 5; }
        .base { position: absolute; width: 8px; height: 8px; background: #333; transform: rotate(45deg); border: 1px solid #444; transition: 0.2s; }
        #base-2 { top: 0; left: 18px; } #base-3 { top: 18px; left: 0; } #base-1 { top: 18px; right: 0; } 
        .runner { background: #fff !important; box-shadow: 0 0 10px #fff; }

        .right-panel { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
        #feedback-area { width: 100%; text-align: center; min-height: 70px; display: flex; flex-direction: column; justify-content: center; }
        #res-main { color: var(--gold); font-size: 18px; font-weight: 900; text-transform: uppercase; }
        #res-sub { color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 2px; line-height: 1.4; }

        /* 1.5x Bigger Strike Zone */
        #strike-zone { 
            width: 155px; height: 210px; border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.01); position: relative; touch-action: none; border-radius: 4px;
            margin-right: 10px; margin-bottom: 20px; 
        }
        
        .ball-hit { position: absolute; width: 24px; height: 24px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 1px solid #999; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
        .tap-point { position: absolute; width: 10px; height: 10px; background: #ff4757; border-radius: 50%; transform: translate(-50%, -50%); z-index: 6; box-shadow: 0 0 5px #ff4757; }
    </style>
</head>
<body>

<div id="header">CRONIN BASEBALL</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="score-box">
            <span>R: <span id="r-val" style="color:var(--gold)">0</span></span>
            <div class="dots" id="b-dots"></div><div class="dots" id="s-dots"></div><div class="dots" id="o-dots"></div>
        </div>
        <div id="field-container">
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <path d="M50 98 L10 50 Q50 10 90 50 Z" fill="var(--grass)" />
                
                <text x="50" y="85" font-size="2" fill="rgba(255,255,255,0.1)" text-anchor="middle">1B</text>
                <text x="50" y="65" font-size="2" fill="rgba(255,255,255,0.1)" text-anchor="middle">2B</text>
                <text x="50" y="45" font-size="2" fill="rgba(255,255,255,0.1)" text-anchor="middle">3B</text>
                <text x="50" y="25" font-size="2.5" fill="rgba(255,255,255,0.1)" text-anchor="middle">HOME RUN</text>

                <line x1="50" y1="98" x2="8" y2="45" stroke="#333" stroke-width="0.5" />
                <line x1="50" y1="98" x2="92" y2="45" stroke="#333" stroke-width="0.5" />
            </svg>
            <div class="base-diamond">
                <div id="base-2" class="base"></div><div id="base-3" class="base"></div><div id="base-1" class="base"></div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="feedback-area">
            <div id="res-main">READY</div>
            <div id="res-sub">WAITING FOR PITCH</div>
        </div>
        <div id="strike-zone">
            <div style="position:absolute; width:1px; height:100%; left:33.3%; background:rgba(255,255,255,0.06);"></div>
            <div style="position:absolute; width:1px; height:100%; left:66.6%; background:rgba(255,255,255,0.06);"></div>
            <div style="position:absolute; height:1px; width:100%; top:33.3%; background:rgba(255,255,255,0.06);"></div>
            <div style="position:absolute; height:1px; width:100%; top:66.6%; background:rgba(255,255,255,0.06);"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const field = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let g = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastIdx: -1, processed: false };

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(g.processed) return; 
        
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.85);
        g.processed = true; 

        const rect = sz.getBoundingClientRect();
        const tx = e.touches[0].clientX - rect.left;
        const ty = e.touches[0].clientY - rect.top;

        const tap = document.createElement('div'); tap.className='tap-point';
        tap.style.left=tx+'px'; tap.style.top=ty+'px'; sz.appendChild(tap);

        if(pIdx !== -1) {
            g.lastIdx = pIdx;
            const p = pitches[pIdx];
            const px = ((p.x + 1) / 2) * sz.offsetWidth;
            const py = ((1 - p.y) / 2) * sz.offsetHeight;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            const tDiff = now - p.t; // Positive = Late, Negative = Early

            const ball = document.createElement('div'); ball.className='ball-hit';
            ball.style.left=px+'px'; ball.style.top=py+'px'; sz.appendChild(ball);

            // Contact Thresholds
            if(dist < 60) {
                let timing = Math.abs(tDiff) < 0.08 ? "ON TIME" : (tDiff < 0 ? "EARLY" : "LATE");
                let contact = dist < 15 ? "BARREL" : (dist < 35 ? "SOLID" : "WEAK");
                
                // Baseball Flight Logic: ft based on contact + timing penalty
                let ft = Math.floor(450 - (dist * 4.5) - (Math.abs(tDiff) * 500));
                
                // Adjust spray angle based on timing
                let sprayAngle = (tx - px) + (tDiff * 150);
                
                handleHit(ft, sprayAngle, timing, contact);
            } else { addStrike("WHIFF"); }
        } else {
            addStrike("OUT OF WINDOW");
        }
        updateUI();
    });

    function handleHit(ft, angle, timing, contact) {
        let res = "OUT"; let move = 0;
        
        // Realistic Baseball Logic: Out-of-bounds spray
        if(Math.abs(angle) > 60) {
            addStrike(`FOUL (${timing})`);
            return;
        }

        if(ft >= 385) { res = "HOME RUN"; move = 4; }
        else if(ft >= 300) { res = "TRIPLE"; move = 3; }
        else if(ft >= 220) { res = "DOUBLE"; move = 2; }
        else if(ft >= 125) { res = "SINGLE"; move = 1; }
        
        showMsg(res, `${timing} • ${contact}<br>${ft} FEET`);
        
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "50"); line.setAttribute("y1", "98");
        line.setAttribute("x2", 50 + (angle * 0.75)); line.setAttribute("y2", 98 - (ft/5));
        line.setAttribute("stroke", move > 0 ? "var(--orange)" : "#555");
        line.setAttribute("stroke-width", "2.5"); line.setAttribute("class", "hit-l");
        field.appendChild(line);

        if(move > 0) {
            g.b = 0; g.s = 0;
            advanceRunners(move);
        } else { 
            g.o++; g.b = 0; g.s = 0; 
            checkState(); 
        }
    }

    function advanceRunners(bases) {
        if (bases === 4) { // Home Run clears all
            let runnersOn = g.bases.filter(b => b).length;
            g.r += (runnersOn + 1);
            g.bases = [false, false, false];
        } else {
            for(let i=0; i<bases; i++) {
                if(g.bases[2]) g.r++;
                g.bases[2] = g.bases[1];
                g.bases[1] = g.bases[0];
                g.bases[0] = (i === 0); 
            }
        }
    }

    function addStrike(reason) {
        if (reason.includes("FOUL") && g.s === 2) {
            showMsg("FOUL", "STAY ALIVE");
        } else {
            g.s++;
            showMsg("STRIKE", reason);
            if(g.s >= 3) {
                g.s = 0; g.b = 0; g.o++;
                showMsg("STRIKEOUT", "K");
                checkState();
            }
        }
    }

    function addBall(reason) {
        g.b++;
        showMsg("BALL", reason);
        if(g.b >= 4) {
            g.b = 0; g.s = 0;
            showMsg("WALK", "TAKE FIRST");
            // Real Walk Force Logic
            if (g.bases[0] && g.bases[1] && g.bases[2]) { g.r++; }
            else if (g.bases[0] && g.bases[1]) { g.bases[2] = true; }
            else if (g.bases[0]) { g.bases[1] = true; }
            g.bases[0] = true;
        }
    }

    function checkState() {
        if(g.o >= 3) { 
            g.o = 0; g.bases = [false,false,false];
            showMsg("3 OUTS", "CLEARING BASES");
        }
    }

    function showMsg(m, s) { 
        document.getElementById('res-main').innerHTML = m; 
        document.getElementById('res-sub').innerHTML = s; 
    }

    function updateUI() {
        document.getElementById('r-val').innerText = g.r;
        const render = (id, cur, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<cur?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', g.b, 3, 'b-on'); render('s-dots', g.s, 2, 's-on'); render('o-dots', g.o, 2, 'o-on');
        document.getElementById('base-1').className = `base ${g.bases[0]?'runner':''}`;
        document.getElementById('base-2').className = `base ${g.bases[1]?'runner':''}`;
        document.getElementById('base-3').className = `base ${g.bases[2]?'runner':''}`;
    }

    setInterval(() => {
        const now = v.currentTime;
        const autoIdx = pitches.findIndex(p => now > p.t + 0.6 && g.lastIdx < pitches.indexOf(p));
        if(autoIdx !== -1) {
            g.lastIdx = autoIdx; g.processed = true;
            if(pitches[autoIdx].strike) { addStrike("TAKEN"); }
            else { addBall("OUTSIDE"); }
            updateUI();
        }

        const nextP = pitches.find(p => p.t > now);
        if(nextP && (nextP.t - now < 2.5) && (nextP.t - now > 2.4)) {
            showMsg("READY", "GET READY");
            sz.querySelectorAll('.ball-hit, .tap-point').forEach(b => b.remove());
            g.processed = false; 
        }

        if (now < 0.2) {
            g.processed = false; g.lastIdx = -1;
            field.querySelectorAll('.hit-l').forEach(l => l.remove());
            sz.querySelectorAll('.ball-hit, .tap-point').forEach(b => b.remove());
            showMsg("READY", "WAITING"); updateUI();
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
