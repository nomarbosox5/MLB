<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Tracker MVP</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .zone-container { position: relative; width: 300px; height: 420px; border: 4px solid #555; margin-top: 20px; background: #222; }
        /* The Strike Zone (Sections 1, 2, 4, 5) */
        .strike-zone { position: absolute; top: 0; left: 0; width: 200px; height: 280px; border: 2px dashed rgba(255,255,255,0.3); background: rgba(0, 255, 0, 0.05); }
        .pitch-dot { position: absolute; width: 12px; height: 12px; background: red; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid white; display: none; }
        .stats { margin-top: 20px; padding: 15px; background: #333; border-radius: 8px; width: 300px; }
        .ball { background: #ff4444 !important; }
        .strike { background: #44ff44 !important; }
    </style>
</head>
<body>

    <h2>Pitch & Hit Projection</h2>
    
    <div class="zone-container" id="container">
        <div class="strike-zone"></div>
        <div id="dot" class="pitch-dot"></div>
    </div>

    <div class="stats" id="output">
        Select a pitch to see results...
    </div>

    <div style="margin-top: 10px;">
        <button onclick="playPitch(0)">P1</button>
        <button onclick="playPitch(1)">P2</button>
        <button onclick="playPitch(2)">P3</button>
        <button onclick="playPitch(3)">P4</button>
        <button onclick="playPitch(4)">P5</button>
        <button onclick="playPitch(5)">P6</button>
        <button onclick="playPitch(6)">P7</button>
        <button onclick="playPitch(7)">P8</button>
    </div>

    <script>
        // Scaling: coordinates translated to 150x210 grid (doubled to 300x420 for visibility)
        const pitches = [
            { id: 1, x: 25,  y: 35,  type: "STRIKE", physics: { ang: 12, len: 285, desc: "Line Drive (LF)" } },
            { id: 2, x: 65,  y: 15,  type: "STRIKE", physics: { ang: 25, len: 340, desc: "Deep Fly (CF)" } },
            { id: 3, x: 85,  y: 85,  type: "STRIKE", physics: { ang: -5, len: 110, desc: "Grounder (SS)" } },
            { id: 4, x: 105, y: 95,  type: "STRIKE", physics: { ang: 45, len: 150, desc: "Infield Pop" } },
            { id: 5, x: 110, y: 85,  type: "STRIKE", physics: { ang: 2,  len: 140, desc: "Hard Grounder" } },
            { id: 6, x: 15,  y: 165, type: "BALL",   physics: { ang: -15, len: 10,  desc: "Tipped Foul" } },
            { id: 7, x: 25,  y: 50,  type: "STRIKE", physics: { ang: 18, len: 310, desc: "Gapper (LC)" } },
            { id: 8, x: 15,  y: 130, type: "BALL",   physics: { ang: 0,   len: 0,   desc: "Whiff" } }
        ];

        function playPitch(index) {
            const p = pitches[index];
            const dot = document.getElementById('dot');
            const out = document.getElementById('output');

            // Map to visual scale (x2)
            dot.style.left = (p.x * 2) + 'px';
            dot.style.top = (p.y * 2) + 'px';
            dot.style.display = 'block';

            // Update UI
            out.innerHTML = `
                <strong>Pitch ${p.id}: <span class="${p.type.toLowerCase()}">${p.type}</span></strong><br>
                Result: ${p.physics.desc}<br>
                Distance: ${p.physics.len} ft<br>
                Angle: ${p.physics.ang}°
            `;
        }
    </script>
</body>
</html>
