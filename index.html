<style>
    /* Add this to your existing styles */
    #bat { 
        width: 38px; 
        height: 38px; 
        border: 2px solid var(--gold); 
        background: rgba(252, 196, 25, 0.2); 
        z-index: 11;
        transition: opacity 0.1s; /* Quick fade */
        pointer-events: none;
        position: absolute;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(1);
    }

    /* The "Pop" animation for new taps */
    .tap-pulse {
        animation: pulse 0.2s ease-out;
    }

    @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
</style>

<script>
    function swing(e) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        
        const bat = document.getElementById('bat');
        
        // 1. Reset Animation (Remove and re-add class to trigger 'pop')
        bat.classList.remove('tap-pulse');
        void bat.offsetWidth; // Trigger reflow
        bat.classList.add('tap-pulse');

        // 2. Move to new tap immediately
        bat.style.left = sx + 'px'; 
        bat.style.top = sy + 'px'; 
        bat.style.opacity = 1;

        if (state.idx !== -1) {
            const p = PITCHES[state.idx];
            const dist = Math.sqrt(Math.pow(sx - getX(p.x), 2) + Math.pow(sy - getY(p.y), 2));
            const dt = v.currentTime - p.t;

            // CONTACT CHECK: Using your logic - must overlap the white dot
            if (dist < 45) {
                const ev = Math.max(0, 114 - (dist * 1.5)).toFixed(1);
                document.getElementById('ev').innerText = ev;
                
                const tNode = document.getElementById('timing');
                if (Math.abs(dt) < 0.1) {
                    tNode.innerText = "PERFECT";
                    tNode.style.color = "var(--gold)";
                } else {
                    tNode.innerText = dt < 0 ? "EARLY" : "LATE";
                    tNode.style.color = "var(--neon)";
                }
            } else {
                // CLEAR DATA ON MISS
                document.getElementById('ev').innerText = "0.0";
                document.getElementById('timing').innerText = "MISS";
                document.getElementById('timing').style.color = "var(--red)";
            }
        }
    }
</script>
