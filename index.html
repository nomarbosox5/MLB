<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Statcast Mobile MVP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@900&display=swap');
        :root { --gold: #fcc419; --bg: #000; --neon: #00f2ff; --red: #ff3e3e; }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* 1. TOP SECTION: THE VIDEO FEED */
        #v-area { height: 45vh; position: relative; background: #111; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .start-btn { border: 2px solid #fff; color: #fff; padding: 12px 24px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }

        /* 2. MIDDLE SECTION: ALL GRAPHICS BELOW VIDEO */
        #analysis-bar { 
            height: 18vh; display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 15px; background: #0a0a0a; border-bottom: 1px solid #333;
        }
        .count-col { display: flex; flex-direction: column; gap: 5px; min-width: 60px; }
        .c-row { display: flex; align-items: center; font-size: 10px; color: #555; font-weight: 900; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #222; margin-left: 5px; border: 1px solid #333; }
        .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); border: none; }
        
        .diamond-col { position: relative; width: 40px; height: 40px; transform: rotate(45deg); margin: 0 10px; }
        .base { position: absolute; width: 12px; height: 12px; background: #222; border: 1px solid #444; }
        #b1 { top: 0; right: 0; } #b2 { top: 0; left: 0; } #b3 { bottom: 0; left: 0; }

        .statcast-col { text-align: right; flex-grow: 1; }
        .f-label { font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .f-val { font-size: 12px; font-weight: 900; margin-bottom: 2px; }
        .ev-main { font-family: 'JetBrains Mono'; font-size: 24px; color: var(--gold); line-height: 1; }

        /* 3. BOTTOM SECTION: THE TOUCH GRID */
        #controls { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        #grid { width: 220px; height: 220px; background: #080808; border: 1px solid #222; position: relative; }
        #strike-box { position: absolute; left: 25%; top: 25%; width: 50%; height: 50%; border: 1px solid rgba(255,255,255,0.05); }

        /* ASSETS */
        .marker { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; }
        #ball { width: 14px; height: 14px; background: #fff; box-shadow: 0 0 12px #fff; z-index: 10; }
        #bat { width: 40px; height: 40px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.2); z-index: 11; }
    </style>
</head>
<body>

<div id="v-area">
    <div id="overlay" onclick="startApp()"><div class="start-btn">Initialize Feed</div></div>
    <video id="v" playsinline muted loop>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="analysis-bar">
    <div class="count-col">
        <div class="c-row">B <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="c-row">S <div class="dot" id="s1"></div><div class="dot" id="s2"></div><div class="dot" id="s3"></div></div>
    </div>

    <div class="diamond-col">
        <div class="base" id="b2"></div><div class="base" id="b1"></div><div class="base" id="b3"></div>
    </div>

    <div class="statcast-col">
        <div class="f-label">Timing / Result</div>
        <div id="t-val" class="f-val">---</div>
        <div id="ev" class="ev-main">0.0</div>
        <div class="f-label">EXIT VELO</div>
    </div>
</div>

<div id="controls">
    <div id="grid" onpointerdown="handleTap(event)">
        <div id="strike-box"></div>
        <div id="ball" class="marker"></div>
        <div id="bat" class="marker"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const PITCHES = [
        { t: 0.92,  x: -0.75, y: 3.25 }, { t: 6.40,  x: -0.40, y: 3.50 }, 
        { t: 10.86, x: -0.25, y: 2.75 }, { t: 16.08, x: 0.15,  y: 2.60 },
        { t: 21.50, x: -0.95, y: 1.75 }, { t: 28.03, x: 0.20,  y: 2.75 }, 
        { t: 36.17, x: -0.95, y: 2.50 }, { t: 41.84, x: -0.80, y: 2.75 }
    ];

    let state = { idx: -1, strikes: 0 };
    const getX = (val) => 110 + (val * 45);
    const getY = (val) => 110 - (val * 45);

    function startApp() { document.getElementById('overlay').style.display = 'none'; v.play(); }

    v.ontimeupdate = () => {
        let match = PITCHES.findIndex(p => v.currentTime >= p.t - 0.4 && v.currentTime < p.t + 0.4);
        const b = document.getElementById('ball');
        if (match !== -1) {
            if (match !== state.idx) {
                state.idx = match;
                b.style.left = getX(PITCHES[match].x) + 'px';
                b.style.top = getY(PITCHES[match].y) + 'px';
            }
            b.style.opacity = (v.currentTime >= PITCHES[match].t - 0.1) ? 1 : 0.3;
        } else {
            b.style.opacity = 0;
            state.idx = -1;
        }
    };

    function handleTap(e) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        const bat = document.getElementById('bat');
        bat.style.left = sx + 'px'; bat.style.top = sy + 'px'; bat.style.opacity = 1;

        if (state.idx !== -1) {
            const p = PITCHES[state.idx];
            const dist = Math.sqrt(Math.pow(sx - getX(p.x), 2) + Math.pow(sy - getY(p.y), 2));
            const dt = v.currentTime - p.t;

            if (dist < 42) {
                const ev = Math.max(0, 114 - (dist * 1.5)).toFixed(1);
                document.getElementById('ev').innerText = ev;
                document.getElementById('t-val').innerText = (Math.abs(dt) < 0.1 ? "GOOD" : (dt < 0 ? "EARLY" : "LATE")) + " / " + (dist < 15 ? "SQUARED" : "SOLID");
                state.strikes = 0;
            } else {
                state.strikes = Math.min(3, state.strikes + 1);
                document.getElementById('ev').innerText = "0.0";
                document.getElementById('t-val').innerText = "STRIKE / WHIFF";
            }
            updateStrikes();
        }
    }

    function updateStrikes() {
        for(let i=1; i<=3; i++) document.getElementById('s'+i).className = i <= state.strikes ? 'dot active' : 'dot';
        if(state.strikes >= 3) setTimeout(() => { state.strikes = 0; updateStrikes(); }, 1000);
    }
</script>
</body>
</html>
