<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Layout per your screenshot */
        .app-container { width: 380px; padding: 20px; }
        .ui-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        
        .result-group { flex: 1; }
        .main-res { font-size: 44px; font-weight: 900; color: var(--neon); text-transform: uppercase; margin: 0; line-height: 0.9; }
        .sub-res { font-size: 12px; color: #666; letter-spacing: 2px; margin-top: 5px; }

        /* The Nestico Interactive Grid */
        .nestico-grid { 
            width: 150px; height: 190px; border: 2px solid white; position: relative; 
            background: rgba(255,255,255,0.05); cursor: crosshair;
        }
        .zone-line { position: absolute; left: 22px; top: 32px; width: 106px; height: 126px; border: 1px solid rgba(255,255,255,0.2); }
        .dot { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; transform: translate(-50%, -50%); display: none; box-shadow: 0 0 10px var(--neon); }

        /* Base & Count Tracker */
        .game-status { display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 15px; font-size: 11px; color: #888; }
        .bases { display: flex; gap: 4px; }
        .base { width: 10px; height: 10px; border: 1px solid #444; transform: rotate(45deg); }
        .occupied { background: var(--neon); border-color: var(--neon); }
        
        video { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="app-container">
    <video id="v" src="your-video.mp4" loop muted playsinline></video>

    <div class="ui-top">
        <div class="result-group">
            <h1 id="res" class="main-res">---</h1>
            <div id="sub" class="sub-res">SYNCING...</div>
        </div>
        <div class="nestico-grid" onclick="swing()">
            <div class="zone-line"></div>
            <div id="dot" class="dot"></div>
        </div>
    </div>

    <div class="game-status">
        <div>COUNT: <span id="cnt">0-0</span> | OUTS: <span id="o">0</span></div>
        <div class="bases">
            <div id="b3" class="base"></div>
            <div id="b2" class="base"></div>
            <div id="b1" class="base"></div>
        </div>
    </div>
    <button onclick="document.getElementById('v').play()" style="margin-top:15px; width:100%; padding:10px; background:#222; color:white; border:1px solid #444; border-radius:5px; cursor:pointer;">PLAY SYNC</button>
</div>

<script>
    const vid = document.getElementById('v');
    let balls = 0, strikes = 0, outs = 0;
    let hitActive = false;
    let currentP = null;

    const pitches = [
        { t: 0.92, x: -0.75, y: 3.25, isStrike: true, res: "HOME RUN", dist: 412, ang: 28 },
        { t: 6.40, x: -0.4, y: 3.5, isStrike: true, res: "FLY OUT", dist: 340, ang: 35 },
        { t: 10.86, x: -0.25, y: 2.75, isStrike: true, res: "SINGLE", dist: 210, ang: 12 },
        { t: 16.08, x: 0.15, y: 2.6, isStrike: true, res: "POP UP", dist: 140, ang: 55 },
        { t: 21.50, x: 0.2, y: 2.75, isStrike: true, res: "GROUNDER", dist: 110, ang: -5 },
        { t: 28.03, x: -0.9, y: 1.75, isStrike: false, res: "WALK", dist: 0, ang: 0 },
        { t: 33.00, x: -0.75, y: 3.0, isStrike: true, res: "DOUBLE", dist: 310, ang: 18 },
        { t: 36.17, x: -0.9, y: 2.25, isStrike: false, res: "WALK", dist: 0, ang: 0 }
    ];

    vid.ontimeupdate = () => {
        const now = vid.currentTime;
        const p = pitches.find(p => Math.abs(now - p.t) < 0.25);
        
        if (p && !hitActive) {
            showDot(p);
        } else if (!p) {
            hideDot();
        }
    };

    function showDot(p) {
        currentP = p;
        hitActive = true;
        const dot = document.getElementById('dot');
        const vX = ((p.x + 1) / 2) * 150;
        const vY = 190 - ((p.y - 1) / 3) * 190;
        dot.style.left = vX + "px"; dot.style.top = vY + "px";
        dot.style.display = "block";
        
        // Auto-take logic (If no swing)
        setTimeout(() => {
            if (hitActive && currentP === p) {
                if (p.isStrike) { strikes++; } else { balls++; }
                updateStats("TAKE");
                hideDot();
            }
        }, 700);
    }

    function swing() {
        if (!hitActive) {
            updateStats("WHIFF");
            return;
        }
        // Result calculation based on 75mph bat speed
        const p = currentP;
        document.getElementById('res').innerText = p.res;
        document.getElementById('sub').innerText = `${p.dist} FT | ${p.ang}° ANGLE`;
        
        if (p.res === "HOME RUN" || p.res === "SINGLE" || p.res === "DOUBLE") {
            document.getElementById('b1').classList.add('occupied');
        } else {
            outs++;
        }
        
        hideDot();
        updateStats();
    }

    function hideDot() {
        document.getElementById('dot').style.display = "none";
        hitActive = false;
        currentP = null;
    }

    function updateStats(msg) {
        if (msg) document.getElementById('res').innerText = msg;
        if (strikes >= 3) { outs++; strikes = 0; balls = 0; }
        if (balls >= 4) { strikes = 0; balls = 0; document.getElementById('b1').classList.add('occupied'); }
        document.getElementById('cnt').innerText = `${balls}-${strikes}`;
        document.getElementById('o').innerText = outs;
    }
</script>
</body>
</html>
