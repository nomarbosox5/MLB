<script>
    // ... (Keep existing PITCHES array with your 00:00.92, etc.)

    document.getElementById('tap').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const now = video.currentTime;
        
        // 1. ENSURE VISUAL FEEDBACK TRIGGERS NO MATTER WHAT
        const rect = document.getElementById('nestico-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;
        const sd = document.getElementById('s-dot');
        sd.style.left = ux + 'px'; sd.style.top = uy + 'px'; sd.style.display = 'block';

        // 2. CHECK FOR PROXIMITY TO ANY PITCH
        // We look for any pitch within a 0.8s window of the current video time
        const active = PITCHES.find(p => Math.abs(now - p.t) < 0.8);
        
        if (active && !game.swung) {
            game.swung = true; // Prevents double-swinging at one pitch
            
            const tDiff = now - active.t;
            const px = ((active.nx + 1.5) / 3.0) * 160;
            const py = 200 - (((active.ny - 1.0) / 3.0) * 200);
            const yDiff = py - uy; // Distance from center of ball

            // TIMING LABELS
            const tUI = document.getElementById('timing-ui');
            if (Math.abs(tDiff) < 0.06) { tUI.innerText="PERFECT"; tUI.style.color="#00ffcc"; }
            else if (tDiff < 0) { tUI.innerText="EARLY"; tUI.style.color="#ffcc00"; }
            else { tUI.innerText="LATE"; tUI.style.color="#ff4d4d"; }

            // 3. CONTACT PHYSICS (The Show Logic)
            // Must be within 0.3s of arrival and within 40px of the ball height
            if (Math.abs(tDiff) < 0.30 && Math.abs(yDiff) < 40) {
                game.s = 0; game.b = 0; // Reset count on contact
                
                const exit = Math.round(110 - (Math.abs(tDiff) * 80) - (Math.abs(yDiff) * 0.5));
                const angle = Math.round(yDiff * 2.5);
                const dist = Math.round((exit ** 2 / 29) * (1 + angle/45));

                if (dist > 385) {
                    document.getElementById('outcome').innerText = "HOME RUN";
                    game.runs++;
                } else if (Math.abs(yDiff) > 25 || Math.abs(tDiff) > 0.2) {
                    document.getElementById('outcome').innerText = "FLY OUT";
                    game.outs++;
                } else {
                    document.getElementById('outcome').innerText = "SINGLE";
                    document.getElementById('b1').classList.add('on');
                }

                document.getElementById('v-ex').innerText = exit + " MPH";
                document.getElementById('v-di').innerText = Math.max(0, dist) + " FT";
                const hl = document.getElementById('hit-line');
                hl.style.width = Math.min(dist/4, 100) + "%";
                hl.style.transform = `rotate(${-angle}deg)`;
            } else {
                document.getElementById('outcome').innerText = "WHIFF";
                game.s++;
            }
        } else {
            // 4. SWUNG AT NOTHING / RE-SWING
            document.getElementById('outcome').innerText = "TOO EARLY";
            game.s++;
        }
        
        updateUI(); // Refresh the scoreboard
    });
</script>
