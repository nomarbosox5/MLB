<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Statcast</title>
    <style>
        :root { --gold: #f1c40f; --glass: rgba(255, 255, 255, 0.1); --red: #e74c3c; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }
        
        /* Header */
        header { 
            height: 40px; background: #111; display: flex; align-items: center; 
            justify-content: center; font-weight: 900; letter-spacing: 2px;
            border-bottom: 1px solid #333; color: var(--gold); font-size: 14px;
            padding-top: env(safe-area-inset-top);
        }

        /* 30% Side Crop & Larger Display */
        #v-container { 
            width: 100%; aspect-ratio: 1.2; background: #000; overflow: hidden; position: relative; 
        }
        video { 
            width: 160%; height: 100%; object-fit: cover; margin-left: -30%; 
        }

        #ui-grid { 
            flex-grow: 1; display: grid; grid-template-columns: 1.2fr 0.8fr; 
            background: #050505; padding: 10px; gap: 8px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Diamond Overlay */
        #diamond-box {
            height: 100px; background: #142b14; border-radius: 8px; position: relative;
            border: 1px solid #222; overflow: hidden;
        }
        .base { 
            position: absolute; width: 12px; height: 12px; background: #333; 
            transform: rotate(45deg); border: 1px solid #555; transition: 0.3s;
        }
        .active-runner { background: var(--gold) !important; box-shadow: 0 0 8px var(--gold); }
        #b1 { bottom: 45%; right: 20%; }
        #b2 { top: 20%; left: 47%; }
        #b3 { bottom: 45%; left: 20%; }
        #home { bottom: 10%; left: 47%; background: #fff; transform: rotate(45deg); }

        /* Stats & Out Tracker */
        .card { background: var(--glass); padding: 6px; border-radius: 4px; margin-bottom: 5px; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .label { font-size: 9px; color: #aaa; text-transform: uppercase; }
        .val { font-size: 14px; font-weight: 900; }
        .outs { display: flex; gap: 4px; }
        .out-dot { width: 10px; height: 10px; border-radius: 50%; background: #222; }
        .out-on { background: var(--red); box-shadow: 0 0 5px var(--red); }

        /* Interaction Zone */
        #sz { 
            width: 130px; height: 170px; border: 2px solid rgba(255,255,255,0.3); 
            position: relative; background: rgba(255,255,255,0.02); touch-action: none;
            margin: auto;
        }
        .ball { position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 30; box-shadow: 0 0 15px #fff; }
        .bat { position: absolute; width: 40px; height: 40px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }
        #spray-line { position: absolute; bottom: 10%; left: 50%; width: 3px; background: var(--gold); transform-origin: bottom center; opacity: 0; }
    </style>
</head>
<body>

<header>CRONIN BASEBALL</header>

<div id="v-container">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="ui-grid">
    <div id="left-col">
        <div class="card">
            <div class="row">
                <div><div class="label">Runs</div><div id="runs" class="val">0</div></div>
                <div><div class="label">Outs</div><div id="out-dots" class="outs"></div></div>
            </div>
        </div>
        
        <div id="diamond-box">
            <div id="b1" class="base"></div>
            <div id="b2" class="base"></div>
            <div id="b3" class="base"></div>
            <div id="home" class="base"></div>
            <div id="spray-line"></div>
        </div>

        <div class="card" id="fb" style="opacity:0; margin-top:5px;">
            <div class="label" id="res-txt">SINGLE</div>
            <div class="val" id="dist-txt" style="color:var(--gold)">0 FT</div>
        </div>
    </div>

    <div id="right-col">
        <div id="sz"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');
    const fb = document.getElementById('fb');
    const sLine = document.getElementById('spray-line');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let game = { runs: 0, outs: 0, bases: [false, false, false] };
    let swingLocked = false;
    let lastIdx = -1;

    function updateGameUI() {
        document.getElementById('runs').innerText = game.runs;
        const oEl = document.getElementById('out-dots'); oEl.innerHTML = '';
        for(let i=0; i<3; i++) oEl.innerHTML += `<div class="out-dot ${i < game.outs ? 'out-on' : ''}"></div>`;
        
        document.getElementById('b1').className = `base ${game.bases[0] ? 'active-runner' : ''}`;
        document.getElementById('b2').className = `base ${game.bases[1] ? 'active-runner' : ''}`;
        document.getElementById('b3').className = `base ${game.bases[2] ? 'active-runner' : ''}`;
        
        if (game.outs >= 3) {
            game = { runs: 0, outs: 0, bases: [false, false, false] };
            setTimeout(updateGameUI, 1000);
        }
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(swingLocked) return;
        const r = sz.getBoundingClientRect();
        const t = e.touches[0];
        handleSwing(t.clientX - r.left, t.clientY - r.top);
    });

    function handleSwing(tx, ty) {
        swingLocked = true;
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.6);
        const p = pitches[pIdx];

        sz.innerHTML = '';
        const bat = document.createElement('div'); bat.className = 'bat';
        bat.style.left = tx+'px'; bat.style.top = ty+'px'; sz.appendChild(bat);

        if(p) {
            lastIdx = pIdx;
            const px = ((p.x + 0.75) / 1.5) * 130;
            const py = ((1.0 - p.y) / 2.0) * 170;
            const ball = document.createElement('div'); ball.className = 'ball';
            ball.style.left = px+'px'; ball.style.top = py+'px'; sz.appendChild(ball);

            const distSq = Math.pow(tx-px, 2) + Math.pow(ty-py, 2);
            if(distSq < 900) { // Contact
                const hitDist = Math.floor(Math.random() * 150) + 250 - (distSq/4);
                processHit(hitDist, (tx-px)*2);
            } else { processOut("STRIKEOUT"); }
        } else { processOut("WHIFF"); }
        updateGameUI();
    }

    function processHit(d, angle) {
        fb.style.opacity = 1;
        sLine.style.opacity = 1;
        sLine.style.height = (d/5) + 'px';
        sLine.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        document.getElementById('dist-txt').innerText = Math.floor(d) + " FT";

        let basesToMove = 0;
        if(d >= 350) { basesToMove = 3; document.getElementById('res-txt').innerText = "TRIPLE"; }
        else if(d >= 300) { basesToMove = 2; document.getElementById('res-txt').innerText = "DOUBLE"; }
        else if(d >= 200) { basesToMove = 1; document.getElementById('res-txt').innerText = "SINGLE"; }
        else { processOut("FLY OUT"); return; }

        // Advance Runners
        for (let i = 0; i < basesToMove; i++) {
            if (game.bases[2]) game.runs++;
            game.bases[2] = game.bases[1];
            game.bases[1] = game.bases[0];
            game.bases[0] = (i === 0);
        }
    }

    function processOut(msg) {
        game.outs++;
        fb.style.opacity = 1;
        document.getElementById('res-txt').innerText = msg;
        document.getElementById('dist-txt').innerText = "OUT";
    }

    setInterval(() => {
        const now = v.currentTime;
        if (now < 0.5) { 
            swingLocked = false; 
            lastIdx = -1; 
            fb.style.opacity = 0; 
            sLine.style.opacity = 0;
            sz.innerHTML = '';
        }
        const incoming = pitches.find(p => p.t > now && p.t - now < 0.8);
        if(incoming && incoming.t - now < 0.2) {
            swingLocked = false;
            fb.style.opacity = 0;
            sLine.style.opacity = 0;
            sz.innerHTML = '';
        }
    }, 100);

    updateGameUI();
</script>
</body>
</html>
