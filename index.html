<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball: Cartoon Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #3a6d32; --dirt: #a67c52; --fence: #999; --board: #111; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        /* BIGGER BANNER */
        #banner { 
            height: 4vh; background: linear-gradient(to bottom, #222, #000); display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); 
            border-bottom: 2px solid #444; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10;
        }
        
        #v-frame { width: 100%; height: 57vh; overflow: hidden; position: relative; border-bottom: 2px solid #222; }
        video { height: 100%; width: auto; object-fit: contain; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

        #deck { 
            height: 39vh; display: grid; grid-template-columns: 1fr 1fr; 
            background: #000; padding: 6px; gap: 8px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .panel { display: flex; flex-direction: column; align-items: center; justify-content: space-between; overflow: hidden; }

        /* HORIZONTAL SCOREBOARD STRIP */
        #scoreboard-strip {
            width: 100%; height: 5.5vh; background: var(--board); border: 1.5px solid #333; border-radius: 4px;
            display: flex; align-items: center; justify-content: space-around; padding: 0 10px; box-sizing: border-box;
        }
        .stat-unit { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 8px; color: #777; font-weight: 800; }
        .dots { display: flex; gap: 3px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); } .s-on { background: var(--gold); } .o-on { background: #e74c3c; }
        
        #mini-diamond { width: 28px; height: 28px; position: relative; transform: rotate(45deg); margin-top: 2px; }
        .m-base { position: absolute; width: 6px; height: 6px; border: 1px solid #333; background: #111; }
        #mb-1 { top: 0; right: 0; } #mb-2 { top: 0; left: 0; } #mb-3 { bottom: 0; left: 0; }
        .m-on { background: var(--gold); border-color: #fff; box-shadow: 0 0 10px var(--gold); }

        /* CARTOON FIELD */
        #field-container { 
            width: 100%; flex-grow: 1; background: var(--bg); position: relative; overflow: hidden; margin-top: 5px; border-radius: 4px; border: 1.5px solid #222; 
        }
        .field-svg { width: 100%; height: 110%; transform: translateY(8%); }
        
        .hit-line { stroke-linecap: round; filter: drop-shadow(0 0 2px rgba(255,255,255,0.4)); }
        .hit-dot {
            position: absolute; width: 14px; height: 14px; background: rgba(0,0,0,0.7); 
            border: 1px solid #fff; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 6px; font-weight: 900; color: #fff; transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* ANCHORED RESULT PANEL */
        #result-card {
            width: 100%; height: 6vh; background: var(--board); border: 1.5px solid #333; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; padding: 0 5px;
        }
        #res-main { color: var(--gold); font-size: 14px; font-weight: 900; text-transform: uppercase; }
        #res-sub { color: #888; font-size: 8px; font-weight: 700; margin-top: 1px; }

        /* PERFECT SYMMETRICAL TAP ZONE */
        #strike-zone-box { width: 100%; flex-grow: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #strike-zone { 
            width: 125px; height: 165px; border: 2px solid rgba(255,255,255,0.25); 
            background: rgba(255,255,255,0.02); position: relative; touch-action: none; 
            border-radius: 6px; 
        }
        
        .ball-asset { position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 10px #fff; }
        .bat-asset { position: absolute; width: 20px; height: 20px; background: #5d4037; border-radius: 50%; transform: translate(-50%, -50%); z-index: 4; border: 1px solid #000; }
        .pitch-dot { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 2; opacity: 0.7; }
    </style>
</head>
