<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Strict Scale Build</title>
    <style>
        :root { --gold: #efb21e; }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #v-area { width: 100%; height: 42vh; background: #000; border-bottom: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #tray { flex-grow: 1; display: flex; background: #111; }

        #left-panel { width: 45%; display: flex; flex-direction: column; padding: 12px; border-right: 1px solid #333; }
        .stat-box { background: #000; padding: 8px; border: 1px solid #444; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem; }
        
        #spray-chart { width: 100%; height: 80px; border: 1px solid #222; margin-bottom: 10px; background: rgba(255,255,255,0.02); position: relative; clip-path: polygon(50% 100%, 0% 0%, 100% 0%); }
        .hit-dot { position: absolute; width: 5px; height: 5px; border-radius: 50%; transform: translate(-50%, -50%); }

        #right-panel { width: 55%; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* THE STRICT SCALE BOX (200x240) */
        #nestico-container { 
            position: relative; 
            width: 200px; 
            height: 240px; 
            border: 1px dashed #444; 
            background: #050505;
        }

        #strike-zone {
            position: absolute; top: 15%; left: 15%; width: 70%; height: 70%;
            border: 2px solid rgba(255,255,255,0.6);
            display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            pointer-events: none;
        }
        .cell { border: 0.5px solid rgba(255,255,255,0.1); }

        #start-overlay {
            position: absolute; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            text-align: center; font-weight: 900; color: var(--gold); font-size: 1.1rem;
            cursor: pointer; text-transform: uppercase;
        }

        .ball-dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ball { width: 22px; height: 22px; background: #fff; box-shadow: 0 0 15px #fff; opacity: 0; z-index: 50; }
        #bat { width: 34px; height: 34px; border: 3px solid var(--gold); background: rgba(239, 178, 30, 0.3); display: none; z-index: 60; }
        
        #touch-surface { position: absolute; inset: 0; z-index: 100; }
    </style>
</head>
<body>

<div id="v-area">
    <video id="v" loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="tray">
    <div id="left-panel">
        <div class="stat-box">
            <div class="stat-row"><span>RUNS</span><span id="r-val">0</span></div>
            <div style="font-size:0.7rem; color:#888; margin-top:4px;">OUTS: <span id="o-val">0</span> | STRK: <span id="s-val">0</span></div>
        </div>
        <div id="spray-chart"></div>
        <div style="font-size:0.8rem;">
            TIMING: <b id="time-f" style="color:var(--gold)">READY</b><br>
            RESULT: <b id="res-f">---</b>
        </div>
    </div>

    <div id="right-panel">
        <div id="nestico-container">
            <div id="start-overlay">Tap To Swing<br>& Start</div>
            <div id="strike-zone">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div id="touch-surface"></div>
            <div id="ball" class="ball-dot"></div>
            <div id="bat" class="ball-dot"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const surface = document.getElementById('touch-surface');
    const startOverlay = document.getElementById('start-overlay');

    // USING YOUR SCALE EXACTLY
    const PITCHES = [
        {t: 0.92, x: 50,  y: 40},  {t: 6.40, x: 85,  y: 30},
        {t: 10.86,x: 100, y: 75},  {t: 16.08,x: 135, y: 95},
        {t: 21.50,x: 150, y: 75},  {t: 28.03,x: 35,  y: 170},
        {t: 36.17,x: 50,  y: 65},  {t: 41.84,x: 40,  y: 130}
    ];

    let state = { r: 0, s: 0, o: 0, last: 0, idx: -1, active: false };

    startOverlay.onclick = () => {
        startOverlay.style.display = 'none';
        v.play();
    };

    v.addEventListener('timeupdate', () => {
        const now = v.currentTime;
        if (now < state.last) { 
            state.idx = -1; state.active = false;
            document.getElementById('spray-chart').innerHTML = '';
            resetStats();
        }
        state.last = now;

        let cur = -1;
        PITCHES.forEach((p, i) => { if (now >= p.t && now < p.t + 0.45) cur = i; });

        if (cur !== state.idx) {
            state.idx = cur; state.active = true;
            document.getElementById('bat').style.display = 'none';
            const b = document.getElementById('ball');
            if (cur !== -1) {
                b.style.left = PITCHES[cur].x + 'px';
                b.style.top = PITCHES[cur].y + 'px';
                b.style.opacity = '1';
            } else { b.style.opacity = '0'; }
        }
    });

    surface.onpointerdown = (e) => {
        surface.setPointerCapture(e.pointerId);
        if (state.idx === -1 || !state.active) return;
        state.active = false;

        const rect = document.getElementById('nestico-container').getBoundingClientRect();
        const ux = e.clientX - rect.left;
        const uy = e.clientY - rect.top;
        const p = PITCHES[state.idx];
        
        const batUI = document.getElementById('bat');
        batUI.style.left = ux + 'px'; batUI.style.top = uy + 'px'; batUI.style.display = 'block';

        const err = Math.sqrt(Math.pow(ux - p.x, 2) + Math.pow(uy - p.y, 2));
        const dt = v.currentTime - p.t;

        document.getElementById('time-f').innerText = dt < 0.15 ? "AHEAD" : (dt > 0.35 ? "LATE" : "ON TIME");

        const res = document.getElementById('res-f');
        if (err < 40) {
            const dy = p.y - uy;
            if (err < 15 && dy > 2) {
                state.r++; document.getElementById('r-val').innerText = state.r;
                res.innerText = "HOME RUN"; res.style.color = "var(--gold)";
                addSpray("var(--gold)", dt);
            } else if (err < 30) {
                res.innerText = "BASE HIT"; res.style.color = "#44ff44";
                addSpray("#44ff44", dt);
            } else {
                state.o++; document.getElementById('o-val').innerText = state.o;
                res.innerText = "FIELDED OUT"; res.style.color = "#ff4444";
                addSpray("#ff4444", dt);
            }
        } else {
            state.s++; document.getElementById('s-val').innerText = state.s;
            res.innerText = "MISS / STRIKE"; res.style.color = "#888";
        }
    };

    function addSpray(color, dt) {
        const dot = document.createElement('div');
        dot.className = 'hit-dot';
        dot.style.background = color;
        dot.style.left = (50 + (dt - 0.25) * 180) + "%";
        dot.style.top = (Math.random() * 40 + 5) + "%";
        document.getElementById('spray-chart').appendChild(dot);
    }

    function resetStats() {
        state.s = 0; state.o = 0;
        document.getElementById('s-val').innerText = "0";
        document.getElementById('o-val').innerText = "0";
        document.getElementById('res-f').innerText = "---";
        document.getElementById('time-f').innerText = "READY";
    }
</script>
</body>
</html>
