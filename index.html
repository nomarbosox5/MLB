<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB Statcast MVP</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #v-sec { width: 100%; position: relative; background: #000; }
        video { width: 100%; max-height: 48vh; display: block; object-fit: contain; }

        /* BROADCAST SCOREBOARD */
        #broadcast-bar { 
            background: #111; border-top: 2px solid #333; border-bottom: 2px solid #333; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }
        .score-box { font-size: 1rem; color: #aaa; }
        .score-box b { color: #00ffcc; font-size: 1.2rem; margin-left: 5px; }
        #count-display { font-family: monospace; font-size: 1.4rem; letter-spacing: 2px; }
        
        /* BASE DIAMOND */
        .diamond { display: grid; grid-template-columns: repeat(2, 14px); gap: 6px; transform: rotate(45deg); }
        .base { width: 12px; height: 12px; border: 1px solid #444; background: #222; transition: background 0.3s; }
        .base.filled { background: #f1c40f; border-color: #fff; box-shadow: 0 0 8px #f1c40f; }

        /* DASHBOARD */
        #dashboard { flex-grow: 1; display: grid; grid-template-columns: 1fr 160px; align-items: center; padding: 15px; gap: 15px; }
        #reports { display: flex; flex-direction: column; gap: 5px; }
        #timing-ui { font-size: 0.8rem; font-weight: 800; min-height: 1.1rem; }
        #outcome { font-size: 1.7rem; font-weight: 900; color: #00ffcc; text-transform: uppercase; margin: 0; line-height: 1; }
        .stat { font-size: 0.7rem; color: #666; font-family: monospace; }
        .stat b { color: #fff; }

        #field { 
            position: relative; width: 85px; height: 85px; background: #0a0a0a; 
            border-radius: 0 100% 0 0; transform: rotate(-45deg); 
            border-left: 2px solid #333; border-bottom: 2px solid #333; overflow: hidden; margin-top: 8px;
        }
        #hit-line { position: absolute; bottom: 0; left: 0; height: 3px; background: #00ffcc; transform-origin: left bottom; width: 0; transition: width 0.4s ease-out; }

        /* NESTICO ZONE */
        #nestico-box { position: relative; width: 160px; height: 200px; background: rgba(255,255,255,0.01); }
        #strike-zone { position: absolute; left: 43px; top: 33px; width: 74px; height: 133px; border: 2px solid rgba(255,255,255,0.5); }
        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #p-dot { width: 16px; height: 16px; background: white; opacity: 0; box-shadow: 0 0 10px #fff; z-index: 5; }
        #s-dot { width: 24px; height: 24px; background: #ff4d4d; border: 2px solid #fff; display: none; z-index: 6; }
        #tap { position: absolute; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body>

<div id="v-sec">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="broadcast-bar">
    <div class="score-box">RUNS <b id="run-val">0</b></div>
    <div id="count-display">0-0</div>
    <div class="diamond">
        <div class="base" id="b2"></div><div class="base" id="b1"></div>
        <div class="base" id="b3"></div><div class="base" style="opacity:0"></div>
    </div>
</div>

<div id="dashboard">
    <div id="reports">
        <div id="timing-ui"></div>
        <h1 id="outcome"></h1>
        <div class="stat">EXIT: <b id="v-ex">-</b> &nbsp; ANG: <b id="v-an">-</b></div>
        <div class="stat">DIST: <b id="v-di">-</b></div>
        <div id="field"><div id="hit-line"></div></div>
    </div>
    <div id="nestico-box">
        <div id="tap"></div>
        <div id="strike-zone"></div>
        <div id="p-dot" class="dot"></div>
        <div id="s-dot" class="dot"></div>
    </div>
</div>

<script>
    const video = document.getElementById('v');
    // YOUR PRECISE TIMINGS LOADED HERE
    const PITCHES = [
        { id:1, t:0.92,  nx:-0.75, ny:3.25, strike:true },
        { id:2, t:6.40,  nx:-0.40, ny:3.50, strike:true },
        { id:3, t:10.86, nx:-0.25, ny:2.75, strike:true },
        { id:4, t:16.08, nx:0.15,  ny:2.60, strike:true },
        { id:5, t:21.50, nx:0.20,  ny:2.75, strike:true },
        { id:6, t:28.03, nx:-0.90, ny:1.75, strike:false },
        { id:7, t:36.17, nx:-0.75, ny:3.00, strike:true },
        { id:8, t:41.84, nx:-0.90, ny:2.25, strike:false }
    ];

    let game = { runs: 0, b: 0, s: 0, activeId: null, swung: false };

    function syncCount() {
        if (game.s >= 3 || game.b >= 4) { game.b = 0; game.s = 0; resetBases(); }
        document.getElementById('count-display').innerText = `${game.b}-${game.s}`;
    }
    function resetBases() { document.querySelectorAll('.base').forEach(b => b.classList.remove('filled')); }

    video.addEventListener('timeupdate', () => {
        const now = video.currentTime;
        const active = [...PITCHES].reverse().find(p => now >= p.t);

        if (active && game.activeId !== active.id) {
            if (game.activeId !== null && !game.swung) {
                const prev = PITCHES.find(p => p.id === game.activeId);
                prev.strike ? game.s++ : game.b++;
                syncCount();
            }
            game.activeId = active.id; game.swung = false;
            document.getElementById('s-dot').style.display = "none";
            document.getElementById('outcome').innerText = "";
            document.getElementById('timing-ui').innerText = "";
            document.getElementById('hit-line').style.width = "0";
            const px = ((active.nx + 1.5) / 3.0) * 160;
            const py = 200 - (((active.ny - 1.0) / 3.0) * 200);
            const pd = document.getElementById('p-dot');
            pd.style.left = px+'px'; pd.style.top = py+'px'; pd.style.opacity = "1";
        }
    });

    document.getElementById('tap').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (game.swung) return;
        const active = PITCHES.find(p => Math.abs(video.currentTime - p.t) < 0.45);
        if (!active) return;
        game.swung = true;
        const rect = document.getElementById('nestico-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;
        const px = ((active.nx + 1.5) / 3.0) * 160;
        const py = 200 - (((active.ny - 1.0) / 3.0) * 200);
        document.getElementById('s-dot').style.cssText = `left:${ux}px; top:${uy}px; display:block;`;

        const tDiff = video.currentTime - active.t;
        const yDiff = py - uy;
        const angle = Math.round(yDiff * 2.3);
        const exit = Math.round(108 - (Math.abs(tDiff) * 55) - (Math.abs(yDiff) * 0.4));
        const dist = Math.round((exit ** 2 / 30) * (1 + angle/45));

        const tUI = document.getElementById('timing-ui');
        if (Math.abs(tDiff) < 0.07) { tUI.innerText="ON TIME"; tUI.style.color="#00ffcc"; }
        else if (tDiff < 0) { tUI.innerText="EARLY"; tUI.style.color="#ffcc00"; }
        else { tUI.innerText="LATE"; tUI.style.color="#ff4d4d"; }

        if (Math.abs(yDiff) < 35) {
            game.b = 0; game.s = 0; syncCount();
            document.getElementById('v-ex').innerText = exit + " MPH";
            document.getElementById('v-an').innerText = angle + "°";
            document.getElementById('v-di').innerText = Math.max(0, dist) + " FT";
            if (dist > 385) {
                game.runs++; document.getElementById('run-val').innerText = game.runs;
                document.getElementById('outcome').innerText = "HOME RUN";
                resetBases();
            } else {
                document.getElementById('outcome').innerText = "IN PLAY";
                document.getElementById('b1').classList.add('filled');
            }
            const hl = document.getElementById('hit-line');
            hl.style.width = Math.min(dist/4, 100) + "%";
            hl.style.transform = `rotate(${-angle}deg)`;
        } else { game.s++; syncCount(); document.getElementById('outcome').innerText = "WHIFF"; }
    });
</script>
</body>
</html>
