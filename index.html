<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAVERSE STATCAST • T-Mobile Park Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap');
        
        body {
            background: #000;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }
        
        .video-container {
            position: relative;
            box-shadow: 0 0 30px #22d3ee;
        }
        
        .blue-grid {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 33.33%,
                rgba(103, 232, 249, 0.65) 33.33%,
                rgba(103, 232, 249, 0.65) 33.4%
            ),
            repeating-linear-gradient(
                90deg,
                transparent 0px,
                transparent 33.33%,
                rgba(103, 232, 249, 0.65) 33.33%,
                rgba(103, 232, 249, 0.65) 33.4%
            );
            pointer-events: none;
            z-index: 10;
        }
        
        .red-1 {
            position: absolute;
            font-size: 6rem;
            font-weight: 900;
            color: #ef4444;
            text-shadow: 0 0 20px #ef4444;
            z-index: 20;
            pointer-events: none;
            animation: pop 1.2s forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(0.4); opacity: 0; }
            30% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body class="bg-black text-white">

<div class="flex flex-col h-screen">
    <!-- VIDEO -->
    <div class="flex-1 relative video-container">
        <video id="pitch-video" 
               class="w-full h-full object-cover"
               autoplay loop muted playsinline
               src="ScreenRecording_04-17-2026 18-27-36_1.mp4">
        </video>
        
        <!-- Blue Grid Overlay (exactly like your screenshots) -->
        <div id="blue-grid" class="blue-grid"></div>
        
        <!-- Red "1" Indicator -->
        <div id="red-one" class="red-1 hidden">1</div>
    </div>

    <!-- BOTTOM STATCAST PANEL -->
    <div class="bg-black border-t-4 border-cyan-400 grid grid-cols-2 divide-x divide-cyan-400/30">
        
        <!-- LEFT -->
        <div class="p-6 space-y-6">
            <div>
                <div class="text-cyan-400 text-xs tracking-widest">EXIT VELO</div>
                <div id="exit-velo" class="text-7xl font-bold text-yellow-400">0.0</div>
                <div class="text-xs text-gray-400 -mt-1">MPH</div>
            </div
