<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Statcast Pro</title>
    <style>
        :root { --stat-gold: #f1c40f; --aws-blue: #00a1e0; --bg-dark: #0a0a0a; --glass-light: rgba(255, 255, 255, 0.05); }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }
        
        /* Header / Score Ticker */
        header { 
            height: 44px; background: #000; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; border-bottom: 1px solid #222; font-size: 12px; font-weight: 800;
        }
        .brand { color: var(--stat-gold); letter-spacing: 2px; }
        .ticker { display: flex; gap: 15px; align-items: center; }
        .dots { display: flex; gap: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .dot.active-b { background: var(--aws-blue); box-shadow: 0 0 5px var(--aws-blue); }
        .dot.active-s { background: var(--stat-gold); box-shadow: 0 0 5px var(--stat-gold); }
        .dot.active-o { background: #ff4757; box-shadow: 0 0 5px #ff4757; }

        /* Focused Video */
        #v-frame { width: 100%; aspect-ratio: 1.4; overflow: hidden; position: relative; background: #000; }
        video { width: 180%; height: 100%; object-fit: cover; margin-left: -40%; }

        /* Main Data Deck */
        #deck { 
            flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; 
            background: var(--bg-dark); padding: 12px; gap: 12px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Left Side: AWS Style Metrics */
        .stat-col { display: flex; flex-direction: column; gap: 8px; }
        .stat-card { 
            background: var(--glass-light); border: 1px solid #222; 
            padding: 8px 12px; border-left: 3px solid var(--aws-blue);
        }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-size: 18px; font-weight: 900; margin-top: 2px; }
        
        /* 3D Field Trajectory Diagram */
        #trajectory-box { 
            flex-grow: 1; border: 1px solid #222; border-radius: 4px; position: relative;
            background: linear-gradient(to top, #0f1a0f, #000); overflow: hidden;
        }
        .field-lines { position: absolute; bottom: 0; left: 50%; width: 100px; height: 100px; border: 1px solid #222; transform: translateX(-50%) rotateX(60deg); }
        #ball-arc { 
            position: absolute; bottom: 10px; left: 50%; width: 2px; 
            background: var(--stat-gold); transform-origin: bottom; opacity: 0;
            transition: height 0.5s ease-out;
        }

        /* Right Side: Strike Zone */
        #zone-box { display: flex; justify-content: center; align-items: center; }
        #strike-zone { 
            width: 150px; height: 200px; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; background: rgba(255,255,255,0.02);
        }
        .grid { position: absolute; background: rgba(255,255,255,0.1); pointer-events: none; }
        
        /* Hit Markers */
        .hit-node { position: absolute; width: 20px; height: 20px; background: #ff4757; border-radius: 50%; color: #fff; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); box-shadow: 0 0 10px #ff4757; }
        .swing-ring { position: absolute; width: 40px; height: 40px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <div class="brand">CRONIN STATCAST</div>
    <div class="ticker">
        <div style="display:flex; gap:10px">R <span id="r-val">0</span></div>
        <div class="dots" id="b-dots"></div>
        <div class="dots" id="s-dots"></div>
        <div class="dots" id="o-dots"></div>
    </div>
</header>

<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="stat-col">
        <div id="live-stats" style="opacity: 0; transition: 0.3s;">
            <div class="stat-card">
                <div class="stat-label">Exit Velocity</div>
                <div class="stat-val" id="exit-v" style="color:var(--stat-gold)">0.0 MPH</div>
            </div>
            <div class="stat-card" style="margin-top:8px">
                <div class="stat-label">Launch Angle / Dist</div>
                <div class="stat-val" id="dist-v">0 FT</div>
            </div>
        </div>
        
        <div id="trajectory-box">
            <div class="field-lines"></div>
            <div id="ball-arc"></div>
            <div style="position:absolute; top:10px; left:10px; font-size:8px; color:#444;">3D TRAJECTORY MODEL</div>
        </div>
    </div>

    <div id="zone-box">
        <div id="strike-zone">
            <div class="grid" style="width:1px; height:100%; left:33%"></div>
            <div class="grid" style="width:1px; height:100%; left:66%"></div>
            <div class="grid" style="height:1px; width:100%; top:33%"></div>
            <div class="grid" style="height:1px; width:100%; top:66%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('strike-zone');
    const arc = document.getElementById('ball-arc');
    const stats = document.getElementById('live-stats');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let game = { r: 0, b: 0, s: 0, o: 0 };
    let locked = false;

    function renderHUD() {
        document.getElementById('r-val').innerText = game.r;
        const set = (id, count, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<count?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        set('b-dots', game.b, 3, 'active-b');
        set('s-dots', game.s, 2, 'active-s');
        set('o-dots', game.o, 2, 'active-o');
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(locked) return;
        const r = sz.getBoundingClientRect();
        const t = e.touches[0];
        handleSwing(t.clientX - r.left, t.clientY - r.top);
    });

    function handleSwing(tx, ty) {
        locked = true;
        const now = v.currentTime;
        const p = pitches.find(p => Math.abs(now - p.t) < 0.6);

        sz.querySelectorAll('.hit-node, .swing-ring').forEach(n => n.remove());
        const ring = document.createElement('div'); ring.className = 'swing-ring';
        ring.style.left = tx+'px'; ring.style.top = ty+'px'; sz.appendChild(ring);

        if(p) {
            const px = ((p.x + 0.75) / 1.5) * 150;
            const py = ((1.0 - p.y) / 2.0) * 200;
            const d = Math.sqrt((tx-px)**2 + (ty-py)**2);
            
            const node = document.createElement('div'); node.className = 'hit-node'; node.innerText = '1';
            node.style.left = px+'px'; node.style.top = py+'px'; sz.appendChild(node);

            if(d < 35) {
                const velo = Math.floor(110 - d);
                const ft = Math.floor(velo * 3.8);
                showStats(velo, ft, tx-px);
                if(ft > 250) game.r++;
            } else { game.s++; }
        } else { game.s++; }

        if(game.s >= 3) { game.s = 0; game.o++; }
        if(game.o >= 3) { game = { r:0, b:0, s:0, o:0 }; }
        renderHUD();
    }

    function showStats(v, f, spray) {
        stats.style.opacity = 1;
        document.getElementById('exit-v').innerText = v + ".4 MPH";
        document.getElementById('dist-v').innerText = f + " FT";
        
        arc.style.opacity = 1;
        arc.style.height = (f/4) + 'px';
        arc.style.transform = `translateX(-50%) rotate(${spray*2}deg) skewY(-20deg)`;
    }

    setInterval(() => {
        const now = v.currentTime;
        if (now < 0.5 || pitches.some(p => p.t > now && p.t - now < 0.6)) {
            locked = false;
            stats.style.opacity = 0;
            arc.style.opacity = 0;
            if(now < 0.5) sz.innerHTML = '<div class="grid" style="width:1px; height:100%; left:33%"></div><div class="grid" style="width:1px; height:100%; left:66%"></div><div class="grid" style="height:1px; width:100%; top:33%"></div><div class="grid" style="height:1px; width:100%; top:66%"></div>';
        }
    }, 100);

    renderHUD();
</script>
</body>
</html>
