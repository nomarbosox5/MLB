<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Statcast Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap');
        
        :root { 
            --gold: #fcc419; --bg: #000; --border: #222; 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* Lock Safari Viewport */
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; margin: 0; background: #000; }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; color: #fff; }

        /* VIDEO AREA (45%) */
        #v-area { height: 45vh; margin-top: var(--safe-top); position: relative; border-bottom: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* DASHBOARD (55%) */
        #dashboard { flex-grow: 1; display: flex; padding-bottom: var(--safe-bottom); }

        /* LEFT: ANALYTICS STACK */
        #left-panel { width: 40%; padding: 25px 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; gap: 25px; }
        .stat { border-left: 2px solid #1a1a1a; padding-left: 12px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .val { font-family: 'JetBrains Mono'; font-size: 16px; color: #fff; }
        .hero { color: var(--gold); font-size: 26px; font-weight: 900; }

        /* RIGHT: INTERACTION GRID */
        #right-panel { width: 60%; display: flex; align-items: center; justify-content: center; background: #030303; }
        
        /* THE TAPPABLE UNIVERSE (180x240) */
        #grid { 
            width: 180px; height: 240px; background: #080808; border: 2px solid #333; position: relative;
        }
        
        /* THE STRIKE ZONE (STRING ZONE) */
        #strike-zone {
            position: absolute;
            left: 45px; top: 40px; width: 90px; height: 160px; /* Locked to -0.75/0.75 and 1.5/3.5 */
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            pointer-events: none;
        }

        .marker { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0; pointer-events: none; }
        #pitch { width: 14px; height: 14px; background: #fff; box-shadow: 0 0 10px #fff; z-index: 10; }
        #swing { width: 36px; height: 36px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.2); z-index: 11; }
    </style>
</head>
<body>

<div id="v-area">
    <video id="v" playsinline autoplay muted loop preload="auto">
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="dashboard">
    <div id="left-panel">
        <div class="stat"><div class="label">Exit Velocity</div><div id="ev" class="val hero">0.0 MPH</div></div>
        <div class="stat"><div class="label">Timing</div><div id="time" class="val">---</div></div>
        <div class="stat"><div class="label">Zone Result</div><div id="res" class="val">---</div></div>
    </div>

    <div id="right-panel">
        <div id="grid" onpointerdown="handleTap(event)">
            <div id="strike-zone"></div>
            <div id="pitch" class="marker"></div>
            <div id="swing" class="marker"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    
    // THE BIBLE: FIXED DATASET
    const PITCHES = [
        { t: 0.92,  x: -0.75, y: 3.25 }, { t: 6.40,  x: -0.40, y: 3.50 }, 
        { t: 10.86, x: -0.25, y: 2.75 }, { t: 16.08, x: 0.15,  y: 2.60 },
        { t: 21.50, x: 0.20,  y: 2.75 }, { t: 28.03, x: -0.90, y: 1.75 },
        { t: 34.10, x: -0.75, y: 3.00 }, { t: 40.25, x: -0.90, y: 2.25 }
    ];

    let state = { currentIdx: -1, lastProcessedIdx: -1 };

    // Pixel Mapping
    const mapX = (x) => ((x + 1.5) / 3) * 180;
    const mapY = (y) => (1 - (y - 1) / 3) * 240;

    v.ontimeupdate = () => {
        const now = v.currentTime;
        let activeIdx = -1;

        for (let i = 0; i < PITCHES.length; i++) {
            const p = PITCHES[i];
            const nextP = PITCHES[i + 1];
            const resetTime = nextP ? p.t + (nextP.t - p.t) / 2 : p.t + 2.5;

            // Interaction Window
            if (now >= p.t - 0.4 && now < p.t + 0.4) activeIdx = i;

            // Persistence
            if (now >= p.t - 0.1 && now < resetTime) {
                const pDot = document.getElementById('pitch');
                pDot.style.left = mapX(p.x) + 'px';
                pDot.style.top = mapY(p.y) + 'px';
                pDot.style.opacity = 1;
            }
        }

        if (activeIdx !== state.currentIdx) {
            state.currentIdx = activeIdx;
            if (activeIdx !== -1) state.lastProcessedIdx = -1; 
        }
    };

    function handleTap(e) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;

        const sDot = document.getElementById('swing');
        sDot.style.left = sx + 'px'; sDot.style.top = sy + 'px'; sDot.style.opacity = 1;

        if (state.currentIdx !== -1 && state.lastProcessedIdx === -1) {
            const p = PITCHES[state.currentIdx];
            const dist = Math.sqrt(Math.pow(sx - mapX(p.x), 2) + Math.pow(sy - mapY(p.y), 2));

            // Binary Zone Result (Edge logic: touches zone = strike)
            const isStrike = (p.x >= -0.75 && p.x <= 0.75 && p.y >= 1.5 && p.y <= 3.5);
            document.getElementById('res').innerText = isStrike ? "STRIKE" : "BALL";
            document.getElementById('res').style.color = isStrike ? "var(--gold)" : "#fff";

            if (dist < 45) { // Contact Radius
                const ev = Math.max(0, 115 - (dist * 1.5)).toFixed(1);
                const dt = v.currentTime - p.t;
                document.getElementById('ev').innerText = ev + " MPH";
                document.getElementById('time').innerText = Math.abs(dt) < 0.1 ? "GOOD" : (dt < 0 ? "EARLY" : "LATE");
            } else {
                document.getElementById('ev').innerText = "0.0 MPH";
                document.getElementById('time').innerText = "WHIFF";
            }
            state.lastProcessedIdx = state.currentIdx;
        }
    }
</script>
</body>
</html>
