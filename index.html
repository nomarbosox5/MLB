<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Statcast Pro | iPhone 17 Plus</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;900&display=swap');
        
        :root { 
            --gold: #fcc419; --bg: #000; --border: #222; 
            /* Safe area for iPhone Dynamic Island and Safari bottom bar */
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* 1. TOP: VIDEO FEED (40% HEIGHT) */
        #v-area { 
            height: 40vh; margin-top: var(--safe-top);
            position: relative; background: #000; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 12px 12px; }

        /* 2. DASHBOARD: SPLIT VIEW (60% HEIGHT) */
        #dashboard { 
            flex-grow: 1; display: flex; width: 100%; 
            padding-bottom: calc(var(--safe-bottom) + 10px); 
        }

        /* LEFT: ANALYTICS */
        #left-panel { 
            width: 45%; padding: 25px 15px; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; justify-content: center; gap: 25px; 
        }
        .stat { border-left: 2px solid #1a1a1a; padding-left: 10px; }
        .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; }
        .val { font-family: 'JetBrains Mono'; font-size: 16px; color: #fff; margin-top: 4px; }
        .hero { color: var(--gold); font-size: 24px; font-weight: 900; }

        /* RIGHT: INTERACTION */
        #right-panel { 
            width: 55%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #030303; 
        }
        
        /* SCOREBUG */
        #bug { 
            display: flex; justify-content: space-around; align-items: center; 
            width: 85%; background: #0a0a0a; padding: 10px; border-radius: 8px; 
            margin-bottom: 20px; border: 1px solid #1a1a1a;
        }
        .dots-col { display: flex; flex-direction: column; gap: 4px; }
        .dots { display: flex; gap: 4px; font-size: 8px; font-weight: 900; color: #333; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #000; border: 1px solid #222; }
        .dot.on { background: var(--gold); border: none; box-shadow: 0 0 8px var(--gold); }
        .diamond { position: relative; width: 30px; height: 30px; transform: rotate(45deg); }
        .base { position: absolute; width: 9px; height: 9px; background: #222; border: 1px solid #333; }
        #b1 { top: 0; right: 0; } #b2 { top: 0; left: 0; } #b3 { bottom: 0; left: 0; }

        /* PRECISION GRID */
        #grid { 
            width: 180px; height: 180px; background: #080808; 
            border: 1px solid #222; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #strike-zone { 
            position: absolute; left: 25%; top: 20%; width: 50%; height: 55%; 
            border: 1px solid rgba(255,255,255,0.12); 
            background: rgba(255,255,255,0.01);
        }

        /* MARKERS - Safari Hardware Accelerated */
        .marker { 
            position: absolute; border-radius: 50%; 
            transform: translate(-50%, -50%) translateZ(0); 
            opacity: 0; pointer-events: none; 
        }
        #pitch { width: 12px; height: 12px; background: #fff; box-shadow: 0 0 10px #fff; z-index: 10; }
        #swing { width: 36px; height: 36px; border: 2px solid var(--gold); background: rgba(252, 196, 25, 0.1); z-index: 11; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .btn { border: 1px solid #fff; color: #fff; padding: 15px 30px; font-weight: 900; text-transform: uppercase; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="v-area">
    <div id="overlay" onclick="startApp()"><div class="btn">Connect Statcast Feed</div></div>
    <video id="v" playsinline muted loop preload="auto">
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="dashboard">
    <div id="left-panel">
        <div class="stat"><div class="label">Exit Velocity</div><div id="ev" class="val hero">0.0 MPH</div></div>
        <div class="stat"><div class="label">Swing Timing</div><div id="time" class="val">---</div></div>
        <div class="stat"><div class="label">Contact Result</div><div id="res" class="val">---</div></div>
    </div>

    <div id="right-panel">
        <div id="bug">
            <div class="dots-col">
                <div class="dots">B <div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="dots">S <div class="dot" id="s1"></div><div class="dot" id="s2"></div><div class="dot" id="s3"></div></div>
            </div>
            <div class="diamond"><div class="base" id="b2"></div><div class="base" id="b1"></div><div class="base" id="b3"></div></div>
        </div>

        <div id="grid" onpointerdown="handleTap(event)">
            <div id="strike-zone"></div>
            <div id="pitch" class="marker"></div>
            <div id="swing" class="marker"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const PITCHES = [
        { t: 0.92,  x: -0.20, y: -0.15 }, { t: 6.40,  x: 0.35,  y: 0.40 }, 
        { t: 10.86, x: -0.05, y: -0.50 }, { t: 16.08, x: 0.55,  y: 0.10 },
        { t: 21.50, x: -0.80, y: 0.60 },  { t: 28.03, x: 0.10,  y: -0.20 }
    ];

    let state = { idx: -1, strikes: 0 };
    const mapCoord = (val) => 90 + (val * 45); // Scale adjusted for 180px grid

    function startApp() { document.getElementById('overlay').style.display = 'none'; v.play(); }

    v.ontimeupdate = () => {
        let match = PITCHES.findIndex(p => v.currentTime >= p.t - 0.4 && v.currentTime < p.t + 0.4);
        const pMarker = document.getElementById('pitch');
        
        if (match !== -1) {
            state.idx = match;
            pMarker.style.left = mapCoord(PITCHES[match].x) + 'px';
            pMarker.style.top = mapCoord(-PITCHES[match].y) + 'px'; // Invert Y for screen
            pMarker.style.opacity = (v.currentTime >= PITCHES[match].t - 0.1) ? 1 : 0.4;
        } else {
            pMarker.style.opacity = 0;
            state.idx = -1;
        }
    };

    function handleTap(e) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        
        const sMarker = document.getElementById('swing');
        sMarker.style.left = sx + 'px'; sMarker.style.top = sy + 'px'; sMarker.style.opacity = 1;

        if (state.idx !== -1) {
            const p = PITCHES[state.idx];
            const dist = Math.sqrt(Math.pow(sx - mapCoord(p.x), 2) + Math.pow(sy - mapCoord(-p.y), 2));
            const dt = v.currentTime - p.t;

            if (dist < 38) {
                const ev = Math.max(0, 114 - (dist * 1.8)).toFixed(1);
                document.getElementById('ev').innerText = ev + " MPH";
                document.getElementById('time').innerText = Math.abs(dt) < 0.1 ? "GOOD" : (dt < 0 ? "EARLY" : "LATE");
                document.getElementById('res').innerText = dist < 12 ? "SQUARED UP" : "SOLID";
                state.strikes = 0;
            } else {
                state.strikes = Math.min(3, state.strikes + 1);
                document.getElementById('ev').innerText = "0.0 MPH";
                document.getElementById('time').innerText = "STRIKE";
                document.getElementById('res').innerText = "WHIFF";
            }
            updateStrikes();
        }
    }

    function updateStrikes() {
        for(let i=1; i<=3; i++) document.getElementById('s'+i).className = i <= state.strikes ? 'dot on' : 'dot';
        if(state.strikes >= 3) setTimeout(() => { state.strikes = 0; updateStrikes(); }, 1200);
    }
</script>
</body>
</html>
