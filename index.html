<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MLB Zone Tracker - 75mph Bat Speed</title>
    <style>
        body { background: #0e0e0e; color: #e0e0e0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; }
        .game-wrapper { display: flex; gap: 20px; margin-top: 20px; }
        .canvas { position: relative; width: 300px; height: 420px; background: #1a1a1a; border: 3px solid #333; }
        
        /* Nestico Strike Zone (Zones 1-9) mapped to pixels */
        .strike-zone { 
            position: absolute; 
            left: 50px; top: 60px; 
            width: 200px; height: 240px; 
            border: 2px solid rgba(255,255,255,0.4);
            box-sizing: border-box;
        }

        .dot { position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 10; }
        .scoreboard { background: #222; padding: 15px; border-radius: 5px; width: 250px; border-left: 5px solid #00ff00; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; }
        button { padding: 10px; background: #333; color: white; border: 1px solid #444; cursor: pointer; }
        button:hover { background: #444; }
        .log { margin-top: 20px; font-size: 12px; color: #888; width: 570px; height: 100px; overflow-y: auto; background: #111; padding: 10px; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="canvas" id="canvas">
            <div class="strike-zone"></div>
            <div id="ball" class="dot"></div>
        </div>

        <div>
            <div class="scoreboard">
                <div style="font-size: 24px; letter-spacing: 2px;">
                    <span id="balls">0</span> - <span id="strikes">0</span>
                </div>
                <div style="font-size: 14px; color: #888;">OUTS: <span id="outs">0</span></div>
                <hr style="border: 0; border-top: 1px solid #444;">
                <div id="play-result">WAITING FOR PITCH...</div>
            </div>

            <div class="btn-grid">
                <button onclick="processPitch(0)">P1</button>
                <button onclick="processPitch(1)">P2</button>
                <button onclick="processPitch(2)">P3</button>
                <button onclick="processPitch(3)">P4</button>
                <button onclick="processPitch(4)">P5</button>
                <button onclick="processPitch(5)">P6</button>
                <button onclick="processPitch(6)">P7</button>
                <button onclick="processPitch(7)">P8</button>
            </div>
            <button onclick="resetGame()" style="width: 100%; margin-top: 5px; background: #422;">RESET GAME</button>
        </div>
    </div>

    <div id="gameLog" class="log">GAME LOG INITIALIZED...</div>

    <script>
        let count = { b: 0, s: 0, o: 0 };
        
        // Coordinates normalized to Nestico Grid (X: -1 to 1, Y: 1 to 4)
        const pitchData = [
            { id: 1, x: -0.75, y: 3.25, type: "STRIKE", physics: { len: 285, ang: 12, desc: "Line Drive" } },
            { id: 2, x: -0.4,  y: 3.5,  type: "STRIKE", physics: { len: 340, ang: 25, desc: "Deep Fly" } },
            { id: 3, x: -0.25, y: 2.75, type: "STRIKE", physics: { len: 110, ang: -5, desc: "Grounder" } },
            { id: 4, x: 0.15,  y: 2.6,  type: "STRIKE", physics: { len: 150, ang: 45, desc: "Pop Up" } },
            { id: 5, x: 0.2,   y: 2.75, type: "STRIKE", physics: { len: 140, ang: 2,  desc: "Hard Grounder" } },
            { id: 6, x: -0.9,  y: 1.75, type: "BALL",   physics: { len: 0,   ang: 0,  desc: "Taken" } },
            { id: 7, x: -0.75, y: 3.0,  type: "STRIKE", physics: { len: 310, ang: 18, desc: "Gapper" } },
            { id: 8, x: -0.9,  y: 2.25, type: "BALL",   physics: { len: 0,   ang: 0,  desc: "Taken" } }
        ];

        function processPitch(i) {
            const p = pitchData[i];
            
            // Visual mapping logic (X -1 to 1 maps to 50 to 250px | Y 1 to 4 maps to 300 to 0px)
            const visualX = ((p.x + 1) / 2) * 200 + 50;
            const visualY = 300 - ((p.y - 1) / 3) * 300 + 60;

            const ball = document.getElementById('ball');
            ball.style.left = visualX + "px";
            ball.style.top = visualY + "px";
            ball.style.display = 'block';

            let resText = "";
            if (p.type === "STRIKE") {
                count.s++;
                resText = `STRIKE! ${p.physics.desc} (${p.physics.len}ft)`;
            } else {
                count.b++;
                resText = `BALL! ${p.physics.desc}`;
            }

            // Logic for strikeout/walk/outs
            if (count.s >= 3) { count.o++; count.s = 0; count.b = 0; resText = "STRIKEOUT!"; }
            if (count.b >= 4) { count.s = 0; count.b = 0; resText = "WALK!"; }
            if (count.o >= 3) { count.o = 0; resText = "INNING OVER"; }

            updateUI(resText, p.id);
        }

        function updateUI(msg, id) {
            document.getElementById('balls').innerText = count.b;
            document.getElementById('strikes').innerText = count.s;
            document.getElementById('outs').innerText = count.o;
            document.getElementById('play-result').innerText = msg;
            
            const log = document.getElementById('gameLog');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            log.innerHTML = `[${time}] Pitch ${id}: ${msg}<br>` + log.innerHTML;
        }

        function resetGame() {
            count = { b: 0, s: 0, o: 0 };
            updateUI("GAME RESET", "N/A");
            document.getElementById('ball').style.display = 'none';
        }
    </script>
</body>
</html>
