<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Pro Tracker</title>
    <style>
        :root { --neon-green: #00ffcc; --bg-black: #050505; }
        body { background: var(--bg-black); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        
        /* Main Layout Container */
        .container { display: flex; flex-direction: column; width: 100%; max-width: 400px; gap: 30px; }

        /* The Result Text UX */
        .outcome-panel { height: 120px; display: flex; flex-direction: column; justify-content: center; }
        .result-title { font-size: 48px; font-weight: 900; line-height: 1; text-transform: uppercase; color: var(--neon-green); margin: 0; }
        .sub-text { font-size: 14px; letter-spacing: 2px; color: #666; margin-top: 5px; }

        /* Nestico Grid Visuals */
        .zone-box { position: relative; width: 300px; height: 350px; background: #111; border: 1px solid #333; align-self: center; }
        .inner-strike-zone { position: absolute; left: 50px; top: 60px; width: 200px; height: 230px; border: 1.5px solid rgba(255,255,255,0.2); pointer-events: none; }
        .dot { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255,255,255,0.5); display: none; }

        /* Navigation */
        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        button { background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:active { background: var(--neon-green); color: black; }

        /* Score Stats */
        .mini-score { font-size: 12px; color: #444; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <div class="outcome-panel">
            <h1 class="result-title" id="resTitle">READY</h1>
            <div class="sub-text" id="subText">SELECT PITCH TO BEGIN</div>
        </div>

        <div class="zone-box">
            <div class="inner-strike-zone"></div>
            <div id="ball" class="dot"></div>
        </div>

        <div class="button-grid">
            <button onclick="play(0)">P1</button><button onclick="play(1)">P2</button>
            <button onclick="play(2)">P3</button><button onclick="play(3)">P4</button>
            <button onclick="play(4)">P5</button><button onclick="play(5)">P6</button>
            <button onclick="play(6)">P7</button><button onclick="play(7)">P8</button>
        </div>

        <div class="mini-score">
            BALLS: <span id="b">0</span> | STRIKES: <span id="s">0</span> | OUTS: <span id="o">0</span>
        </div>
    </div>

    <script>
        let gameState = { b: 0, s: 0, o: 0 };
        const data = [
            { x: -0.75, y: 3.25, res: "Home Run", sub: "PERFECT TIMING", color: "#00ffcc" },
            { x: -0.4,  y: 3.5,  res: "Fly Out",  sub: "DEEP CENTER", color: "#fff" },
            { x: -0.25, y: 2.75, res: "Strike",   sub: "LOOKING", color: "#ff3333" },
            { x: 0.15,  y: 2.6,  res: "Pop Up",   sub: "INFIELD", color: "#fff" },
            { x: 0.2,   y: 2.75, res: "Grounder", sub: "6-3 OUT", color: "#fff" },
            { x: -0.9,  y: 1.75, res: "Ball",     sub: "LOW AND AWAY", color: "#3399ff" },
            { x: -0.75, y: 3.0,  res: "Double",   sub: "GAPPER", color: "#00ffcc" },
            { x: -0.9,  y: 2.25, res: "Ball",     sub: "OUTSIDE", color: "#3399ff" }
        ];

        function play(i) {
            const p = data[i];
            
            // Map to pixels (X -1 to 1 | Y 1 to 4)
            const vX = ((p.x + 1) / 2) * 200 + 50;
            const vY = 350 - ((p.y - 1) / 3) * 350;

            const ball = document.getElementById('ball');
            ball.style.left = vX + "px";
            ball.style.top = vY + "px";
            ball.style.display = 'block';

            // Update Text UX
            const title = document.getElementById('resTitle');
            title.innerText = p.res;
            title.style.color = p.color;
            document.getElementById('subText').innerText = p.sub;

            // Simple Count Logic
            if(p.res === "Strike") gameState.s++;
            if(p.res === "Ball") gameState.b++;
            if(gameState.s >= 3) { gameState.o++; gameState.s = 0; gameState.b = 0; }
            
            document.getElementById('b').innerText = gameState.b;
            document.getElementById('s').innerText = gameState.s;
            document.getElementById('o').innerText = gameState.o;
        }
    </script>
</body>
</html>
