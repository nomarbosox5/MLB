<style>
    /* Prevent Safari's elastic scrolling and address bar shifts */
    html, body { 
        height: 100%; 
        overflow: hidden; 
        position: fixed; 
        width: 100%; 
    }

    #grid { 
        width: 180px; 
        height: 240px; 
        background: #080808; 
        border: 2px solid #444; 
        position: relative;
        /* Ensures the grid is always touch-ready on mobile Safari */
        touch-action: none; 
        -webkit-tap-highlight-color: transparent;
    }

    /* Fixed Pixel String Zone for iPhone 17 Plus High PPI */
    #strike-zone {

        pointer-events: none;
    }
</style>
