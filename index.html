<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nestico Visual Zones</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }
        
        #v-frame { width: 100%; height: 42vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        #tray { flex-grow: 1; display: flex; background: #111; border-top: 1px solid #333; }

        #stats { width: 40%; display: flex; flex-direction: column; justify-content: center; padding: 20px; border-right: 1px solid #222; }
        .data-b { font-size: 1.8rem; color: #efb21e; display: block; margin-bottom: 10px; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* THE MAP WITH VISUAL ZONES */
        #map-side { width: 60%; display: flex; align-items: center; justify-content: center; position: relative; }
        
        #nestico-container { 
            position: relative; width: 210px; height: 250px; 
            background: #0a0a0a; border: 1px solid #333; 
        }

        /* THE VISUAL STRIKE ZONE (Inner 3x3) */
        #inner-strike-zone {
            position: absolute;
            top: 50px; left: 40px; width: 130px; height: 150px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.03);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }
        .cell { border: 0.5px solid rgba(255,255,255,0.1); }

        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ball { width: 20px; height: 20px; background: #fff; box-shadow: 0 0 15px #fff; opacity: 0; z-index: 10; }
        #bat { width: 32px; height: 32px; border: 3px solid #efb21e; background: rgba(239, 178, 30, 0.2); display: none; z-index: 20; }
        
        #hit-gate { position: absolute; inset: 0; z-index: 100; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div id="v-frame" onclick="document.getElementById('v').play()">
    <video id="v" autoplay muted loop playsinline>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="tray">
    <div id="stats">
        <span class="label">Runs</span><b class="data-b" id="runs">0</b>
        <span class="label">Exit Velo</span><b class="data-b" id="ev">0.0</b>
    </div>

    <div id="map-side">
        <div id="nestico-container">
            <div id="inner-strike-zone">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div id="hit-gate"></div>
            <div id="ball" class="dot"></div>
            <div id="bat" class="dot"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    // Mapped to 210x250 Container
    const PITCHES = [
        {t: 0.92, x: 55, y: 70},   {t: 6.40, x: 105, y: 70},
        {t: 10.86,x: 105, y: 125}, {t: 16.08,x: 155, y: 125},
        {t: 21.50,x: 180, y: 110}, {t: 28.03,x: 30, y: 220}, // Way Out (Ball)
        {t: 36.17,x: 55, y: 125},  {t: 41.84,x: 25, y: 180}  // Edge (Ball)
    ];

    let g = { r: 0, last: 0, idx: -1, active: false };

    v.addEventListener('timeupdate', () => {
        const now = v.currentTime;
        if (now < g.last) { g.idx = -1; g.active = false; }
        g.last = now;

        let cur = -1;
        PITCHES.forEach((p, i) => { if (now >= p.t && now < p.t + 0.6) cur = i; });

        if (cur !== g.idx) {
            g.idx = cur; g.active = true;
            document.getElementById('bat').style.display = 'none';
            const b = document.getElementById('ball');
            if (cur !== -1) {
                b.style.left = PITCHES[cur].x + 'px';
                b.style.top = PITCHES[cur].y + 'px';
                b.style.opacity = '1';
            } else { b.style.opacity = '0'; }
        }
    });

    document.getElementById('hit-gate').onpointerdown = function(e) {
        this.setPointerCapture(e.pointerId);
        if (g.idx === -1 || !g.active) return;
        g.active = false;

        const rect = document.getElementById('nestico-container').getBoundingClientRect();
        const ux = e.clientX - rect.left;
        const uy = e.clientY - rect.top;
        
        const bUI = document.getElementById('bat');
        bUI.style.left = ux + 'px'; bUI.style.top = uy + 'px'; bUI.style.display = 'block';

        const p = PITCHES[g.idx];
        const err = Math.sqrt(Math.pow(ux - p.x, 2) + Math.pow(uy - p.y, 2));

        if (err < 40) {
            let ev = 114 - (err * 0.9);
            const la = Math.round((p.y - uy) * 2.1);
            document.getElementById('ev').innerText = Math.round(ev) + " MPH";
            if (la >= 22 && la <= 38 && ev > 102) {
                g.r++; document.getElementById('runs').innerText = g.r;
            }
        }
    };
</script>
</body>
</html>
