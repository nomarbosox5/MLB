<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baseball Statcast Mobile</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Video stays at the top with a locked aspect ratio */
        #video-container {
            width: 100%;
            background: #111;
            aspect-ratio: 16 / 9;
            position: relative;
            flex-shrink: 0;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Bottom Section: Controls & Grid */
        #gameplay-area {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: #0a0a0a;
            border-top: 2px solid #333;
        }

        #ui-left {
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #222;
        }

        #ui-right {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Scoreboard & Feedback */
        .scoreboard { background: #1a1a1a; padding: 10px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .dots { display: flex; gap: 6px; margin: 4px 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #333; }
        .active-b { background: #3498db; }
        .active-s { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .active-o { background: #e74c3c; }

        .swing-feedback { 
            background: rgba(255,255,255,0.05); 
            border-left: 4px solid #f1c40f; 
            padding: 10px; 
            transition: opacity 0.2s;
        }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .value { font-size: 16px; margin-bottom: 4px; font-weight: 800; }

        /* The Grid - Scaled for Mobile */
        #strike-zone {
            width: 150px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
            background: rgba(255,255,255,0.03);
            touch-action: none;
        }
        .grid-line { position: absolute; background: rgba(255,255,255,0.2); pointer-events: none; }
        
        .ball-hit { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; border: 2px solid #000; }
        .bat-tap { position: absolute; width: 8px; height: 40px; background: #8d6e63; transform: translate(-50%, -50%) rotate(45deg); z-index: 11; border: 1px solid #000; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="v" autoplay muted loop playsinline preload="auto">
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
</div>

<div id="gameplay-area">
    <div id="ui-left">
        <div class="scoreboard">
            <div>B <div class="dots" id="b-row"></div></div>
            <div>S <div class="dots" id="s-row"></div></div>
            <div>O <div class="dots" id="o-row"></div></div>
        </div>
        
        <div class="swing-feedback" id="feedback" style="opacity:0">
            <div class="label">Result</div>
            <div id="res-contact" class="value">---</div>
            <div class="label">Exit Velo</div>
            <div id="res-speed" class="value" style="color:#f1c40f">---</div>
        </div>
    </div>

    <div id="ui-right">
        <div id="strike-zone">
            <div class="grid-line" style="width:1px; height:100%; left:33%"></div>
            <div class="grid-line" style="width:1px; height:100%; left:66%"></div>
            <div class="grid-line" style="height:1px; width:100%; top:33%"></div>
            <div class="grid-line" style="height:1px; width:100%; top:66%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const zone = document.getElementById('strike-zone');
    const fb = document.getElementById('feedback');
    
    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let state = { b:0, s:0, o:0 };

    function updateUI() {
        const render = (id, count, max, cls) => {
            const el = document.getElementById(id); el.innerHTML = '';
            for(let i=0; i<max; i++) el.innerHTML += `<div class="dot ${i<count?cls:''}"></div>`;
        };
        render('b-row', state.b, 3, 'active-b');
        render('s-row', state.s, 2, 'active-s');
        render('o-row', state.o, 2, 'active-o');
    }

    zone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const r = zone.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - r.left;
        const ty = touch.clientY - r.top;
        
        handleSwing(tx, ty);
    }, {passive: false});

    zone.addEventListener('mousedown', (e) => {
        const r = zone.getBoundingClientRect();
        handleSwing(e.clientX - r.left, e.clientY - r.top);
    });

    function handleSwing(tx, ty) {
        const now = v.currentTime;
        const p = pitches.find(p => Math.abs(now - p.t) < 0.7);

        // Visual feedback
        zone.querySelectorAll('.bat-tap, .ball-hit').forEach(m => m.remove());
        const bat = document.createElement('div'); bat.className = 'bat-tap';
        bat.style.left = tx+'px'; bat.style.top = ty+'px'; zone.appendChild(bat);

        fb.style.opacity = 1;

        if(p) {
            const px = ((p.x + 0.75) / 1.5) * 150;
            const py = ((1.0 - p.y) / 2.0) * 200;

            const ball = document.createElement('div'); ball.className = 'ball-hit';
            ball.style.left = px+'px'; ball.style.top = py+'px'; zone.appendChild(ball);

            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            const speed = Math.floor(Math.max(0, 105 - dist));
            
            document.getElementById('res-speed').innerText = speed + " MPH";
            document.getElementById('res-contact').innerText = dist < 25 ? "SQUARED UP" : "WEAK";
            
            if(speed < 85) state.s++; else { state.s = 0; state.b = 0; }
        } else {
            document.getElementById('res-contact').innerText = "WHIFF";
            document.getElementById('res-speed').innerText = "0 MPH";
            state.s++;
        }

        if(state.s >= 3) { state.s=0; state.o++; }
        if(state.o >= 3) { state.o=0; }
        updateUI();
    }

    setInterval(() => {
        const next = pitches.find(p => p.t > v.currentTime && p.t - v.currentTime < 1.0);
        if(next) {
            zone.querySelectorAll('.bat-tap, .ball-hit').forEach(m => m.remove());
            fb.style.opacity = 0;
