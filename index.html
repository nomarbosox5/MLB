<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Statcast Elite</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }
        
        /* Video: 30% Left/Right Crop, Full Height Top/Bottom */
        #v-frame { width: 100%; height: 55vh; overflow: hidden; position: relative; background: #000; border-bottom: 2px solid #222; }
        video { width: 160%; height: 100%; object-fit: cover; margin-left: -30%; }

        /* Control Deck: Clustered to the Right */
        #deck { 
            height: 45vh; display: grid; grid-template-columns: 0.8fr 1.2fr; 
            background: var(--bg); padding: 15px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Left Side: Branding and Scoring */
        .left-panel { display: flex; flex-direction: column; justify-content: space-between; padding-top: 5px; }
        .branding { font-weight: 900; letter-spacing: 3px; color: var(--gold); font-size: 14px; }
        .score-box { font-size: 32px; font-weight: 900; }

        /* Right Side: Clustered HUD */
        .right-hud { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

        /* Stat Cards */
        #stat-panel { width: 100%; opacity: 0; transition: 0.3s; text-align: right; }
        .stat-card { background: rgba(255,255,255,0.05); border-right: 4px solid var(--orange); padding: 6px 12px; margin-bottom: 4px; }
        .s-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .s-val { font-size: 18px; font-weight: 900; }

        /* Combined Diamond & Spray Chart */
        #graphic-container { 
            position: relative; width: 140px; height: 110px; 
            background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid #222;
        }
        #spray-line {
            position: absolute; bottom: 15px; left: 50%; width: 3px; 
            background: linear-gradient(to top, var(--orange), #fff); 
            transform-origin: bottom center; opacity: 0; z-index: 5;
            box-shadow: 0 0 10px var(--orange);
        }
        .diamond-mini { position: absolute; top: 10px; right: 10px; width: 40px; height: 40px; }
        .base { position: absolute; width: 8px; height: 8px; background: #222; transform: rotate(45deg); border: 1px solid #444; transition: 0.3s; }
        .runner { background: var(--gold) !important; box-shadow: 0 0 8px var(--gold); border-color: #fff; }
        #b1 { top: 16px; right: 0; } #b2 { top: 0; left: 16px; } #b3 { top: 16px; left: 0; }

        /* Strike Zone */
        #sz { 
            width: 140px; height: 180px; border: 1px solid rgba(255,255,255,0.2); 
            position: relative; background: rgba(255,255,255,0.02); touch-action: none;
        }
        .grid { position: absolute; background: rgba(255,255,255,0.05); pointer-events: none; }
        .node { position: absolute; width: 22px; height: 22px; background: #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); font-weight: 900; font-size: 11px; color: #fff; box-shadow: 0 0 10px rgba(231,76,60,0.5); }
    </style>
</head>
<body>

<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="branding">CRONIN BASEBALL</div>
        <div class="score-box">RUNS: <span id="r-total">0</span></div>
    </div>

    <div class="right-hud">
        <div id="stat-panel">
            <div class="stat-card"><div class="s-label">Exit Velocity</div><div class="s-val" id="ev">0.0 MPH</div></div>
            <div class="stat-card" style="border-right-color: var(--gold);"><div class="s-label">Result</div><div class="s-val" id="res">---</div></div>
        </div>

        <div id="graphic-container">
            <div id="spray-line"></div>
            <div class="diamond-mini">
                <div id="b1" class="base"></div>
                <div id="b2" class="base"></div>
                <div id="b3" class="base"></div>
            </div>
            <div style="position:absolute; bottom:5px; left:50%; transform:translateX(-50%); font-size:8px; color:#444;">TRAJECTORY & RUNNERS</div>
        </div>

        <div id="sz">
            <div class="grid" style="width:1px; height:100%; left:33.3%"></div>
            <div class="grid" style="width:1px; height:100%; left:66.6%"></div>
            <div class="grid" style="height:1px; width:100%; top:33.3%"></div>
            <div class="grid" style="height:1px; width:100%; top:66.6%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');
    const panel = document.getElementById('stat-panel');
    const spray = document.getElementById('spray-line');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let game = { runs: 0, bases: [false, false, false], locked: false };

    function syncUI() {
        document.getElementById('b1').className = `base ${game.bases[0] ? 'runner' : ''}`;
        document.getElementById('b2').className = `base ${game.bases[1] ? 'runner' : ''}`;
        document.getElementById('b3').className = `base ${game.bases[2] ? 'runner' : ''}`;
        document.getElementById('r-total').innerText = game.runs;
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(game.locked) return;
        const rect = sz.getBoundingClientRect();
        const touch = e.touches[0];
        handleSwing(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    function handleSwing(tx, ty) {
        game.locked = true;
        const time = v.currentTime;
        const p = pitches.find(p => Math.abs(time - p.t) < 0.65);

        sz.querySelectorAll('.node').forEach(n => n.remove());

        if(p) {
            const px = ((p.x + 0.75) / 1.5) * 140;
            const py = ((1.0 - p.y) / 2.0) * 180;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            
            const node = document.createElement('div'); node.className = 'node'; node.innerText = '1';
            node.style.left = px+'px'; node.style.top = py+'px'; sz.appendChild(node);

            if(dist < 40) {
                const velo = Math.floor(115 - dist);
                const ft = Math.floor(velo * 3.8);
                showHit(ft, velo, tx-px);
            }
        }
    }

    function showHit(ft, velo, angle) {
        panel.style.opacity = 1;
        spray.style.opacity = 1;
        spray.style.height = (ft/4.5) + 'px';
        spray.style.transform = `translateX(-50%) rotate(${angle*2.2}deg)`;
        
        document.getElementById('ev').innerText = velo + ".4 MPH";
        
        let move = 0;
        let txt = "FLY OUT";
        if(ft >= 400) { move = 4; txt = "HOME RUN"; }
        else if(ft >= 350) { move = 3; txt = "TRIPLE"; }
        else if(ft >= 300) { move = 2; txt = "DOUBLE"; }
        else if(ft >= 200) { move = 1; txt = "SINGLE"; }

        document.getElementById('res').innerText = txt + " (" + ft + "FT)";

        for(let i=0; i < move; i++) {
            if(game.bases[2]) game.runs++;
            game.bases[2] = game.bases[1];
            game.bases[1] = game.bases[0];
            game.bases[0] = (i === 0 && move < 4);
        }
        syncUI();
    }

    setInterval(() => {
        const now = v.currentTime;
        if (now < 0.4 || pitches.some(p => p.t > now && p.t - now < 0.5)) {
            game.locked = false;
            panel.style.opacity = 0;
            spray.style.opacity = 0;
            if(now < 0.3) sz.innerHTML = '<div class="grid" style="width:1px; height:100%; left:33.3%"></div><div class="grid" style="width:1px; height:100%; left:66.6%"></div><div class="grid" style="height:1px; width:100%; top:33.3%"></div><div class="grid" style="height:1px; width:100%; top:66.6%"></div>';
        }
    }, 100);

    syncUI();
</script>
</body>
</html>
