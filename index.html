<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absolute Pitch Sync</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* VIDEO AREA - 42% height exactly */
        #video-container { width: 100%; height: 42vh; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - Top Left "Fold" */
        #score-bug { 
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); 
            padding: 5px 12px; border-left: 4px solid #BD3039; z-index: 100; font-weight: 900;
        }

        /* STATCAST DATA - Bottom Right Overlay */
        #stat-data { 
            position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.85); 
            border: 1px solid #444; padding: 10px; width: 140px; display: none; flex-direction: column; z-index: 100;
        }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 3px 0; }
        .label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        .val { font-size: 0.9rem; font-weight: 900; color: #efb21e; }

        /* THE GAME HIT BOX */
        #interaction { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #050505; }
        #nestico-box { position: relative; width: 180px; height: 230px; border: 1px solid #222; background: rgba(255,255,255,0.02); }
        
        /* DOTS */
        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #target { width: 14px; height: 14px; background: #fff; opacity: 0; box-shadow: 0 0 10px #fff; }
        #swing { width: 26px; height: 26px; border: 2px solid #fff; display: none; background: rgba(255,0,0,0.5); }
        
        #tap-surface { position: absolute; inset: 0; z-index: 10; touch-action: none; }
    </style>
</head>
<body>

<div id="video-container" onclick="document.getElementById('v').play()">
    <video id="v" autoplay muted loop playsinline>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
    
    <div id="score-bug">BOS <span id="r-val">0</span></div>

    <div id="stat-data">
        <div class="stat-row"><span class="label">Result</span><span class="val" id="d-res">--</span></div>
        <div class="stat-row"><span class="label">Exit Velo</span><span class="val" id="d-ev">0</span></div>
        <div class="stat-row"><span class="label">Distance</span><span class="val" id="d-dist">0</span></div>
    </div>
</div>

<div id="interaction">
    <div id="nestico-box">
        <div id="tap-surface"></div>
        <div id="target" class="dot"></div>
        <div id="swing" class="dot"></div>
    </div>
</div>

<script>
    const video = document.getElementById('v');
    
    // THESE LOCATIONS NEVER CHANGE - HARD CODED COORDINATES
    const PITCHES = [
        {t: 0.92,  x: 45,  y: 40}, 
        {t: 6.40,  x: 65,  y: 25}, 
        {t: 10.86, x: 75,  y: 70}, 
        {t: 16.08, x: 95,  y: 85}, 
        {t: 21.50, x: 100, y: 70}, 
        {t: 28.03, x: 20,  y: 160}, 
        {t: 36.17, x: 45,  y: 60}, 
        {t: 41.84, x: 25,  y: 125}
    ];

    let g = { r:0, lastT: 0, activeIdx: -1, swung: false };

    video.addEventListener('timeupdate', () => {
        const now = video.currentTime;
        // Loop Reset
        if (now < g.lastT) { g.activeIdx = -1; g.swung = false; document.getElementById('stat-data').style.display='none'; }
        g.lastT = now;

        let idx = -1;
        PITCHES.forEach((p, i) => { if (now >= p.t) idx = i; });

        if (idx !== g.activeIdx) {
            g.activeIdx = idx;
            g.swung = false;
            document.getElementById('swing').style.display = 'none';
            if (idx !== -1) {
                const p = PITCHES[idx];
                const td = document.getElementById('target');
                td.style.left = p.x + 'px'; 
                td.style.top = p.y + 'px'; 
                td.style.opacity = '1';
            }
        }
    });

    document.getElementById('tap-surface').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (g.activeIdx === -1 || g.swung) return;
        g.swung = true;

        const rect = document.getElementById('nestico-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;
        
        const sd = document.getElementById('swing');
        sd.style.left = ux + 'px'; 
        sd.style.top = uy + 'px'; 
        sd.style.display = 'block';

        const p = PITCHES[g.activeIdx];
        const err = Math.sqrt(Math.pow(ux - p.x, 2) + Math.pow(uy - p.y, 2));

        if (err < 45) {
            const ev = Math.round(114 - (err * 0.8));
            const la = Math.round((p.y - uy) * 1.5);
            const dist = Math.round((ev * ev / 30) * (1 + la/90));

            document.getElementById('d-ev').innerText = ev + " MPH";
            document.getElementById('d-dist').innerText = dist + " FT";
            document.getElementById('d-res').innerText = (la > 25 && la < 35) ? "HOME RUN" : "HIT";
            document.getElementById('stat-data').style.display = 'flex';

            if (la > 25 && la < 35 && ev > 102) {
                g.r++; document.getElementById('r-val').innerText = g.r;
            }
        } else {
            document.getElementById('d-res').innerText = "WHIFF";
            document.getElementById('stat-data').style.display = 'flex';
        }
    });
</script>
</body>
</html>
