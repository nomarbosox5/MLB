<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        .ui-layer { width: 360px; margin-top: 40px; display: flex; justify-content: space-between; }
        .result-text { font-size: 44px; font-weight: 900; color: var(--neon); text-transform: uppercase; margin: 0; }
        
        .nestico-grid { 
            width: 160px; height: 200px; border: 2px solid white; position: relative; 
            background: rgba(255,255,255,0.03); 
        }
        /* Strike Zone boundary based on the 4 corners provided */
        .zone-line { 
            position: absolute; left: 24px; top: 33px; width: 112px; height: 134px; 
            border: 1px solid rgba(255,255,255,0.3); 
        }

        .ball-dart { 
            position: absolute; width: 12px; height: 12px; background: white; 
            border-radius: 50%; transform: translate(-50%, -50%); 
            box-shadow: 0 0 10px var(--neon); display: none; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div>
            <h1 id="mainRes" class="result-text">READY</h1>
            <div id="subRes" style="color:#666; letter-spacing:2px; font-size:12px;">WAITING FOR START</div>
        </div>
        <div class="nestico-grid" id="grid">
            <div class="zone-line"></div>
            <div id="ball" class="ball-dart" onclick="registerHit()"></div>
        </div>
    </div>

    <button id="start" onclick="startSync()" style="margin-top:50px; padding:15px 30px; border-radius:30px; border:none; background:var(--neon); font-weight:bold; cursor:pointer;">START VIDEO SYNC</button>

    <script>
        const sequence = [
            { t: 0.92,  x: -0.75, y: 3.25, type: "STRIKE", res: "HOME RUN" },
            { t: 6.40,  x: -0.4,  y: 3.5,  type: "STRIKE", res: "FLY OUT" },
            { t: 10.86, x: -0.25, y: 2.75, type: "STRIKE", res: "SINGLE" },
            { t: 16.08, x: 0.15,  y: 2.6,  type: "STRIKE", res: "POP UP" },
            { t: 21.50, x: 0.2,   y: 2.75, type: "STRIKE", res: "GROUNDER" },
            { t: 28.03, x: -0.9,  y: 1.75, type: "BALL",   res: "TAKE" },
            { t: 33.00, x: -0.75, y: 3.0,  type: "STRIKE", res: "DOUBLE" },
            { t: 36.17, x: -0.9,  y: 2.25, type: "BALL",   res: "TAKE" }
        ];

        let canHit = false;
        let activePitch = null;

        function startSync() {
            document.getElementById('start').style.display = 'none';
            sequence.forEach(p => {
                setTimeout(() => showBall(p), p.t * 1000);
            });
        }

        function showBall(p) {
            activePitch = p;
            canHit = true;
            const ball = document.getElementById('ball');
            
            // Map MLB coords to pixels
            const vX = ((p.x + 1) / 2) * 160;
            const vY = 200 - ((p.y - 1) / 3) * 200;

            ball.style.left = vX + "px";
            ball.style.top = vY + "px";
            ball.style.display = "block";

            // Ball stays visible for 800ms "swing window"
            setTimeout(() => {
                ball.style.display = "none";
                canHit = false;
            }, 800);
        }

        function registerHit() {
            if (!canHit) return;
            const title = document.getElementById('mainRes');
            const sub = document.getElementById('subRes');
            
            title.innerText = activePitch.res;
            sub.innerText = "TIMING: PERFECT";
            canHit = false; // Prevent double clicking
        }
    </script>
</body>
</html>
