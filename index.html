<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB Pro - Perfect Sync</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #video-section { width: 100%; background: #000; flex-shrink: 0; border-bottom: 2px solid #222; }
        video { width: 100%; max-height: 45vh; display: block; }

        #dashboard { flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 30px; padding: 20px; }
        #results-area { width: 160px; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
        #outcome { font-size: 2.4rem; font-weight: 900; color: #00ffcc; text-transform: uppercase; margin: 0; line-height: 1; }
        #timing-fb { font-size: 1rem; color: #666; text-transform: uppercase; margin-top: 8px; font-weight: bold; }

        /* The Strike Zone + Gutter Allowance */
        #statcast-container { position: relative; width: 150px; height: 200px; }
        #strike-zone { 
            position: absolute; left: 20px; top: 30px; width: 110px; height: 140px; 
            border: 4px solid #fff; background: rgba(255,255,255,0.05); box-sizing: border-box;
        }

        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #pitch-dot { width: 22px; height: 22px; background: white; opacity: 0; box-shadow: 0 0 15px #fff; z-index: 5; }
        #swing-dot { width: 34px; height: 34px; background: #ff4d4d; border: 2px solid #fff; display: none; z-index: 6; }
        #tap-zone { position: absolute; width: 100%; height: 100%; z-index: 10; }
    </style>
</head>
<body>

    <div id="video-section">
        <video id="v" autoplay muted loop playsinline>
            <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="dashboard">
        <div id="results-area">
            <h1 id="outcome"></h1>
            <div id="timing-fb"></div>
        </div>

        <div id="statcast-container">
            <div id="tap-zone"></div>
            <div id="strike-zone"></div>
            <div id="pitch-dot" class="dot"></div>
            <div id="swing-dot" class="dot"></div>
        </div>
    </div>

<script>
    const video = document.getElementById('v');
    const outcome = document.getElementById('outcome');
    const timingFb = document.getElementById('timing-fb');
    const pDot = document.getElementById('pitch-dot');
    const sDot = document.getElementById('swing-dot');

    // PERFECT COORDINATES (Mapped to 150x200 container)
    const PITCH_DATA = [
        { id: 1, t: 0.92,  x: 35,  y: 165, res: "HOME RUN" },
        { id: 2, t: 6.40,  x: 125, y: 45,  res: "FLY OUT"  },
        { id: 3, t: 10.86, x: 75,  y: 100, res: "SINGLE"   },
        { id: 4, t: 16.08, x: 85,  y: 55,  res: "POP UP"   },
        { id: 5, t: 21.50, x: 115, y: 120, res: "GROUNDER" },
        { id: 6, t: 28.03, x: 10,  y: 140, res: "BALL" }, // Outside the white box
        { id: 7, t: 33.00, x: 45,  y: 110, res: "DOUBLE"   },
        { id: 8, t: 36.17, x: 10,  y: 125, res: "BALL" }  // Outside the white box
    ];

    let currentActiveId = null;

    video.addEventListener('timeupdate', () => {
        const now = video.currentTime;
        
        // Find the "current" pitch based on time
        const active = [...PITCH_DATA].reverse().find(p => now >= p.t);

        if (active) {
            // New Pitch Reset
            if (currentActiveId !== active.id) {
                sDot.style.display = "none";
                outcome.innerText = "";
                timingFb.innerText = "";
                currentActiveId = active.id;
            }
            
            pDot.style.left = active.x + 'px';
            pDot.style.top = active.y + 'px';
            pDot.style.opacity = "1";
        } else {
            pDot.style.opacity = "0";
            if (now < 0.2) {
                sDot.style.display = "none";
                outcome.innerText = "";
                currentActiveId = null;
            }
        }
    });

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const active = [...PITCH_DATA].reverse().find(p => video.currentTime >= p.t);
        if (!active) return;

        const rect = document.getElementById('statcast-container').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;

        sDot.style.left = ux + 'px';
        sDot.style.top = uy + 'px';
        sDot.style.display = 'block';

        // Timing Calculation (Impact window)
        const diff = Math.abs(video.currentTime - active.t);
        
        if (diff < 0.45) {
            outcome.innerText = active.res;
            outcome.style.color = "#00ffcc";
            timingFb.innerText = diff < 0.15 ? "PERFECT" : "GOOD";
        } else {
            outcome.innerText = "LATE";
            outcome.style.color = "#ff4d4d";
            timingFb.innerText = "MISSED TIMING";
        }
    });
</script>
</body>
</html>
