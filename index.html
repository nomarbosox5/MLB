<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Statcast v7 - Hit Types</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Roboto Condensed', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #v-layer { width: 100%; height: 42vh; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.15); }

        /* SCORE BUG */
        #score-bug { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.85); display: flex; align-items: center; padding: 8px 15px; border-radius: 4px; border-left: 5px solid #BD3039; z-index: 50; }
        .team { font-size: 1.6rem; font-weight: 900; margin-right: 12px; }
        
        /* RESULT POPUP */
        #result-banner { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; font-weight: 900; font-style: italic; text-transform: uppercase;
            text-shadow: 0 0 20px #000; pointer-events: none; opacity: 0; z-index: 100;
        }

        /* STATCAST BOXES */
        #statcast-overlay { position: absolute; inset: 0; background: rgba(0, 30, 70, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }
        .stat-bubble { background: #efb21e; color: #000; padding: 10px 25px; border-radius: 40px; font-weight: 900; margin: 8px; font-size: 1.4rem; }
        .stat-bubble span { display: block; font-size: 0.7rem; text-transform: uppercase; color: #222; }

        /* BOX AREA */
        #interaction { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #080808; }
        #nestico-box { position: relative; width: 180px; height: 230px; border: 1px solid #333; background: rgba(255,255,255,0.02); }
        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #target { width: 14px; height: 14px; background: #fff; opacity: 0; box-shadow: 0 0 12px #fff; }
        #swing { width: 28px; height: 28px; border: 2px solid #fff; display: none; background: rgba(255, 59, 48, 0.7); }
    </style>
</head>
<body>

<div id="v-layer" onclick="document.getElementById('v').play()">
    <video id="v" autoplay muted loop playsinline>
        <source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4">
    </video>
    <div id="score-bug"><div class="team">BOS <span id="r-val">0</span></div></div>
    <div id="result-banner">HOME RUN</div>

    <div id="statcast-overlay">
        <h1 style="color:#efb21e; font-style: italic;">STATCAST™</h1>
        <div class="stat-bubble"><span>Exit Velocity</span><b id="sc-ev">0</b> MPH</div>
        <div class="stat-bubble"><span>Launch Angle</span><b id="sc-la">0</b>°</div>
        <div class="stat-bubble"><span>Distance</span><b id="sc-dist">0</b> FT</div>
        <button onclick="document.getElementById('statcast-overlay').style.display='none'" style="margin-top:20px; padding:10px 30px; font-weight:900;">RESUME</button>
    </div>
</div>

<div id="interaction">
    <div id="nestico-box">
        <div id="tap-surface" style="position:absolute; inset:0; z-index:10; touch-action:none;"></div>
        <div id="target" class="dot"></div>
        <div id="swing" class="dot"></div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const PITCHES = [
        {t: 0.92, x: -0.75, y: 3.25}, {t: 6.40, x: -0.40, y: 3.50},
        {t: 10.86, x: -0.25, y: 2.75}, {t: 16.08, x: 0.15, y: 2.60},
        {t: 21.50, x: 0.20, y: 2.75}, {t: 28.03, x: -1.20, y: 1.50},
        {t: 36.17, x: -0.75, y: 3.00}, {t: 41.84, x: -1.10, y: 2.00}
    ];

    let g = { r:0, lastT:0, activeIdx:-1, swung:false };

    v.addEventListener('timeupdate', () => {
        const now = v.currentTime;
        if (now < g.lastT) { g.activeIdx = -1; g.swung = false; document.getElementById('result-banner').style.opacity = '0'; }
        g.lastT = now;

        let idx = -1;
        PITCHES.forEach((p, i) => { if (now >= p.t) idx = i; });

        if (idx !== g.activeIdx) {
            g.activeIdx = idx; g.swung = false;
            document.getElementById('swing').style.display = 'none';
            if (idx !== -1) {
                const p = PITCHES[idx];
                const px = ((p.x + 1.5) / 3.0) * 180;
                const py = 230 - (((p.y - 1.0) / 3.0) * 230);
                const td = document.getElementById('target');
                td.style.left = px+'px'; td.style.top = py+'px'; td.style.opacity = '1';
            }
        }
    });

    document.getElementById('tap-surface').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (g.activeIdx === -1 || g.swung) return;
        g.swung = true;

        const rect = document.getElementById('nestico-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;
        document.getElementById('swing').style.left = ux+'px';
        document.getElementById('swing').style.top = uy+'px';
        document.getElementById('swing').style.display = 'block';

        const p = PITCHES[g.activeIdx];
        const px = ((p.x + 1.5) / 3.0) * 180;
        const py = 230 - (((p.y - 1.0) / 3.0) * 230);
        
        const dX = ux - px;
        const dY = py - uy; // Under ball = positive LA
        const distErr = Math.sqrt(dX*dX + dY*dY);
        const tDiff = Math.abs(v.currentTime - p.t);

        const banner = document.getElementById('result-banner');
        banner.style.opacity = '1';

        // THE PHYSICS ENGINE
        if (distErr > 45 || tDiff > 0.35) {
            banner.innerText = "WHIFF"; banner.style.color = "#ff4d4d";
        } else if (Math.abs(dX) > 25) {
            banner.innerText = "FOUL BALL"; banner.style.color = "#aaa";
        } else {
            const ev = Math.round(112 - (distErr * 0.7));
            const la = Math.round(dY * 1.6);
            const dist = Math.round((ev * ev / 29) * (1 + la/90));

            if (la < 5) { banner.innerText = "GROUND BALL"; banner.style.color = "#fff"; }
            else if (la >= 5 && la < 25) { banner.innerText = "LINE DRIVE"; banner.style.color = "#00ffcc"; }
            else if (la >= 25 && la < 45 && ev > 100) { 
                banner.innerText = "HOME RUN"; banner.style.color = "#efb21e";
                g.r++; document.getElementById('r-val').innerText = g.r;
                showStats(ev, la, dist);
            } else { banner.innerText = "FLY OUT"; banner.style.color = "#ff4d4d"; }
        }
        setTimeout(() => { banner.style.opacity = '0'; }, 1500);
    });

    function showStats(ev, la, dist) {
        document.getElementById('sc-ev').innerText = ev;
        document.getElementById('sc-la').innerText = la;
        document.getElementById('sc-dist').innerText = dist;
        document.getElementById('statcast-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
