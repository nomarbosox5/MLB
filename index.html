<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLB Challenge - Fixed Layout</title>
    <style>
        /* Force the body to be exactly the height of the phone screen */
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Top Section: Fixed Video */
        #video-section { 
            width: 100%; 
            background: #111; 
            border-bottom: 2px solid #333;
        }
        video { 
            width: 100%; 
            display: block; 
            max-height: 40vh; /* Limits video to top 40% of screen */
        }

        /* Bottom Section: Dashboard */
        #dashboard { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            padding: 20px; 
        }

        #results { width: 150px; }
        #outcome { font-size: 2rem; font-weight: 900; color: #00ffcc; text-transform: uppercase; margin: 0; }
        #status { font-size: 0.9rem; color: #888; margin-top: 5px; }

        /* The Nestico Box */
        #statcast-box { 
            width: 130px; 
            height: 180px; 
            border: 3px solid #fff; 
            position: relative; 
            background: rgba(255,255,255,0.05);
        }
        .dot { position: absolute; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #pitch-dot { width: 18px; height: 18px; background: white; opacity: 0; box-shadow: 0 0 10px #fff; }
        #swing-dot { width: 28px; height: 28px; background: #ff4d4d; border: 2px solid #fff; display: none; }
        
        #tap-zone { position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px; z-index: 10; }
    </style>
</head>
<body>

    <div id="video-section">
        <video id="v" autoplay muted loop playsinline>
            <source src="https://github.com/nomarbosox5/MLB/raw/refs/heads/main/ScreenRecording_04-17-2026%2000-42-49_1.mov" type="video/quicktime">
        </video>
    </div>

    <div id="dashboard">
        <div id="results">
            <h1 id="outcome">READY</h1>
            <div id="status">Watch the Pitch</div>
        </div>

        <div id="statcast-box">
            <div id="tap-zone"></div>
            <div id="pitch-dot" class="dot"></div>
            <div id="swing-dot" class="dot"></div>
        </div>
    </div>

<script>
    const video = document.getElementById('v');
    const outcome = document.getElementById('outcome');
    const status = document.getElementById('status');
    const pitchDot = document.getElementById('pitch-dot');
    const swingDot = document.getElementById('swing-dot');

    // Hardcoded Target per your new video timing
    const TARGET = { t: 1.25, x: 20, y: 160 }; 

    video.addEventListener('timeupdate', () => {
        // Position the dot
        pitchDot.style.left = TARGET.x + 'px';
        pitchDot.style.top = TARGET.y + 'px';

        // Visibility based on timing
        if (Math.abs(video.currentTime - TARGET.t) < 0.2) {
            pitchDot.style.opacity = "1";
        } else {
            pitchDot.style.opacity = "0";
            if (video.currentTime < 0.1) swingDot.style.display = "none";
        }
    });

    document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = document.getElementById('statcast-box').getBoundingClientRect();
        const ux = e.touches[0].clientX - rect.left;
        const uy = e.touches[0].clientY - rect.top;

        swingDot.style.left = ux + 'px';
        swingDot.style.top = uy + 'px';
        swingDot.style.display = 'block';

        const timeDiff = Math.abs(video.currentTime - TARGET.t);
        
        if (timeDiff < 0.25) {
            outcome.innerText = "HOME RUN";
            outcome.style.color = "#00ffcc";
            status.innerText = "PERFECT TIMING";
        } else {
            outcome.innerText = "WHIFF";
            outcome.style.color = "#ff4d4d";
            status.innerText = video.currentTime < TARGET.t ? "TOO EARLY" : "TOO LATE";
        }
    });
</script>
</body>
</html>
