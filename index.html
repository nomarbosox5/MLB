<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Statcast Pro</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #0a0a0a; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }
        
        /* Video Top 40% with 30/30 Crop */
        #v-frame { width: 100%; height: 40vh; overflow: hidden; position: relative; background: #000; border-bottom: 2px solid #333; }
        video { width: 160%; height: 100%; object-fit: cover; margin-left: -30%; pointer-events: none; }

        /* Bottom Control Deck */
        #deck { 
            height: 60vh; display: grid; grid-template-columns: 1fr 1fr; 
            background: var(--bg); padding: 10px; gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Left Side: Broadcast Results */
        .results-panel { display: flex; flex-direction: column; gap: 10px; padding-top: 10px; }
        .stat-card { background: rgba(255,255,255,0.05); border-left: 4px solid var(--orange); padding: 10px; border-radius: 2px; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 20px; font-weight: 900; }
        
        /* Count Section (B/S/O) */
        .count-wrap { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .count-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 800; }
        .dots { display: flex; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .active-b { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        .active-s { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .active-o { background: #ff4757; box-shadow: 0 0 8px #ff4757; }

        /* Right Side: Strike Zone (Interactive) */
        .zone-panel { display: flex; justify-content: center; align-items: center; }
        #sz { 
            width: 170px; height: 230px; border: 2px solid rgba(255,255,255,0.3); 
            position: relative; background: rgba(255,255,255,0.02);
            touch-action: none; /* Crucial for mobile touch */
        }
        .grid { position: absolute; background: rgba(255,255,255,0.1); pointer-events: none; }

        /* Ball Visuals */
        .node { position: absolute; width: 26px; height: 26px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); font-weight: 900; color: #000; z-index: 10; border: 2px solid var(--orange); }
        .ghost-ball { position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 1px dashed #fff; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="results-panel">
        <div class="stat-card">
            <div class="label">Last Hit Result</div>
            <div id="hit-text" class="val">READY...</div>
            <div id="dist-text" style="font-size: 14px; color: var(--gold); margin-top:4px;">0 FT</div>
        </div>

        <div class="count-wrap">
            <div class="count-row">B <div class="dots" id="b-dots"></div></div>
            <div class="count-row">S <div class="dots" id="s-row"></div></div>
            <div class="count-row">O <div class="dots" id="o-row"></div></div>
        </div>
        
        <div class="stat-card" style="margin-top:auto; border-left-color: var(--blue);">
            <div class="label">Total Runs</div>
            <div id="run-total" class="val" style="font-size: 30px;">0</div>
        </div>
    </div>

    <div class="zone-panel">
        <div id="sz">
            <div class="grid" style="width:1px; height:100%; left:33.3%"></div>
            <div class="grid" style="width:1px; height:100%; left:66.6%"></div>
            <div class="grid" style="height:1px; width:100%; top:33.3%"></div>
            <div class="grid" style="height:1px; width:100%; top:66.6%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75 }, { t: 6.40, x: -0.40, y: 1.00 },
        { t: 10.86, x: -0.25, y: 0.25 }, { t: 16.08, x: 0.15, y: 0.10 },
        { t: 21.50, x: -0.95, y: -0.75 }, { t: 28.03, x: 0.20, y: 0.25 },
        { t: 36.17, x: -0.95, y: 0.00 }, { t: 41.84, x: -0.80, y: 0.25 }
    ];

    let game = { runs: 0, b: 0, s: 0, o: 0, locked: false };

    function updateHUD() {
        const render = (id, count, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<count?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', game.b, 3, 'active-b');
        render('s-row', game.s, 2, 'active-s');
        render('o-row', game.o, 2, 'active-o');
        document.getElementById('run-total').innerText = game.runs;
        
        if(game.o >= 3) {
            game = { runs: 0, b: 0, s: 0, o: 0, locked: false };
            setTimeout(updateHUD, 1000);
        }
    }

    // High Sensitivity Touch Event
    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(game.locked) return;
        const rect = sz.getBoundingClientRect();
        const touch = e.touches[0];
        processInput(touch.clientX - rect.left, touch.clientY - rect.top);
    }, { passive: false });

    // Fallback for Click
    sz.addEventListener('mousedown', (e) => {
        if(game.locked) return;
        const rect = sz.getBoundingClientRect();
        processInput(e.clientX - rect.left, e.clientY - rect.top);
    });

    function processInput(tx, ty) {
        game.locked = true;
        const time = v.currentTime;
        const p = pitches.find(p => Math.abs(time - p.t) < 0.6);

        sz.querySelectorAll('.node').forEach(n => n.remove());

        if(p) {
            const px = ((p.x + 0.75) / 1.5) * 170;
            const py = ((1.0 - p.y) / 2.0) * 230;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);
            
            const node = document.createElement('div'); node.className = 'node'; node.innerText = '1';
            node.style.left = px+'px'; node.style.top = py+'px'; sz.appendChild(node);

            if(dist < 45) {
                let ft = Math.floor(400 - (dist * 4));
                handleHit(ft);
            } else {
                game.s++;
                document.getElementById('hit-text').innerText = "STRIKE";
            }
        } else {
            game.s++;
            document.getElementById('hit-text').innerText = "WHIFF";
        }
        
        if(game.s >= 3) { game.s = 0; game.o++; }
        updateHUD();
    }

    function handleHit(ft) {
        let res = "FLY OUT";
        if(ft >= 400) { res = "HOME RUN"; game.runs++; }
        else if(ft >= 300) { res = "DOUBLE"; }
        else if(ft >= 200) { res = "SINGLE"; }
        
        document.getElementById('hit-text').innerText = res;
        document.getElementById('dist-text').innerText = ft + " FT";
        game.s = 0; game.b = 0;
    }

    // Frame Loop for Preview Ball and Reset
    setInterval(() => {
        const now = v.currentTime;
        
        // Show Ghost Ball 0.5s before pitch
        const upcoming = pitches.find(p => p.t > now && p.t - now < 0.5);
        sz.querySelectorAll('.ghost-ball').forEach(g => g.remove());
        if(upcoming) {
            const gx = ((upcoming.x + 0.75) / 1.5) * 170;
            const gy = ((1.0 - upcoming.y) / 2.0) * 230;
            const ghost = document.createElement('div'); ghost.className = 'ghost-ball';
            ghost.style.left = gx+'px'; ghost.style.top = gy+'px'; sz.appendChild(ghost);
        }

        // Reset Swing Lock
        if (now < 0.3 || pitches.some(p => p.t > now && p.t - now < 0.4)) {
            game.locked = false;
            if(now < 0.3) {
                sz.innerHTML = `
                    <div class="grid" style="width:1px; height:100%; left:33.3%"></div>
                    <div class="grid" style="width:1px; height:100%; left:66.6%"></div>
                    <div class="grid" style="height:1px; width:100%; top:33.3%"></div>
                    <div class="grid" style="height:1px; width:100%; top:66.6%"></div>
                `;
            }
        }
    }, 50);

    updateHUD();
</script>
</body>
</html>
