<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cronin Baseball Elite</title>
    <style>
        :root { --gold: #f1c40f; --orange: #e67e22; --blue: #3498db; --bg: #050505; --grass: #122812; }
        body { 
            margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; height: 100svh; display: flex; flex-direction: column;
        }

        /* Branding Banner */
        #top-bar { height: 4vh; background: #111; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); border-bottom: 1px solid #333; }
        
        /* Video Container - Fixed height to prevent cutoff */
        #v-frame { width: 100%; height: 36vh; overflow: hidden; position: relative; background: #000; }
        video { width: 150%; height: 100%; object-fit: cover; margin-left: -25%; pointer-events: none; }

        #deck { 
            height: 60vh; display: grid; grid-template-columns: 1.1fr 0.9fr; 
            background: var(--bg); padding: 8px; gap: 8px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Left side: Field & Scores */
        .left-panel { display: flex; flex-direction: column; gap: 5px; }
        .score-row { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; }
        .dots { display: flex; gap: 3px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .b-on { background: var(--blue); box-shadow: 0 0 5px var(--blue); } 
        .s-on { background: var(--gold); box-shadow: 0 0 5px var(--gold); } 
        .o-on { background: #e74c3c; box-shadow: 0 0 5px #e74c3c; }

        #field-box { 
            flex-grow: 1; background: #080808; border: 1px solid #222; border-radius: 4px; 
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .field-svg { width: 95%; height: 95%; }

        /* Bases Integrated into Field Grass */
        .base-layer { position: absolute; bottom: 20%; left: 50%; width: 40px; height: 40px; transform: translateX(-50%); pointer-events: none; }
        .base-node { position: absolute; width: 8px; height: 8px; background: #222; transform: rotate(45deg); border: 1px solid #444; transition: 0.3s; }
        #node-2 { top: 0; left: 16px; } 
        #node-3 { top: 16px; left: 0; }  
        #node-1 { top: 16px; right: 0; } 
        .runner-on { background: #fff !important; box-shadow: 0 0 10px #fff; border-color: #fff; }

        /* Right Side: Compact Playable Zone */
        .right-panel { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        #feedback { height: 45px; text-align: center; width: 100%; display: flex; flex-direction: column; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 4px; }
        #fb-text { color: var(--gold); font-size: 14px; font-weight: 900; text-transform: uppercase; }
        #fb-sub { color: #666; font-size: 10px; font-weight: 700; }

        /* Strike Zone Lowered and Compacted */
        #sz { 
            width: 145px; height: 185px; border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.01); position: relative; touch-action: none; border-radius: 2px;
            margin-top: 5px;
        }
        .grid { position: absolute; background: rgba(255,255,255,0.06); pointer-events: none; }
        .ball { position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; border: 1px solid #999; }
        .hint { position: absolute; width: 16px; height: 16px; background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="top-bar">CRONIN BASEBALL</div>
<div id="v-frame">
    <video id="v" autoplay muted loop playsinline><source src="ScreenRecording_04-17-2026 18-27-36_1.mp4" type="video/mp4"></video>
</div>

<div id="deck">
    <div class="left-panel">
        <div class="score-row">
            <span>R: <span id="r-val" style="color:var(--gold)">0</span></span>
            <div class="dots" id="b-dots"></div>
            <div class="dots" id="s-dots"></div>
            <div class="dots" id="o-dots"></div>
        </div>
        <div id="field-box">
            <svg class="field-svg" id="field-svg" viewBox="0 0 100 100">
                <path d="M50 95 L15 45 Q50 0 85 45 Z" fill="var(--grass)" />
                <line x1="50" y1="95" x2="10" y2="40" stroke="#444" stroke-width="0.5" />
                <line x1="50" y1="95" x2="90" y2="40" stroke="#444" stroke-width="0.5" />
                <circle cx="50" cy="95" r="70" fill="none" stroke="rgba(255,255,255,0.15)" />
            </svg>
            <div class="base-layer">
                <div id="node-2" class="base-node"></div>
                <div id="node-3" class="base-node"></div>
                <div id="node-1" class="base-node"></div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="feedback">
            <div id="fb-text">READY</div>
            <div id="fb-sub">AWAITING PITCH</div>
        </div>
        <div id="sz">
            <div class="grid" style="width:1px; height:100%; left:33.3%"></div>
            <div class="grid" style="width:1px; height:100%; left:66.6%"></div>
            <div class="grid" style="height:1px; width:100%; top:33.3%"></div>
            <div class="grid" style="height:1px; width:100%; top:66.6%"></div>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const sz = document.getElementById('sz');
    const field = document.getElementById('field-svg');

    const pitches = [
        { t: 0.92, x: -0.75, y: 0.75, strike: true }, { t: 6.40, x: -0.40, y: 1.00, strike: false },
        { t: 10.86, x: -0.25, y: 0.25, strike: true }, { t: 16.08, x: 0.15, y: 0.10, strike: true },
        { t: 21.50, x: -0.95, y: -0.75, strike: false }, { t: 28.03, x: 0.20, y: 0.25, strike: true },
        { t: 36.17, x: -0.95, y: 0.00, strike: false }, { t: 41.84, x: -0.80, y: 0.25, strike: false }
    ];

    let game = { r:0, b:0, s:0, o:0, bases:[false,false,false], lastPitchIdx: -1, pitchProcessed: false };

    function updateUI() {
        document.getElementById('r-val').innerText = game.r;
        const render = (id, cur, max, cls) => {
            let h = ''; for(let i=0; i<max; i++) h += `<div class="dot ${i<cur?cls:''}"></div>`;
            document.getElementById(id).innerHTML = h;
        };
        render('b-dots', game.b, 3, 'b-on');
        render('s-dots', game.s, 2, 's-on');
        render('o-dots', game.o, 2, 'o-on');
        document.getElementById('node-1').className = `base-node ${game.bases[0]?'runner-on':''}`;
        document.getElementById('node-2').className = `base-node ${game.bases[1]?'runner-on':''}`;
        document.getElementById('node-3').className = `base-node ${game.bases[2]?'runner-on':''}`;
    }

    sz.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(game.pitchProcessed) return;

        const rect = sz.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;
        
        const now = v.currentTime;
        const pIdx = pitches.findIndex(p => Math.abs(now - p.t) < 0.5);

        if(pIdx !== -1) {
            game.pitchProcessed = true;
            game.lastPitchIdx = pIdx;
            const p = pitches[pIdx];
            const px = ((p.x + 1) / 2) * sz.offsetWidth;
            const py = ((1 - p.y) / 2) * sz.offsetHeight;
            const dist = Math.sqrt((tx-px)**2 + (ty-py)**2);

            sz.querySelectorAll('.ball').forEach(b => b.remove());
            const b = document.createElement('div'); b.className='ball';
            b.style.left=px+'px'; b.style.top=py+'px'; sz.appendChild(b);

            if(dist < 40) {
                let ft = Math.floor(420 - (dist * 4));
                handleHit(ft, tx-px);
            } else {
                game.s++; msg("STRIKE", "WHIFF");
            }
        } else {
            // Swing at nothing
            game.s++; msg("STRIKE", "NO PITCH");
            game.pitchProcessed = true;
        }
        checkInnings(); updateUI();
    }, { passive: false });

    function handleHit(ft, angle) {
        let res = "OUT"; let move = 0;
        if(ft >= 380) { res = "HOME RUN"; move = 4; }
        else if(ft >= 300) { res = "DOUBLE"; move = 2; }
        else if(ft >= 180) { res = "SINGLE"; move = 1; }
        
        msg(res, ft + " FT");
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", "50"); line.setAttribute("y1", "95");
        line.setAttribute("x2", 50 + (angle * 0.7)); line.setAttribute("y2", 95 - (ft/5));
        line.setAttribute("stroke", "var(--orange)"); line.setAttribute("stroke-width", "1.5");
        line.setAttribute("class", "h-line"); field.appendChild(line);

        if(move > 0) {
            game.b = 0; game.s = 0;
            for(let i=0; i<move; i++) {
                if(game.bases[2]) game.r++;
                game.bases[2] = game.bases[1]; game.bases[1] = game.bases[0];
                game.bases[0] = (i === 0 && move < 4);
            }
        } else { game.o++; }
    }

    function checkInnings() {
        if(game.s >= 3) { game.s = 0; game.o++; msg("STRIKE THREE", "OUT"); }
        if(game.o >= 3) { game.o = 0; game.r = 0; game.bases = [false,false,false]; }
    }

    function msg(m, s) { 
        document.getElementById('fb-text').innerText = m; 
        document.getElementById('fb-sub').innerText = s;
    }

    setInterval(() => {
        const now = v.currentTime;

        // Auto-call Ball/Strike if not swung at
        const passedPitchIdx = pitches.findIndex(p => now > p.t + 0.5 && game.lastPitchIdx < pitches.indexOf(p));
        if(passedPitchIdx !== -1) {
            game.lastPitchIdx = passedPitchIdx;
            game.pitchProcessed = true; 
            if(pitches[passedPitchIdx].strike) {
                game.s++; msg("STRIKE", "TAKEN");
            } else {
                game.b++; msg("BALL", "OUTSIDE");
            }
            if(game.b >= 4) { game.b = 0; /* Walk simple logic */ }
            checkInnings(); updateUI();
        }

        // Preview Hint (0.15s before)
        const hint = pitches.find(p => p.t > now && p.t - now < 0.15);
        sz.querySelectorAll('.hint').forEach(h => h.remove());
        if(hint) {
            const hx = ((hint.x + 1) / 2) * sz.offsetWidth;
            const hy = ((1 - hint.y) / 2) * sz.offsetHeight;
            const h = document.createElement('div'); h.className='hint';
            h.style.left=hx+'px'; h.style.top=hy+'px'; sz.appendChild(h);
        }

        // Reset state on loop
        if (now < 0.3) {
            game.pitchProcessed = false; 
            game.lastPitchIdx = -1;
            field.querySelectorAll('.h-line').forEach(l => l.remove());
            sz.querySelectorAll('.ball').forEach(b => b.remove());
            msg("READY", "AWAITING PITCH");
            updateUI();
        } else if (!pitches.some(p => Math.abs(now - p.t) < 0.6)) {
            // Allow swing again if no pitch is currently active
            game.pitchProcessed = false;
        }
    }, 50);

    updateUI();
</script>
</body>
</html>
